<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus 5 Master Tracker - Riverton 24th Ward</title>

    <!-- PWA / home-screen app icon -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1730">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Focus 5">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&display=swap');
        * { font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif; }

        /* ─────────── PACIFIC NOIR — design tokens (matches Unga ministering deck) ─────────── */
        :root {
            --ss-ink:#f7f0e6; --ss-ink-soft:#d8cfbf;
            --ss-bg:#0d1730; --ss-surface:#1a2750; --ss-surface-2:#152040;
            --ss-line:rgba(231,189,106,.26); --ss-line-2:rgba(244,236,224,.14);
            --ss-muted:#b6ac9b;
            --ss-gold:#edc878; --ss-gold-deep:#f6dfa6; --ss-gold-wash:rgba(231,189,106,.16);
            --ss-red:#e891a0; --ss-red-wash:rgba(217,106,122,.18);
            --ss-sage:#8fdca0; --ss-sage-wash:rgba(120,200,140,.16);
            --ss-violet:#c4a6f7; --ss-violet-wash:rgba(168,120,247,.16);
            --ss-bar:#1b2a52; --ss-bar-text:#f6dfa6;
        }
        /* ── LIGHT THEME (Sacred Stone) — dark is the default; this flips the palette ── */
        html[data-theme="light"] {
            --ss-ink:#15213d; --ss-ink-soft:#3f4d6b;
            --ss-bg:#f4f1ea; --ss-surface:#fffdf8; --ss-surface-2:#f7f2e8;
            --ss-line:rgba(176,138,58,.30); --ss-line-2:rgba(13,23,48,.09);
            --ss-muted:#6c768e;
            --ss-gold:#b6892f; --ss-gold-deep:#936c1f; --ss-gold-wash:rgba(176,138,58,.14);
            --ss-red:#c4566a; --ss-red-wash:rgba(196,86,106,.12);
            --ss-sage:#3f9d6b; --ss-sage-wash:rgba(63,157,107,.12);
            --ss-violet:#7a5bb0; --ss-violet-wash:rgba(122,91,176,.12);
            --ss-bar:#1b2a52; --ss-bar-text:#f6dfa6; /* navy+gold accent bar kept in both modes */
        }
        body { background: var(--ss-bg) !important; color: var(--ss-ink); }
        h1,h2,h3 { font-family:'Fraunces', Georgia, serif !important; letter-spacing:-0.01em; color:var(--ss-ink); }

        /* layered Pacific Noir canvas (gold + ember + sea over deep navy) + tapa lattice */
        .pn-canvas{
            background:
              radial-gradient(1100px 760px at 80% -6%, rgba(231,189,106,.22), transparent 62%),
              radial-gradient(1000px 760px at 14% 2%, rgba(231,189,106,.16), transparent 60%),
              radial-gradient(1050px 950px at 96% 55%, rgba(231,189,106,.13), transparent 62%),
              radial-gradient(1000px 900px at 6% 60%, rgba(231,189,106,.12), transparent 62%),
              radial-gradient(980px 880px at 12% 104%, rgba(232,130,90,.16), transparent 60%),
              radial-gradient(980px 880px at 88% 106%, rgba(232,130,90,.12), transparent 60%),
              radial-gradient(1300px 1000px at 50% 45%, rgba(42,84,118,.40), transparent 72%),
              linear-gradient(160deg, #0e1830 0%, #0c1426 46%, #101a32 100%) !important;
        }
        /* Ngatu pinwheel (manulua) tapa texture, woven faintly across the canvas */
        .pn-canvas::after{
            content:"";position:absolute;inset:0;opacity:.05;pointer-events:none;
            background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 80 80'><g fill='%23e7bd6a'><polygon points='0,0 40,0 40,40'/><polygon points='80,0 80,40 40,40'/><polygon points='80,80 40,80 40,40'/><polygon points='0,80 0,40 40,40'/></g></svg>");
            background-size:104px 104px;
        }
        /* Light-mode canvas — warm cream paper with a soft gold wash */
        html[data-theme="light"] .pn-canvas{
            background:
              radial-gradient(1100px 620px at 82% -8%, rgba(176,138,58,.14), transparent 60%),
              radial-gradient(900px 700px at 8% 108%, rgba(60,90,160,.10), transparent 60%),
              linear-gradient(168deg, #efe9dc 0%, #f4f1ea 60%, #faf7f0 100%) !important;
        }
        html[data-theme="light"] .pn-canvas::after{
            opacity:.045;
            background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 80 80'><g fill='%2315213d'><polygon points='0,0 40,0 40,40'/><polygon points='80,0 80,40 40,40'/><polygon points='80,80 40,80 40,40'/><polygon points='0,80 0,40 40,40'/></g></svg>");
        }

        /* ── Ngatu band: a woven tapa divider (matches the EQ lessons app) ── */
        .ngatu-band{
            height:16px;width:100%;border-top:1.5px solid var(--ss-gold);border-bottom:1.5px solid var(--ss-gold);
            background:var(--ss-surface-2) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><g fill='%23b6892f'><polygon points='0,0 16,0 16,16'/><polygon points='32,0 32,16 16,16'/><polygon points='32,32 16,32 16,16'/><polygon points='0,32 0,16 16,16'/></g></svg>");
            background-repeat:repeat-x;background-position:center;background-size:auto 16px;border-radius:2px;
        }
        html:not([data-theme="light"]) .ngatu-band{
            background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'><g fill='%23edc878'><polygon points='0,0 16,0 16,16'/><polygon points='32,0 32,16 16,16'/><polygon points='32,32 16,32 16,16'/><polygon points='0,32 0,16 16,16'/></g></svg>");
        }
        /* Ngatu (tapa) overlay usable on panels */
        .ngatu-panel{ position:relative; overflow:hidden; }
        .ngatu-panel::before{
            content:"";position:absolute;inset:0;opacity:.12;pointer-events:none;z-index:0;
            background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'><g fill='none' stroke='%23e7bd6a' stroke-width='1.2'><path d='M80 6 L154 80 L80 154 L6 80 Z'/><path d='M80 30 L130 80 L80 130 L30 80 Z'/><path d='M80 54 L106 80 L80 106 L54 80 Z'/><path d='M80 6 L80 154 M6 80 L154 80'/></g><circle cx='80' cy='80' r='3.4' fill='%23e7bd6a'/></svg>");
            background-size:130px 130px;
        }
        .ngatu-panel > *{ position:relative; z-index:1; }

        /* ── Sleek primary tab bar (numbered) ── */
        .tabbar{ display:flex; gap:2px; overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none;
            border-bottom:1px solid var(--ss-line-2); padding:0 2px; }
        .tabbar::-webkit-scrollbar{ display:none; }
        .tabchip{ flex:0 0 auto; display:flex; align-items:center; gap:9px; background:transparent; border:0;
            color:var(--ss-muted); padding:13px 16px 12px; font-weight:700; font-size:13.5px; letter-spacing:.005em;
            white-space:nowrap; cursor:pointer; border-bottom:2.5px solid transparent; transition:color .15s, border-color .15s;
            font-family:'Manrope',sans-serif; }
        .tabchip:hover{ color:var(--ss-ink); }
        .tabchip .tn{ font-family:'Fraunces',Georgia,serif; font-style:italic; font-size:12px; color:var(--ss-muted); opacity:.8; }
        .tabchip .tic{ font-size:15px; line-height:1; }
        .tabchip[aria-selected="true"]{ color:var(--ss-ink); border-bottom-color:var(--ss-gold); }
        .tabchip[aria-selected="true"] .tn{ color:var(--ss-gold); opacity:1; }
        .tabchip .tbadge{ font-family:'Manrope'; font-style:normal; font-size:10.5px; font-weight:800; line-height:1;
            background:var(--ss-gold-wash); color:var(--ss-gold); border:1px solid var(--ss-line); border-radius:999px; padding:3px 6px; }
        @media(max-width:640px){ .tabchip{ padding:11px 12px 10px; font-size:12.5px; gap:7px; } .tabchip .tn{ font-size:11px; } }

        /* ── Compact segmented scope toggle (Investigators / Returning) ── */
        .seg{ display:inline-flex; padding:3px; gap:3px; background:var(--ss-surface-2); border:1px solid var(--ss-line-2);
            border-radius:12px; }
        .seg button{ display:flex; align-items:center; gap:6px; border:0; background:transparent; cursor:pointer;
            color:var(--ss-muted); font-weight:700; font-size:13px; padding:8px 14px; border-radius:9px; transition:.15s;
            font-family:'Manrope',sans-serif; white-space:nowrap; }
        .seg button .cnt{ font-size:11px; font-weight:700; opacity:.7; }
        .seg button[aria-pressed="true"]{ background:linear-gradient(135deg,var(--ss-gold),var(--ss-gold-deep));
            color:#1a1206; box-shadow:0 4px 14px rgba(231,189,106,.28); }
        .seg button[aria-pressed="true"] .cnt{ opacity:.85; }

        /* ── Quiet icon buttons in the header utility row ── */
        .iconbtn{ display:inline-flex; align-items:center; justify-content:center; gap:6px;
            width:auto; min-width:40px; height:40px; padding:0 11px; border-radius:11px; cursor:pointer;
            background:var(--ss-surface-2); border:1px solid var(--ss-line-2); color:var(--ss-ink-soft);
            font-size:14px; font-weight:700; transition:.15s; font-family:'Manrope',sans-serif; }
        .iconbtn:hover{ border-color:var(--ss-line); color:var(--ss-ink); }
        .iconbtn.gold{ background:linear-gradient(135deg,var(--ss-gold),var(--ss-gold-deep)); color:#1a1206; border-color:var(--ss-gold-deep); }

        /* ── Image slots (uploadable, shared via Firebase) ── */
        .imgslot{ position:relative; display:block; width:100%; border-radius:16px; overflow:hidden; margin-bottom:16px;
            border:1px solid var(--ss-line); box-shadow:0 10px 30px rgba(0,0,0,.12); background:var(--ss-surface-2); }
        .imgslot img{ display:block; width:auto; max-width:100%; height:auto; max-height:520px; margin:0 auto; }
        .imgslot.empty{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
            min-height:190px; border:2px dashed var(--ss-line); box-shadow:none; background:var(--ss-surface-2);
            cursor:pointer; text-align:center; padding:24px; transition:.15s; }
        .imgslot.empty:hover{ border-color:var(--ss-gold); background:var(--ss-gold-wash); }
        .imgslot-ico{ font-size:30px; }
        .imgslot-label{ font-weight:800; color:var(--ss-ink-soft); font-size:14px; }
        .imgslot-hint{ font-size:11.5px; color:var(--ss-muted); }
        .imgslot-tools{ position:absolute; top:10px; right:10px; display:flex; gap:6px; opacity:0; transition:.15s; }
        .imgslot:hover .imgslot-tools{ opacity:1; }
        .imgbtn{ display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:9px;
            background:rgba(15,20,40,.62); color:#fff; border:0; cursor:pointer; font-size:14px; }
        .imgbtn:hover{ background:rgba(15,20,40,.88); }
        @media(hover:none){ .imgslot-tools{ opacity:.92; } }

        /* 21-Day Promise: portrait sits INSIDE the intro card (WJ8 layout) */
        .promise-intro.has-side{ display:flex; gap:22px; align-items:center; }
        .promise-intro.has-side .pi-text{ flex:1; min-width:0; }
        .promise-intro.has-side .pi-side{ flex:0 0 36%; max-width:270px; min-width:0; }
        .promise-intro.has-side .pi-side .imgslot{ margin-bottom:0; }
        .promise-intro.has-side .pi-side .imgslot img{ width:100%; max-height:360px; object-fit:cover; }
        .promise-intro.has-side .pi-side .imgslot.empty{ min-height:200px; }
        @media(max-width:640px){
            .promise-intro.has-side{ flex-direction:column; align-items:stretch; }
            .promise-intro.has-side .pi-side{ flex:none; max-width:none; width:100%; }
        }

        /* ── Shared panel + section heads for new tabs ── */
        .ss-panel{ background:var(--ss-surface); border:1px solid var(--ss-line); border-radius:18px;
            box-shadow:0 14px 40px rgba(0,0,0,.18); padding:22px; }
        .ss-eyebrow{ font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--ss-gold); font-weight:700; }
        .ss-h2{ font-family:'Fraunces',Georgia,serif; font-size:clamp(22px,5vw,30px); color:var(--ss-ink); margin:6px 0 0; }
        .ss-blockhead{ display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin:26px 0 12px; }
        .ss-blockhead h3{ font-family:'Fraunces',Georgia,serif; font-size:19px; color:var(--ss-ink); margin:0; }
        .ss-blockhead .en{ font-size:13px; color:var(--ss-muted); }
        .ss-input{ width:100%; min-width:0; background:var(--ss-surface-2); border:1px solid var(--ss-line-2);
            color:var(--ss-ink); border-radius:11px; padding:11px 13px; font-size:14px; font-family:'Manrope',sans-serif; }
        .ss-input:focus{ outline:none; border-color:var(--ss-gold); }

        /* 21-Day Promise */
        .promise-intro{ padding:22px; border-radius:16px; border:1px solid var(--ss-line);
            background:radial-gradient(600px 300px at 90% -40%,var(--ss-gold-wash),transparent 60%), var(--ss-surface-2); }
        .promise-intro .formula{ font-family:'Fraunces',Georgia,serif; font-size:clamp(16px,4.4vw,22px); color:var(--ss-gold-deep); letter-spacing:.02em; }
        .promise-intro p{ font-size:14.5px; color:var(--ss-ink-soft); margin:14px 0 0; max-width:66ch; line-height:1.6; }
        .promise-intro p .en{ display:block; color:var(--ss-muted); font-size:13px; margin-top:8px; }
        .promise-intro .vref{ margin-top:14px; font-style:italic; font-family:'Fraunces',Georgia,serif; color:var(--ss-gold); font-size:14px; }
        .promise-progress{ display:flex; align-items:center; gap:14px; margin:16px 0; padding:14px 18px; border-radius:14px;
            border:1px solid var(--ss-line); background:var(--ss-surface-2); }
        .promise-progress .big{ font-family:'Fraunces',Georgia,serif; font-size:28px; color:var(--ss-gold-deep); font-variant-numeric:tabular-nums; }
        .promise-progress .lbl{ font-size:12px; color:var(--ss-muted); }
        .promise-progress .pbar{ flex:1; height:9px; border-radius:999px; background:var(--ss-surface); overflow:hidden; border:1px solid var(--ss-line-2); }
        .promise-progress .pbar > i{ display:block; height:100%; width:0; background:linear-gradient(90deg,var(--ss-gold),var(--ss-gold-deep)); transition:width .5s; }
        .prayfor{ display:grid; gap:8px; }
        .prayfor.two{ grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); align-items:start; }
        .praygroup-title{ font-size:11.5px; font-weight:800; color:var(--ss-muted); text-transform:uppercase; letter-spacing:.09em; margin:0 0 8px; display:flex; align-items:center; gap:7px; }
        .praygroup-title .n{ color:var(--ss-gold); }
        .prayname{ display:flex; align-items:center; gap:10px; padding:10px 13px; border:1px solid var(--ss-line-2); border-radius:11px; background:var(--ss-surface-2); font-size:14.5px; font-weight:600; color:var(--ss-ink); margin-bottom:7px; }
        .prayname .dot{ width:8px; height:8px; border-radius:999px; flex:0 0 auto; }
        .praynote{ font-size:13px; color:var(--ss-muted); padding:10px 13px; border:1px dashed var(--ss-line); border-radius:11px; }
        .daygrid{ display:grid; gap:8px; }
        .dayrow{ display:grid; grid-template-columns:46px 1fr; gap:10px; align-items:stretch; border:1px solid var(--ss-line-2);
            border-radius:12px; background:var(--ss-surface-2); overflow:hidden; }
        .dayrow.full{ border-color:var(--ss-sage); background:var(--ss-sage-wash); }
        .daynum{ display:flex; align-items:center; justify-content:center; font-family:'Fraunces',Georgia,serif; font-size:20px;
            font-weight:700; color:var(--ss-gold); background:var(--ss-surface); border-right:1px solid var(--ss-line-2); }
        .dayrow.full .daynum{ color:var(--ss-sage); }
        .daymain{ padding:11px 13px; display:flex; flex-wrap:wrap; align-items:center; gap:10px 16px; }
        .scrip{ flex:1 1 160px; min-width:0; }
        .scrip a{ font-weight:700; font-size:15px; color:var(--ss-ink); text-decoration:none; }
        .scrip a:hover{ color:var(--ss-gold); }
        .scrip .sub{ font-size:11px; color:var(--ss-muted); }
        .checks{ display:flex; gap:14px; flex:0 0 auto; }
        .chk{ display:flex; align-items:center; gap:7px; font-size:12px; color:var(--ss-muted); font-weight:600; cursor:pointer; }
        .chk input{ width:19px; height:19px; accent-color:var(--ss-gold); }
        .chk.read input{ accent-color:var(--ss-sage); }
        .commit{ display:flex; align-items:flex-start; gap:11px; padding:13px 15px; border-radius:11px; border:1px solid var(--ss-line-2); background:var(--ss-surface-2); margin-bottom:8px; cursor:pointer; }
        .commit input{ flex:0 0 auto; width:20px; height:20px; margin-top:1px; accent-color:var(--ss-gold); }
        .commit .txt{ font-size:14.5px; color:var(--ss-ink); }
        .commit .txt .en{ display:block; color:var(--ss-muted); font-size:13px; margin-top:3px; }
        .contacts{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; }
        .contact{ display:grid; grid-template-columns:1fr 130px; gap:8px; }

        /* Book of Mormon Challenge */
        .bom-hero{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:8px; }
        .bom-stat{ padding:16px 18px; border-radius:14px; border:1px solid var(--ss-line); background:var(--ss-surface-2); }
        .bom-stat .num{ font-family:'Fraunces',Georgia,serif; font-size:30px; color:var(--ss-gold-deep); line-height:1; font-variant-numeric:tabular-nums; }
        .bom-stat .lbl{ font-size:12px; color:var(--ss-muted); margin-top:6px; }
        .bom-card{ border:1px solid var(--ss-line-2); border-radius:14px; background:var(--ss-surface-2); padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
        .bom-card .bom-top{ display:flex; align-items:center; gap:10px; }
        .bom-card .flame{ font-size:22px; flex:0 0 auto; }
        .bom-status{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:800; padding:5px 10px; border-radius:999px; cursor:pointer; border:1px solid var(--ss-line); white-space:nowrap; }
        .bom-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
        .ss-btn{ display:inline-flex; align-items:center; gap:8px; border:0; cursor:pointer; font-family:'Manrope',sans-serif;
            font-weight:700; font-size:14px; padding:11px 18px; border-radius:12px; transition:.15s; }
        .ss-btn.primary{ background:linear-gradient(135deg,var(--ss-gold),var(--ss-gold-deep)); color:#1a1206; }
        .ss-btn.ghost{ background:var(--ss-surface-2); color:var(--ss-ink-soft); border:1px solid var(--ss-line-2); }
        @media(max-width:560px){ .contact{ grid-template-columns:1fr; } .checks{ gap:10px; } .ss-panel{ padding:16px; } }

        /* surfaces -> dark glass panels */
        [class~="bg-white"],[class~="bg-white/90"],[class~="bg-white/95"],[class~="bg-white/98"],[class~="bg-gray-50"]{ background-color:var(--ss-surface)!important; }
        [class~="bg-gray-100"]{ background-color:var(--ss-surface-2)!important; }
        [class~="bg-gray-200"],[class~="bg-gray-300"]{ background-color:rgba(244,236,224,.10)!important; }
        [class~="bg-amber-50"],[class~="bg-amber-100"],[class~="bg-blue-50"],[class~="bg-blue-100"],[class~="bg-purple-50"],[class~="bg-purple-100"],[class~="bg-indigo-50"],[class~="bg-indigo-100"],[class~="bg-yellow-100"]{ background-color:var(--ss-gold-wash)!important; }
        [class~="bg-amber-200"]{ background-color:rgba(231,189,106,.20)!important; }
        [class~="bg-green-50"],[class~="bg-green-100"]{ background-color:var(--ss-sage-wash)!important; }
        [class~="bg-red-50"],[class~="bg-red-100"],[class~="bg-rose-50"],[class~="bg-rose-100"],[class~="bg-rose-200"]{ background-color:var(--ss-red-wash)!important; }
        [class~="bg-red-500"]{ background-color:var(--ss-red)!important; }
        [class~="bg-green-500"],[class~="bg-emerald-500"]{ background-color:var(--ss-sage)!important; }

        /* flatten gradients, re-solid by family using the Noir palette */
        [class*="bg-gradient"]:not(.pn-canvas){ background-image:none!important; }
        [class~="from-amber-500"],[class~="from-amber-600"],[class~="from-green-500"],[class~="from-green-600"],[class~="from-indigo-500"],[class~="from-indigo-600"],[class~="from-purple-600"],[class~="from-orange-500"],[class~="from-yellow-400"],[class~="from-teal-500"],[class~="from-teal-600"],[class~="from-blue-600"],[class~="from-pink-500"],[class~="from-cyan-500"],[class~="from-cyan-600"]{ background-color:var(--ss-bar)!important; color:var(--ss-bar-text)!important; border-color:var(--ss-line)!important; }

                                    ${visibleMonths.map(m => {
                                        const isCurrentM = m === currentMonthName;
                                        return `<th class="text-white p-2 md:p-5 text-center font-black text-xs md:text-base ${state.trackerView === 'month' ? 'min-w-[200px]' : 'min-w-[65px]'} ${state.trackerView === 'month' && isCurrentM ? 'bg-white/20' : ''}">${m}</th>`;

                            <tbody>
                                ${currentList.map((person, idx) => {
                                    const stats = getProgressStats(person);

                                    return `
                                        <tr style="border-bottom:1px solid var(--ss-line);">
                                            <td class="p-2 md:p-4 sticky left-0 z-10 border-r ${accentBorder}" style="background:var(--ss-surface);">
                                                <div class="flex items-center gap-2">
                                                    <button onclick="openEmojiPicker(${person.id})" class="text-2xl md:text-3xl hover:scale-110 transition-transform flex-shrink-0" title="${currentLang==='to'?'Liliu fakaʻilonga':'Change avatar'}">${person.emoji||'👤'}</button>
                                                    <div class="flex-1 min-w-0">
                                                        <input type="text" value="${person.name || ''}" onchange="updateName(${person.id}, this.value)" placeholder="${idx + 1}. ${currentLang==='to'?'Hingoa...':'Name...'}" class="w-full px-2 py-1.5 border-2 border-amber-200 rounded-lg focus:border-amber-500 focus:outline-none font-bold text-sm shadow-sm" />
                                                        <div class="mt-1.5">
                                                            ${(() => {
                                                                const streak = (() => { let s=0; for(let i=new Date().getMonth();i>=0;i--){ if((person.progress?.[MONTHS[i]]?.length||0)>0)s++;else break;} return s; })();
                                                                const totalActs = Object.values(person.progress||{}).flat().length;
                                                                const thisMonthActs = person.progress?.[currentMonthName]?.length||0;
                                                                const GOAL = 5;
                                                                const pct = Math.min(100, Math.round((thisMonthActs / GOAL) * 100));
                                                                if (!person.name) return '';
                                                                return `
                                                                <div class="ss-presence">
                                                                    <div class="ss-presence-track"><div class="ss-presence-fill" style="width:${pct}%;${thisMonthActs===0?'background:var(--ss-line-2);':''}"></div></div>
                                                                    <div class="ss-presence-meta">
                                                                        ${streak > 0 ? `<span class="hot">${streak} mo streak</span>` : ''}
                                                                        <span>${thisMonthActs}/${GOAL} this mo</span>
                                                                        ${totalActs > 0 ? `<span>· ${totalActs} total</span>` : ''}
                                                                        ${hasNoActivity ? `<span class="warn">needs contact</span>` : ''}
                                                                    </div>
                                                                </div>`;

                                                        </div>
                                                    </div>
                                                </div>
                                            </td>
                                            ${visibleMonths.map(month => {

                                                const isCurrentM = month === currentMonthName;
                                                const cellBg = '';
                                                return `<td class="p-2 md:p-4 text-center border-l ${state.trackerView === 'month' ? 'min-w-[200px]' : ''}" style="border-color:var(--ss-line);${isCurrentM ? 'background:var(--ss-gold-wash);' : ''}">
                                                    ${state.trackerView === 'month' ? `
                                                    <div class="space-y-2">
                                                        <div class="min-h-[80px] flex flex-wrap items-center justify-center gap-1.5 p-2.5 rounded-xl" style="background:var(--ss-surface-2);border:1px solid var(--ss-line);">
                                                            ${monthData.length > 0

                                                                    return `<span class="ss-chip" title="${ind ? (currentLang==='to'?ind.toName:ind.name) : code}"><span class="ss-dot" style="background:${indDot(ind||code)}"></span>${code}</span>`;
                                                                }).join('')
                                                                : `<div class="text-center" style="color:var(--ss-muted);">
                                                                    <div class="text-2xl mb-0.5" style="color:var(--ss-line-2);">+</div>
                                                                    <div class="text-xs font-semibold">${t('Tap to log')}</div>
                                                                </div>`}
                                                        </div>
                                                        <button onclick="openIndicatorModal(${person.id}, '${month}')"
                                                            class="w-full py-2 text-xs rounded-xl transition-all" style="font-weight:600;${monthData.length > 0 ? 'background:var(--ss-gold-wash);color:var(--ss-gold-deep);border:1px solid var(--ss-line);' : 'background:var(--ss-bar);color:var(--ss-bar-text);'}">
                                                            ${monthData.length > 0 ? `${t('Edit Activities')}` : `+ ${t('Log Activities')}`}
                                                        </button>

                                                        ${monthData.length > 0

                                                            : `<button onclick="openIndicatorModal(${person.id}, '${month}')" class="text-2xl transition-colors" style="color:var(--ss-line-2);">+</button>`}
                                                    </div>
                                                    ${monthData.length > 0 ? `<button onclick="openIndicatorModal(${person.id}, '${month}')" class="text-xs font-bold" style="color:var(--ss-gold-deep);">${t('Edit')}</button>` : ''}`}
                                                </td>`;
                                            }).join('')}
                                            <!-- ── Unified Plan column ── -->
                                            <td class="p-2 md:p-3 mobile-hide min-w-[220px]">
                                                <select onchange="updateCombinedAssignment(${person.id}, this.value)" class="w-full px-2 py-1.5 border border-rose-200 rounded-lg text-xs font-semibold mb-1.5 focus:outline-none focus:border-rose-400" title="Who is responsible for this person">

                                                    <option value="Young Women" ${person.assignedTo==='Young Women'?'selected':''}>⭐ Young Women</option>

        function renderWeekBadge() {
            const today = new Date(); today.setHours(0,0,0,0);
            const in7 = new Date(today); in7.setDate(today.getDate()+7);
            const allPeople = [...state.investigators, ...state.returning].filter(p => p.name);
            const overdue = allPeople.filter(p => p.nextContactDate && parseLocalDate(p.nextContactDate) < today).length;
            const thisWeek = allPeople.filter(p => p.nextContactDate && parseLocalDate(p.nextContactDate) >= today && parseLocalDate(p.nextContactDate) <= in7).length;
            const total = overdue + thisWeek;
            if (total === 0) return '';
            return `<span class="ml-1 ${overdue > 0 ? 'bg-red-500' : 'bg-orange-400'} text-white rounded-full px-1.5 text-xs font-black">${total}</span>`;
        }

        function renderThisWeek() {
            const today = new Date(); today.setHours(0,0,0,0);
            const in7 = new Date(today); in7.setDate(today.getDate()+7);
            // Filter based on activeTab — default shows all, but user can toggle
            const weekFilter = state.weekFilter || 'all';
            const rawInv = state.investigators.map(p=>({...p,_tab:'investigators'})).filter(p=>p.name);
            const rawRet = state.returning.map(p=>({...p,_tab:'returning'})).filter(p=>p.name);
            const allPeople = weekFilter === 'investigators' ? rawInv : weekFilter === 'returning' ? rawRet : [...rawInv, ...rawRet];
            const totalContacts = state.investigators.filter(p=>p.name).length + state.returning.filter(p=>p.name).length;

            function getDaysUntil(dateStr) {
                if (!dateStr) return null;
                const d = parseLocalDate(dateStr); d.setHours(0,0,0,0);
                return Math.ceil((d - today) / (1000*60*60*24));
            }
            function getDaysSinceContact(dateStr) {
                if (!dateStr) return null;
                const d = parseLocalDate(dateStr); d.setHours(0,0,0,0);
                return Math.ceil((today - d) / (1000*60*60*24));
            }

            const completed = allPeople.filter(p => p.taskDone).sort((a,b)=> (b.taskDoneDate||'').localeCompare(a.taskDoneDate||''));
            const active = allPeople.filter(p => !p.taskDone);
            const overdue = active.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) < 0).sort((a,b)=>parseLocalDate(a.nextContactDate)-parseLocalDate(b.nextContactDate));
            const dueThisWeek = active.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) >= 0 && getDaysUntil(p.nextContactDate) <= 7).sort((a,b)=>parseLocalDate(a.nextContactDate)-parseLocalDate(b.nextContactDate));
            const upcoming = active.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) > 7).sort((a,b)=>parseLocalDate(a.nextContactDate)-parseLocalDate(b.nextContactDate));
            const noDate = active.filter(p => !p.nextContactDate);

            function renderPersonCard(p, urgency) {
                const days = getDaysUntil(p.nextContactDate);
                const sinceContact = getDaysSinceContact(p.lastContactDate);
                const accent = { overdue:'#f87171', today:'#fb923c', week:'#fbbf24', upcoming:'#4ade80', none:'#94a3b8', done:'#34d399' }[urgency] || '#94a3b8';
                const badgeStyle = {
                    overdue:'background:#ef4444;color:#fff',
                    today:'background:#f97316;color:#fff',
                    week:'background:#f59e0b;color:#1a1206',
                    upcoming:'background:#16a34a;color:#fff',
                    none:'background:rgba(255,255,255,.12);color:var(--ss-ink-soft)',
                    done:'background:#16a34a;color:#fff'
                }[urgency] || 'background:rgba(255,255,255,.12);color:var(--ss-ink-soft)';
                let badgeText = '';
                if (urgency === 'done') badgeText = `✅ ${t('Completed')}${p.taskDoneDate ? ' · '+p.taskDoneDate.slice(5) : ''}`;
                else if (days === null) badgeText = '⚪ No date';
                else if (days < 0) badgeText = `🔴 ${Math.abs(days)}d overdue`;
                else if (days === 0) badgeText = '🔥 Today!';
                else if (days === 1) badgeText = '⚡ Tomorrow';
                else badgeText = `📅 In ${days} days`;

                const tabIcon = p._tab === 'investigators' ? '👤' : '💙';
                const isDone = urgency === 'done';
                const fieldStyle = 'background:rgba(255,255,255,.06);border:1px solid var(--ss-line-2);color:var(--ss-ink)';
                return `
                <div class="tw-card rounded-xl p-4 transition-all" style="background:rgba(255,255,255,.05);border:1px solid var(--ss-line-2);border-left:4px solid ${accent};">
                    <div class="flex items-start justify-between gap-3 flex-wrap">
                        <div class="flex items-start gap-3 flex-1 min-w-0">
                            <span class="text-2xl flex-shrink-0">${p.emoji||tabIcon}</span>
                            <div class="min-w-0 flex-1">
                                <div class="font-black text-base leading-tight ${isDone ? 'line-through opacity-60' : ''}" style="color:var(--ss-ink);">${p.name || '(unnamed)'}</div>
                                <div class="flex items-center gap-2 mt-1 flex-wrap">
                                    ${p.assignedTo
                                        ? `<span class="text-xs px-2 py-0.5 rounded-full font-bold" style="background:var(--ss-gold-wash);color:var(--ss-gold-deep);">👤 ${p.assignedTo}</span>`
                                        : `<span class="text-xs px-2 py-0.5 rounded-full font-bold" style="background:var(--ss-red-wash);color:var(--ss-red);">⚠️ Unassigned</span>`}
                                    <span class="text-xs font-bold" style="color:${p._tab==='investigators'?'var(--ss-gold)':'var(--ss-sage)'};">${p._tab==='investigators'?'Investigator':'Returning'}</span>
                                </div>

                                   <button onclick="toggleTaskDone('${p.id}','${p._tab}')" class="text-xs font-black px-3 py-1.5 rounded-lg transition-all" style="background:var(--ss-sage-wash);border:1px solid var(--ss-sage);color:var(--ss-sage);">✓ ${t('Mark Done')}</button>
                                   <input type="date" value="${p.nextContactDate||''}" onchange="quickSetDate('${p.id}','${p._tab}',this.value)" class="tw-field text-xs rounded-lg px-2 py-1 focus:outline-none" style="${fieldStyle}" title="Set next contact date" />
                                   <select onchange="logContactActivity('${p.id}','${p._tab}',this.value); this.value='';" class="tw-field text-xs rounded-lg px-2 py-1 focus:outline-none" style="${fieldStyle}" title="Log an activity (also marks contacted)">
                                       <option value="">＋ ${t('Log activity')}</option>
                                       ${INDICATORS.map(i=>`<option value="${i.code}">${i.emoji} ${i.code} — ${currentLang==='to'?i.toName:i.name}</option>`).join('')}
                                   </select>`}
                        </div>
                    </div>
                </div>`;
            }

            // Weekly share summary generator
            function generateWeeklySummary() {
                const lines = ['📋 This Week\'s Focus — Riverton 24th Tongan Ward\n'];
                if (overdue.length) {
                    lines.push('🔴 OVERDUE:');
                    overdue.forEach(p => lines.push(`  • ${p.name}${p.assignedTo?' → '+p.assignedTo:''} — ${p.nextAction||'Contact needed'}`));
                }
                if (dueThisWeek.length) {
                    lines.push('\n🟡 DUE THIS WEEK:');
                    dueThisWeek.forEach(p => {
                        const d = getDaysUntil(p.nextContactDate);
                        const when = d===0?'Today':d===1?'Tomorrow':`${parseLocalDate(p.nextContactDate).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}`;
                        lines.push(`  • ${p.name} — ${when}${p.assignedTo?' ('+p.assignedTo+')':''}: ${p.nextAction||'Follow up'}`);
                    });
                }
                return lines.join('\n');
            }

            const totalAction = overdue.length + dueThisWeek.length;

            return `
            <div class="space-y-5">
                <!-- Header -->
                <div class="rounded-2xl p-5 shadow-xl text-white" style="background:#b5485a;">
                    <div class="flex items-center justify-between flex-wrap gap-3">
                        <div class="flex items-center gap-3">
                            <span class="text-4xl">📋</span>
                            <div>
                                <h2 class="text-2xl font-black">This Week's Focus</h2>
                                <p class="text-rose-200 text-sm font-semibold">Who needs to be contacted and by whom</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 flex-wrap">
                            <!-- Tab filter -->
                            <div class="flex bg-white/20 rounded-xl p-1 gap-1">
                                <button onclick="setWeekFilter('all')" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all ${weekFilter==='all'?'bg-white text-rose-700 shadow':'text-white'}">All</button>
                                <button onclick="setWeekFilter('investigators')" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all ${weekFilter==='investigators'?'bg-white text-rose-700 shadow':'text-white'}">👤 Invest.</button>
                                <button onclick="setWeekFilter('returning')" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all ${weekFilter==='returning'?'bg-white text-rose-700 shadow':'text-white'}">💙 Return.</button>
                            </div>
                            <div class="text-center bg-white/20 rounded-xl px-4 py-2">
                                <div class="text-2xl font-black">${totalAction}</div>
                                <div class="text-xs font-bold text-rose-200">Need Action</div>
                            </div>
                            <button onclick="toggleAddContact()" class="flex items-center gap-2 px-4 py-2.5 bg-white/20 text-white rounded-xl font-black text-sm shadow-lg hover:bg-white/30 transition-all hover-lift">➕ ${t('Add')}</button>
                            <button onclick="sendWeeklyFocus()" class="flex items-center gap-2 px-4 py-2.5 bg-white text-rose-700 rounded-xl font-black text-sm shadow-lg hover:shadow-xl transition-all hover-lift">
                                📱 Send Summary
                            </button>
                        </div>
                    </div>
                </div>

                ${imageSlot('thisweek', { label: t2('Foto ki he Ngāue ʻo e Wikí','Photo (This Week Focus)') })}

                <!-- KPI headline strip -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="rounded-2xl p-4 text-center" style="background:var(--ss-surface);border:1px solid var(--ss-line-2);border-top:3px solid #ef4444;">
                        <div class="text-3xl font-black" style="color:#f87171;">${overdue.length}</div>
                        <div class="text-xs font-bold uppercase tracking-wide" style="color:var(--ss-muted);">${t('Overdue')}</div>
                    </div>
                    <div class="rounded-2xl p-4 text-center" style="background:var(--ss-surface);border:1px solid var(--ss-line-2);border-top:3px solid #f59e0b;">
                        <div class="text-3xl font-black" style="color:#fbbf24;">${dueThisWeek.length}</div>
                        <div class="text-xs font-bold uppercase tracking-wide" style="color:var(--ss-muted);">${t('Due This Week')}</div>
                    </div>
                    <div class="rounded-2xl p-4 text-center" style="background:var(--ss-surface);border:1px solid var(--ss-line-2);border-top:3px solid #94a3b8;">
                        <div class="text-3xl font-black" style="color:var(--ss-ink);">${noDate.length}</div>
                        <div class="text-xs font-bold uppercase tracking-wide" style="color:var(--ss-muted);">${t('Awaiting Date')}</div>
                    </div>
                    <div class="rounded-2xl p-4 text-center" style="background:var(--ss-surface);border:1px solid var(--ss-line-2);border-top:3px solid #16a34a;">
                        <div class="text-3xl font-black" style="color:#34d399;">${completed.length}</div>
                        <div class="text-xs font-bold uppercase tracking-wide" style="color:var(--ss-muted);">${t('Task Completed')}</div>
                    </div>
                </div>

                ${totalContacts === 0 ? `
                <div class="rounded-2xl p-10 text-center" style="background:var(--ss-surface);border:1px dashed var(--ss-line);">
                    <div class="text-5xl mb-3">🌱</div>
                    <h3 class="text-xl font-black mb-1" style="color:var(--ss-ink);">${t('Nobody to follow up with yet')}</h3>
                    <p class="text-sm mb-4" style="color:var(--ss-muted);">${t('Add contacts in the Monthly Tracker first, then assign tasks to them here.')}</p>
                    <button onclick="setViewMode('tracker')" class="px-5 py-2.5 rounded-xl font-black text-sm hover-lift" style="background:linear-gradient(90deg,#d97706,#b45309);color:#fff;">📅 ${t('Go to Monthly Tracker')}</button>
                </div>` : ''}

                ${state.showAddContact && totalContacts > 0 ? `
                <div class="rounded-2xl p-5 shadow-xl border" style="background:var(--ss-surface);border-color:var(--ss-line);">
                    <div class="flex items-center justify-between mb-1">
                        <h3 class="font-black text-lg" style="color:var(--ss-gold-deep);">➕ ${t('Add Task')}</h3>
                        <button onclick="toggleAddContact()" class="text-sm font-bold" style="color:var(--ss-muted);">✕</button>
                    </div>
                    <p class="text-xs mb-3" style="color:var(--ss-muted);">${t('Assign a task to an existing contact. Add new contacts in the Monthly Tracker.')}</p>
                    <div class="grid md:grid-cols-2 gap-3">
                        <select id="twAddPerson" class="tw-field rounded-lg px-3 py-2 text-sm focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid var(--ss-line-2);color:var(--ss-ink);">
                            <option value="">${t('Choose a contact...')}</option>
                            ${[...state.investigators.map(p=>({...p,_tab:'investigators'})), ...state.returning.map(p=>({...p,_tab:'returning'}))].filter(p=>p.name).map(p=>`<option value="${p._tab}:${p.id}">${p._tab==='investigators'?'👤':'💙'} ${p.name}${p.assignedTo?' · '+p.assignedTo:''}</option>`).join('')}
                        </select>
                        <input id="twAddDate" type="date" class="tw-field rounded-lg px-3 py-2 text-sm focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid var(--ss-line-2);color:var(--ss-ink);" title="${t('Due date')}" />
                        <input id="twAddAction" type="text" placeholder="📝 ${t('Add a task / next action...')}" class="tw-field rounded-lg px-3 py-2 text-sm focus:outline-none md:col-span-2" style="background:rgba(255,255,255,.06);border:1px solid var(--ss-line-2);color:var(--ss-ink);" />
                    </div>
                    <button onclick="thisWeekAddTask()" class="mt-3 px-5 py-2.5 rounded-xl font-black text-sm transition-all hover-lift" style="background:linear-gradient(90deg,#16a34a,#15803d);color:#fff;">✓ ${t('Add Task')}</button>
                </div>` : ''}

                ${overdue.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-red-200">
                    <div class="bg-gradient-to-r from-red-500 to-red-600 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">🔴</span>
                        <h3 class="font-black text-white text-lg">Overdue <span class="bg-white/30 text-white text-sm px-2 py-0.5 rounded-full ml-1">${overdue.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${overdue.map(p=>renderPersonCard(p,'overdue')).join('')}</div>
                </div>` : ''}

                ${dueThisWeek.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-yellow-200">
                    <div class="bg-gradient-to-r from-yellow-400 to-orange-400 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">🟡</span>
                        <h3 class="font-black text-yellow-900 text-lg">Due This Week <span class="bg-yellow-900/20 text-yellow-900 text-sm px-2 py-0.5 rounded-full ml-1">${dueThisWeek.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${dueThisWeek.map(p=>renderPersonCard(p,'week')).join('')}</div>
                </div>` : ''}

                ${upcoming.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-green-200">
                    <div class="bg-gradient-to-r from-green-400 to-emerald-500 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">🟢</span>
                        <h3 class="font-black text-white text-lg">Upcoming <span class="bg-white/30 text-white text-sm px-2 py-0.5 rounded-full ml-1">${upcoming.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${upcoming.map(p=>renderPersonCard(p,'upcoming')).join('')}</div>
                </div>` : ''}

                ${noDate.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-gray-200">
                    <div class="bg-gray-200 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">⚪</span>
                        <h3 class="font-black text-gray-700 text-lg">No Contact Date Set <span class="bg-gray-400/20 text-gray-600 text-sm px-2 py-0.5 rounded-full ml-1">${noDate.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${noDate.filter(p=>p.name).map(p=>renderPersonCard(p,'none')).join('')}</div>
                </div>` : ''}

                ${completed.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-green-200">
                    <div class="bg-gradient-to-r from-green-500 to-emerald-600 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">✅</span>
                        <h3 class="font-black text-white text-lg">${t('Task Completed')} <span class="bg-white/30 text-white text-sm px-2 py-0.5 rounded-full ml-1">${completed.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${completed.map(p=>renderPersonCard(p,'done')).join('')}</div>
                </div>` : ''}

                ${allPeople.length === 0 ? `
                <div class="bg-white/95 rounded-2xl shadow-xl p-12 text-center">
                    <div class="text-7xl mb-4">📋</div>
                    <p class="text-xl font-black text-gray-600">No people added yet</p>
                    <p class="text-gray-400 mt-2">Add investigators and returning members first, then set their contact dates.</p>
                </div>` : ''}
            </div>`;
        }

        function addDaysISO(days) {
            const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() + days);
            return d.toISOString().split('T')[0];
        }
        window.markContacted_tab = (id, tab) => {
            const today = new Date().toISOString().split('T')[0];
            const nextDate = addDaysISO(7);
            const apply = p => p.id === parseInt(id) ? { ...p, lastContactDate: today, nextContactDate: nextDate } : p;
            if (tab === 'investigators') state.investigators = state.investigators.map(apply);
            else state.returning = state.returning.map(apply);
            saveToFirebase();
            render();
            showSaveMessage(currentLang==='to'?'✓ Fetuʻutaki ʻosi · fai hoko +7 ʻaho':'✓ Contacted · next follow-up in 7 days');
        };
        window.logContactActivity = (id, tab, code) => {
            if (!code) return;
            const today = new Date();
            const monthKey = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][today.getMonth()];
            const todayISO = today.toISOString().split('T')[0];
            const nextDate = addDaysISO(7);
            const idNum = parseInt(id);
            const apply = p => {
                if (p.id !== idNum) return p;
                const prog = { ...(p.progress||{}) };
                const month = prog[monthKey] || [];
                if (!month.includes(code)) prog[monthKey] = [...month, code];
                return { ...p, progress: prog, lastContactDate: todayISO, nextContactDate: nextDate };
            };
            if (tab === 'investigators') state.investigators = state.investigators.map(apply);
            else state.returning = state.returning.map(apply);
            saveToFirebase();
            render();
            const ind = INDICATORS.find(i => i.code === code);
            showSaveMessage('✓ ' + (ind ? ind.emoji+' '+code : code) + ' · ' + (currentLang==='to'?'fetuʻutaki ʻosi':'logged & contacted'));
        };

        window.quickSetDate = (id, tab, dateVal) => {
            const idNum = parseInt(id);
            if (tab === 'investigators') state.investigators = state.investigators.map(p => p.id === idNum ? { ...p, nextContactDate: dateVal } : p);
            else state.returning = state.returning.map(p => p.id === idNum ? { ...p, nextContactDate: dateVal } : p);
            saveToFirebase();
            render();
        };

        window.toggleTaskDone = (id, tab) => {
            const idNum = parseInt(id);
            const today = new Date().toISOString().split('T')[0];
            const flip = p => p.id === idNum ? { ...p, taskDone: !p.taskDone, taskDoneDate: !p.taskDone ? today : '' } : p;
            if (tab === 'investigators') state.investigators = state.investigators.map(flip);
            else state.returning = state.returning.map(flip);
            saveToFirebase();
            render();
        };

        window.quickSetNotes = (id, tab, val) => {
            const idNum = parseInt(id);
            if (tab === 'investigators') state.investigators = state.investigators.map(p => p.id === idNum ? { ...p, notes: val } : p);
            else state.returning = state.returning.map(p => p.id === idNum ? { ...p, notes: val } : p);
            saveToFirebase();
        };

        window.sendWeeklyFocus = () => {
            const today = new Date(); today.setHours(0,0,0,0);
            const in7 = new Date(today); in7.setDate(today.getDate()+7);
            const allPeople = [...state.investigators.map(p=>({...p,_tab:'investigators'})), ...state.returning.map(p=>({...p,_tab:'returning'}))].filter(p=>p.name);
            function getDaysUntil(dateStr) {
                if (!dateStr) return null;
                const d = parseLocalDate(dateStr); d.setHours(0,0,0,0);
                return Math.ceil((d - today) / (1000*60*60*24));
            }
            const overdue = allPeople.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) < 0);
            const dueThisWeek = allPeople.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) >= 0 && getDaysUntil(p.nextContactDate) <= 7);
            const lines = ['📋 This Week\'s Focus — Riverton 24th Tongan Ward\n'];
            if (overdue.length) {
                lines.push('🔴 OVERDUE:');
                overdue.forEach(p => lines.push(`  • ${p.name}${p.assignedTo?' → '+p.assignedTo:''}: ${p.nextAction||'Contact needed'}`));
            }
            if (dueThisWeek.length) {
                lines.push('\n🟡 DUE THIS WEEK:');
                dueThisWeek.forEach(p => {
                    const d = getDaysUntil(p.nextContactDate);
                    const when = d===0?'Today':d===1?'Tomorrow':`${parseLocalDate(p.nextContactDate).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}`;
                    lines.push(`  • ${p.name} — ${when}${p.assignedTo?' ('+p.assignedTo+')':''}: ${p.nextAction||'Follow up'}`);
                });
            }
            if (!overdue.length && !dueThisWeek.length) lines.push('✅ No urgent contacts this week!');
            const text = lines.join('\n');
            if (navigator.share) {
                navigator.share({ title: 'This Week\'s Focus', text });
            } else {
                navigator.clipboard.writeText(text).then(() => showSaveMessage('✓ Weekly summary copied to clipboard!'));
            }
        };

        function renderActionBoard() {
            const today = new Date(); today.setHours(0,0,0,0);
            const currentMonthKey = MONTHS[today.getMonth()];
            const allPeople = [...state.investigators.map(p=>({...p,_tab:'investigators'})), ...state.returning.map(p=>({...p,_tab:'returning'}))].filter(p=>p.name);
            const boardFilter = state.boardFilter || 'all';
            const filteredPeople = boardFilter === 'all' ? allPeople : allPeople.filter(p => (p.assignment || p.assignedTo) === boardFilter);

            function getColumn(p) {
                const allActs = Object.values(p.progress||{}).flat();
                const hasBaptism = allActs.includes('B') || allActs.includes('C');
                const hasBaptismDate = allActs.includes('BD');
                const totalActs = allActs.length;

                if (hasBaptism || hasBaptismDate) return 'milestone';
                if (totalActs === 0) return 'new';

                // Check recency: prefer explicit lastContactDate, fall back to most recent month with activity
                let daysSinceContact = null;
                if (p.lastContactDate) {
                    daysSinceContact = Math.ceil((today - parseLocalDate(p.lastContactDate)) / (1000*60*60*24));
                } else {
                    // Find most recent month with activity as proxy for last contact
                    for (let i = today.getMonth(); i >= 0; i--) {
                        if ((p.progress?.[MONTHS[i]]?.length||0) > 0) {
                            // Approximate: use the last day of that month
                            const approxDate = new Date(today.getFullYear(), i+1, 0);
                            daysSinceContact = Math.ceil((today - approxDate) / (1000*60*60*24));
                            break;
                        }
                    }
                }
                if (daysSinceContact === null || daysSinceContact > 30) return 'attention';
                return 'inprogress';
            }

            function getDaysSinceContact(p) {
                if (!p.lastContactDate) return null;
                return Math.ceil((today - parseLocalDate(p.lastContactDate)) / (1000*60*60*24));
            }

            const columns = {
                new: { label: '🌱 New', subtitle: 'No engagement yet', color: 'from-slate-500 to-slate-600', head: '#3a7d5e', bg: 'bg-slate-50', border: 'border-slate-200', people: [] },
                inprogress: { label: '🔄 In Progress', subtitle: 'Actively engaged', color: 'from-blue-500 to-blue-600', head: '#34618f', bg: 'bg-blue-50', border: 'border-blue-200', people: [] },
                attention: { label: '⚡ Needs Attention', subtitle: '30+ days no contact', color: 'from-orange-500 to-red-500', head: '#b3553f', bg: 'bg-orange-50', border: 'border-orange-200', people: [] },
                milestone: { label: '🏆 Milestone Hit', subtitle: 'Baptism date or baptized', color: 'from-emerald-500 to-teal-600', head: '#9a7b2e', bg: 'bg-emerald-50', border: 'border-emerald-200', people: [] },
            };

            filteredPeople.forEach(p => {
                const col = getColumn(p);
                columns[col].people.push(p);
            });

            function renderCard(p) {
                const allActs = Object.values(p.progress||{}).flat();
                const thisMonthActs = p.progress?.[currentMonthKey]?.length || 0;
                const daysSince = getDaysSinceContact(p);
                const topAct = allActs.length > 0 ? [...allActs].sort((a,b) => allActs.filter(x=>x===b).length - allActs.filter(x=>x===a).length)[0] : null;
                const topInd = topAct ? INDICATORS.find(i=>i.code===topAct) : null;
                const tabIcon = p._tab==='investigators' ? '👤' : '💙';
                const streak = (() => {
                    let s = 0;
                    for (let i = today.getMonth(); i >= 0; i--) {
                        if ((p.progress?.[MONTHS[i]]?.length||0) > 0) s++; else break;
                    }
                    return s;
                })();
                return `
                <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 hover:shadow-md transition-all">
                    <div class="flex items-start gap-2">
                        <span class="text-xl flex-shrink-0">${p.emoji||tabIcon}</span>
                        <div class="flex-1 min-w-0">
                            <div class="font-black text-sm text-gray-900 leading-tight">${p.name}</div>

        function renderCharts(currentList) {
            const totalActivities = currentList.reduce((sum, p) => sum + Object.values(p.progress||{}).flat().length, 0);
            const avgPerPerson = currentList.length > 0 ? (totalActivities/currentList.length).toFixed(1) : 0;
            const isInv = state.activeTab === 'investigators';

            // Most active month
            const monthTotals = MONTHS.map(m => currentList.reduce((s,p) => s + (p.progress?.[m]?.length||0), 0));
            const peakMonthIdx = monthTotals.indexOf(Math.max(...monthTotals));
            const peakMonth = MONTHS[peakMonthIdx];

            // People with activity this month
            const currentMonth = MONTHS[new Date().getMonth()];
            const activeThisMonth = currentList.filter(p => (p.progress?.[currentMonth]?.length||0) > 0).length;

            // Indicator frequency
            const indCounts = {};
            INDICATORS.forEach(ind => { indCounts[ind.code] = 0; });
            currentList.forEach(p => Object.values(p.progress||{}).flat().forEach(code => { if(indCounts[code] !== undefined) indCounts[code]++; }));
            const topIndicators = Object.entries(indCounts).sort((a,b)=>b[1]-a[1]).filter(([,v])=>v>0).slice(0,6);

            // Baptisms / Active members reached
            const baptized = currentList.reduce((s,p)=>s+(Object.values(p.progress||{}).flat().includes('B')?1:0),0) + state.covenantPath.length;
            const activeMember = currentList.reduce((s,p)=>s+(Object.values(p.progress||{}).flat().includes('ACTIVE')?1:0),0);

            // Per-person activity counts for bar chart
            const personNames = currentList.map((p,i)=>p.name||`Person ${i+1}`);
            const personCounts = currentList.map(p=>Object.values(p.progress||{}).flat().length);

            // Monthly trend data
            const monthlyTrend = MONTHS.map(m => currentList.reduce((s,p)=>s+(p.progress?.[m]?.length||0),0));

            // Engagement rate (people with ANY activity)
            const engaged = currentList.filter(p=>Object.values(p.progress||{}).flat().length>0).length;
            const engagementRate = currentList.length > 0 ? Math.round((engaged/currentList.length)*100) : 0;

            // ── Follow-up health (mirrors the This Week board) ──
            const _today = new Date(); _today.setHours(0,0,0,0);
            const _named = currentList.filter(p => p.name);
            const fuCompleted = _named.filter(p => p.taskDone).length;
            const fuActive = _named.filter(p => !p.taskDone);
            const fuOverdue = fuActive.filter(p => p.nextContactDate && parseLocalDate(p.nextContactDate) < _today).length;
            const fuNoDate = fuActive.filter(p => !p.nextContactDate).length;
            const fuTotalTasks = _named.filter(p => p.nextAction || p.nextContactDate || p.taskDone).length;
            const fuCompletionRate = fuTotalTasks > 0 ? Math.round((fuCompleted / fuTotalTasks) * 100) : 0;

            setTimeout(() => {
                // Chart 1 — Monthly Trend Line Chart
                const ctx1 = document.getElementById('monthlyTrendChart');
                if (ctx1) {
                    if (ctx1._chartInstance) ctx1._chartInstance.destroy();
                    ctx1._chartInstance = new Chart(ctx1, {
                        type: 'line',
                        data: {
                            labels: MONTHS,
                            datasets: [{
                                label: 'Total Activities',
                                data: monthlyTrend,
                                borderColor: isInv ? '#f59e0b' : '#10b981',
                                backgroundColor: isInv ? 'rgba(245,158,11,0.15)' : 'rgba(16,185,129,0.15)',
                                borderWidth: 3,
                                pointBackgroundColor: isInv ? '#f59e0b' : '#10b981',
                                pointRadius: 6,
                                pointHoverRadius: 9,
                                tension: 0.4,
                                fill: true
                            }]

            to:'Naʻe fai mai ʻe Elder M. Russell Ballard ʻo e Kōlomu ʻo e Toko Hongofulu Mā Uá mo Elder Robert E. Wells ʻo e Kōlomu ʻUluaki ʻo e Kau Fitungofulú, ha palōmesi makehe ki he kāingalotu kotoa pē ʻo e Siasí. Hiki ha lisi ʻo hotau ngaahi kaungāmeʻa teʻeki Siasi pe ʻoku ʻikai ke nau mālohi ʻi he Siasí, pea lotuaʻi kinautolu ʻi heʻetau lotu pongipongi mo e efiafi. Kapau te tau fai ʻení ʻi ha ʻaho hokohoko ʻe 21, ʻo ʻikai ke hala ha ʻaho, ʻoku talaʻofa mai ʻe he ʻEikí ʻe ʻi ai ha taha — ha hingoa ʻi heʻetau lisí, pe ko ha taha kehe — te ne tali ha fakaafe ke fanongo ki he ngaahi lēsoni ʻa e kau faifekaú ʻi he ʻosi ʻa e ʻaho ʻe 21. ʻOku mau fakaafeʻi kimoutolu ke mou ʻahiʻahiʻi ʻa e talaʻofa ko ʻení, he kuó Ne folofola mai:',
            en:'Elder M. Russell Ballard of the Quorum of the Twelve and Elder Robert E. Wells of the First Quorum of the Seventy gave a special promise to all members of the Church. Make a list of your not-yet-member or less-active friends, and pray for them by name in your morning and evening prayers. If you do this for 21 consecutive days without missing a single day, the Lord promises that at least one person — a name on your list, or someone else — will accept an invitation to hear the missionary lessons by the end of the 21 days. We invite you to test this promise, for He has declared:'
        };
        const P_VREF = {
            to:'“Ko au, ko e ʻEikí, ʻoku ou haʻisia ʻoka mou ka fai ʻa e meʻa kuó u lea ʻakí.” — Tokāteline mo e Ngaahi Fuakava 82:10',
            en:'“I, the Lord, am bound when ye do what I say.” — Doctrine & Covenants 82:10'
        };

        let p21 = {};
        try { p21 = JSON.parse(localStorage.getItem('f5_p21') || '{}'); } catch(e){ p21 = {}; }
        function saveP21(){ try { localStorage.setItem('f5_p21', JSON.stringify(p21)); } catch(e){} }
        let _p21sv;
        function saveP21Debounced(){ clearTimeout(_p21sv); _p21sv = setTimeout(saveP21, 500); }

        function p21Complete(){ let c=0; for(let i=1;i<=SCRIPTURES.length;i++){ const d=p21['d'+i]||{}; if(d.am&&d.pm&&d.read) c++; } return c; }

        window.p21Check = (n, field, checked) => {
            p21['d'+n] = p21['d'+n] || {}; p21['d'+n][field] = checked; saveP21();
            const d = p21['d'+n]; const full = d.am&&d.pm&&d.read;
            const row = document.querySelector(`.dayrow[data-day="${n}"]`);
            if(row) row.classList.toggle('full', !!full);
