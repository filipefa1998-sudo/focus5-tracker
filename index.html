            const cEl = document.getElementById('p21-count'); if(cEl) cEl.innerHTML = `${complete}<span style="font-size:15px;color:var(--ss-muted)">/${total}</span>`;
            const bEl = document.getElementById('p21-bar'); if(bEl) bEl.style.width = pct+'%';
        };
        window.p21Text = (key, val) => { p21[key] = val; saveP21Debounced(); };
        window.p21Commit = (i, checked) => { p21['c'+i] = checked; saveP21(); };
        window.p21Reset = () => {
            if(!confirm(currentLang==='to' ? 'Kamata foʻou ʻa e palōmesi? ʻE tamateʻi ʻa e fakaʻilonga kotoa.' : 'Reset the promise? This clears all of your check marks.')) return;
            p21 = {}; saveP21(); render();
        };

        // Print just the 21-Day Promise worksheet (fills the #printReport area the print CSS reveals)
        window.printPromise = () => {
            const box = (on) => on ? '☑' : '☐';
            const inv = (state.investigators||[]).map(p=>p.name).filter(n=>n&&n.trim());
            const ret = (state.returning||[]).map(p=>p.name).filter(n=>n&&n.trim());
            const days = SCRIPTURES.map((s,i)=>{
                const n=i+1, d=p21['d'+n]||{};
                return `<tr><td style="text-align:center;font-weight:bold">${n}</td><td>${esc(t2(s.to,s.en))}</td>
                    <td style="text-align:center">${box(d.am)}</td><td style="text-align:center">${box(d.pm)}</td><td style="text-align:center">${box(d.read)}</td></tr>`;
            }).join('');
            const commits = COMMITMENTS.map((c,i)=>`<div>${box(p21['c'+i])} ${esc(t2(c.to,c.en))}</div>`).join('');
            const ftm = [0,1].map(i=>{const nm=p21['ftm'+i+'n']||'';const ph=p21['ftm'+i+'p']||'';return (nm||ph)?`<div>${esc(nm)} ${ph?'· '+esc(ph):''}</div>`:'';}).join('');
            const wml = [0,1].map(i=>{const nm=p21['wml'+i+'n']||'';const ph=p21['wml'+i+'p']||'';return (nm||ph)?`<div>${esc(nm)} ${ph?'· '+esc(ph):''}</div>`:'';}).join('');
            const names = (arr,label)=>arr.length?`<div style="flex:1"><b>${label}</b>${arr.map(n=>`<div>• ${esc(n)}</div>`).join('')}</div>`:`<div style="flex:1"><b>${label}</b><div style="color:#888">—</div></div>`;

            let box2 = document.getElementById('printReport');
            if (!box2) { box2 = document.createElement('div'); box2.id='printReport'; box2.style.display='none'; document.body.appendChild(box2); }
            box2.innerHTML = `<style>
                body{font-family:Georgia,serif;color:#111;padding:26px}
                h1{font-size:22px;margin:0 0 2px} h2{font-size:13px;color:#9a7b2e;letter-spacing:.12em;text-transform:uppercase;margin:0 0 14px}
                h3{font-size:15px;margin:18px 0 6px;border-bottom:1px solid #ccc;padding-bottom:3px}
                .formula{font-size:18px;color:#9a7b2e;margin:8px 0 10px} .verse{font-style:italic;color:#555;margin:8px 0}
                table{width:100%;border-collapse:collapse;font-size:12px;font-family:Arial,sans-serif} td,th{border:1px solid #bbb;padding:4px 6px}
                th{background:#f0ece2} .row{display:flex;gap:24px} .commits div{margin:4px 0;font-family:Arial,sans-serif;font-size:13px}
            </style>
            <h1>Riverton 24th Tongan Ward</h1>
            <h2>${t2('Palōmesi ʻAho ʻe 21','The 21-Day Promise')}</h2>
            <div class="formula">${t2('TUI','FAITH')} + ${t2('LOTU','PRAYER')} + ${t2('NGĀUE','ACTION')} = ${t2('MANA','MIRACLES')}</div>
            <div class="verse">${esc(t2(P_VREF.to,P_VREF.en))}</div>
            <h3>${t2('Kakai Te ke Lotuá','People I Will Pray For')}</h3>
            <div class="row">${names(inv, t('Investigators'))}${names(ret, t('Returning'))}</div>
            <h3>${t2('ʻAho ʻe 21','The 21 Days')}</h3>
            <table><tr><th>#</th><th>${t('Book of Mormon')}</th><th>${t('AM')}</th><th>${t('PM')}</th><th>${t('Read')}</th></tr>${days}</table>
            <h3>${t2('Ngaahi Tukupaa','Commitments')}</h3><div class="commits">${commits}</div>
            ${(ftm.trim())?`<h3>${t2('Ongo Faifekau Taimi Kakató','Full-Time Missionaries')}</h3>${ftm}`:''}
            ${(wml.trim())?`<h3>${t2('Taki Faifekau Fakauōtí','Ward Mission Leaders')}</h3>${wml}`:''}`;
            window.print();
            setTimeout(()=>{ box2.innerHTML=''; }, 500);
        };

        // Share a link to the app (lands on the 21-Day Promise tab)
        window.sharePromise = async () => {
            const url = location.origin + location.pathname + '#promise';
            const data = {
                title: 'Riverton 24th — ' + t2('Palōmesi ʻAho ʻe 21','21-Day Promise'),
                text: t2('Fai mo au ʻa e Palōmesi ʻAho ʻe 21 — lotu pongipongi mo efiafi ki he ngaahi faingamālie fakafaifekau.','Take the 21-Day Promise with me — pray morning and evening for missionary opportunities.'),
                url
            };
            try { if (navigator.share) { await navigator.share(data); return; } } catch(e){ if (e && e.name === 'AbortError') return; }
            try { await navigator.clipboard.writeText(url); showSaveMessage(t2('🔗 Kuo hiki ʻa e liní','🔗 Link copied!')); }
            catch(e){ prompt(t2('Hiki ʻa e liní:','Copy this link:'), url); }
        };

        function renderPromise(){
            const lng = currentLang==='to' ? 'ton' : 'eng';
            const invNames = (state.investigators||[]).map(p=>p.name).filter(n=>n&&n.trim());
            const retNames = (state.returning||[]).map(p=>p.name).filter(n=>n&&n.trim());
            const prayGroup = (title, names, dot) => `
                <div>
                    <div class="praygroup-title">${title} <span class="n">${names.length}</span></div>
                    ${names.length
                        ? names.map(n=>`<div class="prayname"><span class="dot" style="background:${dot};"></span>${esc(n)}</div>`).join('')
                        : `<div class="praynote">${t2('Tānaki kakai ʻi he Tracker Māhiná','Add people in the Monthly Tracker')}</div>`}
                </div>`;
            const pray = prayGroup('👤 '+t('Investigators'), invNames, 'var(--ss-gold)') + prayGroup('💙 '+t('Returning'), retNames, 'var(--ss-violet)');
            const days = SCRIPTURES.map((s,i)=>{
                const n=i+1, d=p21['d'+n]||{}, full=d.am&&d.pm&&d.read;
                return `<div class="dayrow${full?' full':''}" data-day="${n}">
                    <div class="daynum">${n}</div>
                    <div class="daymain">
                        <div class="scrip"><a href="https://www.churchofjesuschrist.org/study/scriptures/${s.path}?lang=${lng}" target="_blank" rel="noopener">${esc(t2(s.to,s.en))}</a><div class="sub">${t('Book of Mormon')}</div></div>
                        <div class="checks">
                            <label class="chk"><input type="checkbox" data-free onchange="p21Check(${n},'am',this.checked)" ${d.am?'checked':''}>${t('AM')}</label>
                            <label class="chk"><input type="checkbox" data-free onchange="p21Check(${n},'pm',this.checked)" ${d.pm?'checked':''}>${t('PM')}</label>
                            <label class="chk read"><input type="checkbox" data-free onchange="p21Check(${n},'read',this.checked)" ${d.read?'checked':''}>${t('Read')}</label>
                        </div>
                    </div></div>`;
            }).join('');
            const commits = COMMITMENTS.map((c,i)=>
                `<label class="commit"><input type="checkbox" data-free onchange="p21Commit(${i},this.checked)" ${p21['c'+i]?'checked':''}><span class="txt">${esc(t2(c.to,c.en))}<span class="en">${esc(t2(c.en,c.to))}</span></span></label>`
            ).join('');
            const ftm = [0,1].map(i=>`<div class="contact"><input class="ss-input" data-free oninput="p21Text('ftm${i}n',this.value)" value="${esc(p21['ftm'+i+'n']||'')}" placeholder="${t('Full-time missionary')}"><input class="ss-input" data-free oninput="p21Text('ftm${i}p',this.value)" value="${esc(p21['ftm'+i+'p']||'')}" placeholder="${t('Phone')}"></div>`).join('');
            const wml = [0,1].map(i=>`<div class="contact"><input class="ss-input" data-free oninput="p21Text('wml${i}n',this.value)" value="${esc(p21['wml'+i+'n']||'')}" placeholder="${t('Ward mission leader')}"><input class="ss-input" data-free oninput="p21Text('wml${i}p',this.value)" value="${esc(p21['wml'+i+'p']||'')}" placeholder="${t('Phone')}"></div>`).join('');
            const total = SCRIPTURES.length, complete = p21Complete(), pct = Math.round(complete/total*100);

            return `<div class="ss-panel">
                <div class="mb-4"><div class="ss-eyebrow">${t2('Ngāue Fakafaifekau','Member Missionary Work')}</div><h2 class="ss-h2">${t2('Palōmesi ʻAho ʻe 21','The 21-Day Promise')}</h2></div>
                ${(() => {
                    const showSide = editMode || !!(state.images && state.images['promise']);
                    return `<div class="promise-intro ${showSide ? 'has-side' : ''}">
                        <div class="pi-text">
                            <div class="formula">${t2('TUI','FAITH')} + ${t2('LOTU','PRAYER')} + <em>${t2('NGĀUE','ACTION')}</em> = ${t2('MANA','MIRACLES')}</div>
                            <p>${esc(t2(P_INTRO.to,P_INTRO.en))}<span class="en">${esc(t2(P_INTRO.en,P_INTRO.to))}</span></p>
                            <div class="vref">${esc(t2(P_VREF.to,P_VREF.en))}</div>
                        </div>
                        ${showSide ? `<div class="pi-side">${imageSlot('promise', { label: t2('Foto','Photo') })}</div>` : ''}
                    </div>`;
                })()}
                <div class="promise-progress">
                    <div class="big" id="p21-count">${complete}<span style="font-size:15px;color:var(--ss-muted)">/${total}</span></div>
                    <div style="flex:1"><div class="lbl">${t2('ʻAho kakato (Pongipongi · Efiafi · Lau)','Days completed (AM · PM · Read)')}</div>
                        <div class="pbar"><i id="p21-bar" style="width:${pct}%"></i></div></div>
                </div>

                <div class="ss-blockhead"><h3>${t2('Lisi ʻo e Kakai Te ke Lotuá','People I Will Pray For')}</h3><span class="en">${t2('Mei he Tracker Māhiná — Muimui & Foki Mai','Auto-filled from the Monthly Tracker')}</span></div>
                <div class="prayfor two">${pray}</div>

                <div class="ss-blockhead"><h3>${t2('ʻAho ʻe 21','The 21 Days')}</h3><span class="en">${t2('Fakaʻilongaʻi ʻa e lotú mo e lau folofolá','Check each prayer & reading')}</span></div>
                <div class="daygrid">${days}</div>

                <div class="ss-blockhead"><h3>${t2('Ngaahi Tukupaa','Commitments')}</h3></div>
                <p style="font-size:14px;color:var(--ss-ink-soft);margin:0 0 12px;max-width:66ch;line-height:1.55;">${esc(t2(COMMIT_INTRO.to,COMMIT_INTRO.en))}</p>
                <div>${commits}</div>

                <div class="ss-blockhead"><h3>${t2('Hoʻo Ongo Faifekau Taimi Kakató','Your Full-Time Missionaries')}</h3></div>
                <div class="contacts">${ftm}</div>
                <div class="ss-blockhead"><h3>${t2('Hoʻo Taki Faifekau Fakauōtí','Your Ward Mission Leaders')}</h3></div>
                <div class="contacts">${wml}</div>

                <div class="flex flex-wrap gap-3 mt-6">
                    <button class="ss-btn primary" onclick="printPromise()">🖨️ ${t2('Pulusi / PDF','Print / Save as PDF')}</button>
                    <button class="ss-btn ghost" onclick="sharePromise()">🔗 ${t2('Vahevahe ʻa e liní','Share link')}</button>
                    <button class="ss-btn ghost" onclick="p21Reset()">↺ ${t2('Kamata foʻou','Reset')}</button>
                </div>
                <p style="font-size:12px;color:var(--ss-muted);margin-top:12px;">${t2('ʻOku tauhi ʻa e fakaʻiló ʻi he tēvaisí ni — ko e palōmesi fakafoʻituituí.','Your progress is saved on this device — this is a personal worksheet.')}</p>
            </div>`;
        }

        /* =====================================================================
           TAB 7 — BOOK OF MORMON CHALLENGE  (Pō Tohi ʻa Molomona)
           "Pass the Light" — track who took a copy to give away this week.
           Synced to Firebase so the quorum sees the chain grow.
           ===================================================================== */
        const BOM_STATUS = {
            pledged:  {to:'Naʻe Toʻo',   en:'Pledged',        emoji:'🕯️', color:'var(--ss-gold)',    wash:'var(--ss-gold-wash)'},
            given:    {to:'Foaki Atu',   en:'Given Away',     emoji:'🤝', color:'var(--ss-sage)',    wash:'var(--ss-sage-wash)'},
            reading:  {to:'Lau Lolotonga',en:"They're Reading",emoji:'📖', color:'var(--ss-violet)',  wash:'var(--ss-violet-wash)'},
            referred: {to:'ʻAve ki Faifekau',en:'Referred',   emoji:'✨', color:'var(--ss-red)',     wash:'var(--ss-red-wash)'}
        };
        const BOM_ORDER = ['pledged','given','reading','referred'];
        const BOM_ORGS = [
            {k:'eq', to:'Kōlomu ʻo e Kau Tangata Mā', en:'Elders Quorum'},
            {k:'rs', to:'Sōsaieti Tokoni', en:'Relief Society'},
            {k:'ym', to:'Kau Talavou Tangata', en:'Young Men'},
            {k:'yw', to:'Kau Talavou Fefine', en:'Young Women'},
            {k:'primary', to:'Palaimelí', en:'Primary'},
            {k:'ss', to:'Lautohi Sāpaté', en:'Sunday School'},
            {k:'ftm', to:'Faifekau Taimi Kakato', en:'Full-Time Missionaries'},
            {k:'wml', to:'Taki Faifekau Fakauōti', en:'Ward Mission Leader'}
        ];
        const bomOrgLabel = (k) => { const o = BOM_ORGS.find(x=>x.k===k); return o ? t2(o.to,o.en) : ''; };

        window.bomAdd = () => {
            const id = 'bom_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
            state.bomChallenge = state.bomChallenge || [];
            state.bomChallenge.unshift({ id, member:'', org:'', status:'pledged', weekOf: ymd(mondayOf(new Date())), date: ymd(new Date()) });
            saveToFirebase(); render();
        };
        window.bomUpdate = (id, field, val) => {
            const c = (state.bomChallenge||[]).find(x=>x.id===id); if(!c) return;
            c[field] = val; saveToFirebaseDebounced();
        };
        window.bomCycle = (id) => {
            const c = (state.bomChallenge||[]).find(x=>x.id===id); if(!c) return;
            const i = BOM_ORDER.indexOf(c.status||'pledged');
            c.status = BOM_ORDER[(i+1) % BOM_ORDER.length];
            saveToFirebase(); render();
        };
        window.bomDelete = (id) => {
            if(!confirm(currentLang==='to' ? 'Tāmateʻi ʻa e fakamatalá ni?' : 'Remove this entry?')) return;
            state.bomChallenge = (state.bomChallenge||[]).filter(x=>x.id!==id);
            saveToFirebase(); render();
        };
        let _bomsv;
        function saveToFirebaseDebounced(){ clearTimeout(_bomsv); _bomsv = setTimeout(saveToFirebase, 700); }

        function renderBomChallenge(){
            const list = (state.bomChallenge||[]);
            const thisWeek = list.filter(c=>isThisWeek(c.weekOf));
            const givenAll = list.filter(c=>c.status==='given'||c.status==='reading'||c.status==='referred').length;
            const referredAll = list.filter(c=>c.status==='referred').length;

            const card = (c)=>{
                const st = BOM_STATUS[c.status||'pledged'] || BOM_STATUS.pledged;
                const opts = `<option value="">${t('Organization to follow up…')}</option>` +
                    BOM_ORGS.map(o=>`<option value="${o.k}" ${c.org===o.k?'selected':''}>${esc(t2(o.to,o.en))}</option>`).join('');
                return `<div class="bom-card">
                    <div class="bom-top">
                        <span class="flame">${st.emoji}</span>
                        <input class="ss-input" style="font-weight:700;" value="${esc(c.member||'')}" oninput="bomUpdate('${c.id}','member',this.value)" placeholder="${t('Name of the person')}">
                        <button class="bom-status" style="color:${st.color};background:${st.wash};" onclick="bomCycle('${c.id}')" title="${t('Tap to advance')}">${st.emoji} ${t2(st.to,st.en)}</button>
                    </div>
                    <select class="ss-input" onchange="bomUpdate('${c.id}','org',this.value); render();">${opts}</select>
                    <div class="flex items-center justify-between" style="font-size:11.5px;color:var(--ss-muted);">
                        <span>${t('Week of')} ${fmtWeek(c.weekOf)}${c.org?' · 🏛️ '+esc(bomOrgLabel(c.org)):''}</span>
                        <button onclick="bomDelete('${c.id}')" style="background:none;border:0;color:var(--ss-muted);cursor:pointer;font-size:12px;">${t('Remove')}</button>
                    </div>
                </div>`;
            };

            const section = (title, en, arr) => arr.length ? `
                <div class="ss-blockhead"><h3>${title}</h3><span class="en">${en} · ${arr.length}</span></div>
                <div class="bom-grid">${arr.map(card).join('')}</div>` : '';

            const olderWeeks = list.filter(c=>!isThisWeek(c.weekOf));

            return `<div class="ss-panel">
                ${imageSlot('bom', { label: t2('Foto ki he Pole Tohi ʻa Molomoná','Photo (top of B.O.M. Challenge)') })}
                <div class="flex items-start justify-between flex-wrap gap-3 mb-4">
                    <div><div class="ss-eyebrow">${t2('Pō Tohi ʻa Molomona','Pass the Light')}</div><h2 class="ss-h2">${t2('Pole Tohi ʻa Molomona','Book of Mormon Challenge')}</h2></div>
                    <button class="ss-btn primary" onclick="bomAdd()">＋ ${t('Take the challenge')}</button>
                </div>
                <p style="font-size:14px;color:var(--ss-ink-soft);max-width:64ch;line-height:1.6;margin:0 0 18px;">
                    ${t2('Ko e taha taki taha ʻe toʻo ha tohi ʻe taha he uike ní, tohi honau fakamoʻoní ʻi loto, pea foaki ki ha taha. Tau vakai ki he maama ʻoku tupu!','Each week, one by one, take a copy, write your testimony inside, and give it to someone. Watch the light spread.')}
                </p>

                <div class="bom-hero">
                    <div class="bom-stat"><div class="num">${thisWeek.length}</div><div class="lbl">${t('Pledged this week')}</div></div>
                    <div class="bom-stat"><div class="num">${givenAll}</div><div class="lbl">${t('Copies given away')}</div></div>
                    <div class="bom-stat"><div class="num">${referredAll}</div><div class="lbl">${t('Referred to missionaries')}</div></div>
                </div>

                ${section(t2('ʻO e Uike Ní','This Week'), t2('Toʻo ʻi he uike ní','Taken this week'), thisWeek)}
                ${list.length===0 ? `<div style="text-align:center;padding:40px 16px;color:var(--ss-muted);">
                    <div style="font-size:40px;margin-bottom:10px;">🕯️</div>
                    <p style="font-weight:700;color:var(--ss-ink-soft);">${t('No one has taken the challenge yet.')}</p>
                    <p style="font-size:13px;">${t('Tap "Take the challenge" to light the first candle.')}</p>
                </div>` : ''}
                ${section(t2('Ngaahi Uike Kuo Hilí','Earlier Weeks'), t2('Maama kuo tutu','Lights already lit'), olderWeeks)}
            </div>`;
        }

        /* =====================================================================
           IMAGE SLOTS — uploadable photos, compressed client-side, synced via Firebase
           ===================================================================== */
        function imageSlot(key, opts){
            opts = opts || {};
            const v = opts.variant === 'side' ? 'side ' : '';
            const url = (state.images || {})[key];
            // View-only: show the photo with no controls; show nothing if there's no photo yet.
            if (!editMode){
                return url ? `<div class="imgslot ${v}"><img src="${url}" alt="${esc(opts.label || '')}"></div>` : '';
            }
            if (url){
                return `<div class="imgslot ${v}">
                    <img src="${url}" alt="${esc(opts.label || '')}">
                    <div class="imgslot-tools">
                        <label class="imgbtn" title="${t('Change image')}">🔄<input type="file" accept="image/*" class="hidden" data-free onchange="uploadImage('${key}', event)"></label>
                        <button class="imgbtn" title="${t('Remove image')}" onclick="removeImage('${key}')">🗑️</button>
                    </div>
                </div>`;
            }
            return `<label class="imgslot ${v}empty">
                <input type="file" accept="image/*" class="hidden" data-free onchange="uploadImage('${key}', event)">
                <span class="imgslot-ico">🖼️</span>
                <span class="imgslot-label">${esc(opts.label || t('Add a photo'))}</span>
                <span class="imgslot-hint">${t('Tap to upload · shared with everyone')}</span>
            </label>`;
        }

        function compressImage(file, maxDim, quality){
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        let w = img.width, h = img.height;
                        if (w >= h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
                        else if (h > w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
                        else if (w === h && w > maxDim){ w = h = maxDim; }
                        const c = document.createElement('canvas'); c.width = w; c.height = h;
                        c.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(c.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = reject; img.src = e.target.result;
                };
                reader.onerror = reject; reader.readAsDataURL(file);
            });
        }

        window.uploadImage = async (key, ev) => {
            const file = ev.target.files && ev.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')){ alert(t('Please choose an image file.')); return; }
            // Compress first so both Storage uploads and any inline fallback stay small
            let dataUrl;
            try {
                dataUrl = await compressImage(file, 1280, 0.72);
                if (dataUrl.length > 900000) dataUrl = await compressImage(file, 1100, 0.62);
                if (dataUrl.length > 900000) dataUrl = await compressImage(file, 900, 0.55);
            } catch(e){ alert(t('Sorry — that image could not be processed.')); return; }

            state.images = state.images || {};
            // Preferred path: upload to Firebase Storage and keep only the URL in the database (tiny payload)
            if (storage) {
                try {
                    const sref = storageRef(storage, 'images/' + key + '.jpg');
                    await uploadString(sref, dataUrl, 'data_url');
                    state.images[key] = await getDownloadURL(sref);
                    saveToFirebase(); render();
                    return;
                } catch(e){ console.warn('Storage upload unavailable — saving image inline instead.', e && e.message ? e.message : e); }
            }
            // Fallback: store the compressed image inline in the database (works without Storage setup)
            state.images[key] = dataUrl;
            saveToFirebase(); render();
        };
        window.removeImage = async (key) => {
            if (!confirm(t('Remove this image?'))) return;
            const val = state.images && state.images[key];
            // If it lives in Storage, delete the object too (ignore failures)
            if (storage && typeof val === 'string' && /firebasestorage|googleapis|appspot/.test(val)) {
                try { await deleteObject(storageRef(storage, 'images/' + key + '.jpg')); } catch(e){ /* already gone or blocked */ }
            }
            if (state.images) delete state.images[key];
            saveToFirebase(); render();
        };

        window.saveToFirebase = saveToFirebase;

        // Deep-link routing: a shared link like …/#promise opens that tab.
        const HASH_VIEWS = { tracker:'tracker', thisweek:'thisweek', actionboard:'actionboard', charts:'charts', kpi:'charts', events:'events', calendar:'events', promise:'promise', '21day':'promise', bom:'bomchallenge', bomchallenge:'bomchallenge' };
        function applyHashView(){
            const h = (location.hash || '').replace('#','').toLowerCase();
            if (HASH_VIEWS[h]) state.viewMode = HASH_VIEWS[h];
        }
        applyHashView();
        window.addEventListener('hashchange', () => { const before = state.viewMode; applyHashView(); if (state.viewMode !== before) render(); });

        render();
    </script>
</body>
</html>
