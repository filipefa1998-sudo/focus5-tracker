<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus 5 Master Tracker - Riverton 24th Ward</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-20px) translateX(10px); }
            50% { transform: translateY(-40px) translateX(-10px); }
            75% { transform: translateY(-20px) translateX(10px); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
            50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.8); }
        }
        
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            background-size: 1000px 100%;
            animation: shimmer 3s infinite;
        }
        
        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hover-lift:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        /* Mobile optimizations */
        @media (max-width: 768px) {
            .hover-lift:hover {
                transform: none;
            }
            .table-wrapper {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .mobile-hide {
                display: none;
            }
        }
        
        .floating-particle {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0.2;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-900">
    <div id="app"></div>

    <!-- Firebase v9 modular -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAMTk39-yO86IA36-ZzBCtpLswW4skCIH4",
            authDomain: "focus5-cd663.firebaseapp.com",
            databaseURL: "https://focus5-cd663-default-rtdb.firebaseio.com",
            projectId: "focus5-cd663"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const MONTHS = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        
        const INDICATORS = [
            { code: 'IAC', name: 'Invitation to Attend Church', color: 'from-blue-500 to-blue-600', emoji: '⛪' },
            { code: 'IRB', name: 'Invitation to Read Book of Mormon', color: 'from-green-500 to-green-600', emoji: '📖' },
            { code: 'IACA', name: 'Invitation to Attend Church Activity', color: 'from-purple-500 to-purple-600', emoji: '🎉' },
            { code: 'IFHE', name: 'Invitation to Family Home Evening', color: 'from-yellow-500 to-yellow-600', emoji: '🏠' },
            { code: 'ITM', name: 'Invited to be Taught by Missionaries', color: 'from-orange-500 to-orange-600', emoji: '👔' },
            { code: 'ITB', name: 'Invited to be Baptized', color: 'from-pink-500 to-pink-600', emoji: '💧' },
            { code: 'IFH', name: 'Invited to do Family History', color: 'from-indigo-500 to-indigo-600', emoji: '🌳' },
            { code: 'ISP', name: 'Invited to Service Project', color: 'from-teal-500 to-teal-600', emoji: '🤝' },
            { code: 'MV', name: 'Ministering Home Visit', color: 'from-cyan-500 to-cyan-600', emoji: '🚪' },
            { code: 'TXT', name: 'Texted or Called', color: 'from-gray-500 to-gray-600', emoji: '📱' },
            { code: 'AC', name: 'Attended Church', color: 'from-blue-600 to-blue-700', emoji: '🙏' },
            { code: 'RBOM', name: 'Reading the Book of Mormon', color: 'from-green-600 to-green-700', emoji: '📚' },
            { code: 'ACA', name: 'Attended Church Activity', color: 'from-purple-600 to-purple-700', emoji: '🎊' },
            { code: 'AFHE', name: 'Attended FHE', color: 'from-yellow-600 to-yellow-700', emoji: '👨‍👩‍👧' },
            { code: 'TML', name: 'Taking Missionary Lessons', color: 'from-orange-600 to-orange-700', emoji: '📝' },
            { code: 'BD', name: 'Baptismal Date Set', color: 'from-red-500 to-red-600', emoji: '📅' },
            { code: 'B', name: 'Baptized', color: 'from-red-600 to-red-700', emoji: '✨' },
            { code: 'C', name: 'Confirmed', color: 'from-red-700 to-red-800', emoji: '🕊️' },
            { code: 'FHS', name: 'Family History Started', color: 'from-indigo-600 to-indigo-700', emoji: '🌲' },
            { code: 'ASP', name: 'Attended Service Project', color: 'from-teal-600 to-teal-700', emoji: '💪' }
        ];

        let state = {
            investigators: Array(5).fill().map((_, i) => ({ id: i + 1, name: '', notes: '', progress: {}, assignment: '' })),
            returning: Array(5).fill().map((_, i) => ({ id: i + 100, name: '', notes: '', progress: {}, assignment: '' })),
            covenantPath: [],
            events: [],
            activeTab: 'investigators',
            viewMode: 'tracker',
            saveMessage: '',
            backgroundImage: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1920&q=80'
        };

        const dataRef = ref(database, 'trackerDataV2');
        const eventsRef = ref(database, 'events');
        
        onValue(dataRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state.investigators = data.investigators || state.investigators;
                state.returning = data.returning || state.returning;
                state.covenantPath = data.covenantPath || [];
                state.backgroundImage = data.backgroundImage || state.backgroundImage;
            }
            render();
        });

        onValue(eventsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state.events = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            }
            render();
        });

        function saveToFirebase() {
            set(dataRef, {
                investigators: state.investigators,
                returning: state.returning,
                covenantPath: state.covenantPath,
                backgroundImage: state.backgroundImage,
                lastSaved: Date.now()
            }).then(() => {
                showSaveMessage('✓ Saved successfully!');
            }).catch(err => {
                console.error('Save error:', err);
                showSaveMessage('Error saving');
            });
        }

        function showSaveMessage(msg) {
            state.saveMessage = msg;
            render();
            setTimeout(() => {
                state.saveMessage = '';
                render();
            }, 3000);
        }

        function getCurrentList() {
            return state.activeTab === 'investigators' ? state.investigators : state.returning;
        }

        function setCurrentList(list) {
            if (state.activeTab === 'investigators') {
                state.investigators = list;
            } else {
                state.returning = list;
            }
        }

        window.updateName = (id, name) => {
            const list = getCurrentList();
            const updated = list.map(p => p.id === id ? { ...p, name } : p);
            setCurrentList(updated);
            saveToFirebase();
        };

        window.updateNotes = (id, notes) => {
            const list = getCurrentList();
            const updated = list.map(p => p.id === id ? { ...p, notes } : p);
            setCurrentList(updated);
            saveToFirebase();
        };

        window.updateAssignment = (id, assignment) => {
            const list = getCurrentList();
            const updated = list.map(p => p.id === id ? { ...p, assignment } : p);
            setCurrentList(updated);
            saveToFirebase();
        };

        window.toggleIndicator = (personId, month, indicator) => {
            const list = getCurrentList();
            const updated = list.map(person => {
                if (person.id === personId) {
                    if (!person.progress) person.progress = {};
                    const monthData = person.progress[month] || [];
                    const hasIndicator = monthData.includes(indicator);
                    
                    const newMonthData = hasIndicator
                        ? monthData.filter(i => i !== indicator)
                        : [...monthData, indicator];
                    
                    if (indicator === 'B' && !hasIndicator) {
                        moveToCovenantPath(person);
                        return null;
                    }
                    
                    return { ...person, progress: { ...person.progress, [month]: newMonthData } };
                }
                return person;
            }).filter(p => p !== null);
            
            setCurrentList(updated);
            saveToFirebase();
            render();
        };

        function moveToCovenantPath(person) {
            state.covenantPath.push({
                id: Date.now(),
                name: person.name,
                assignment: person.assignment,
                type: '',
                ordinances: { aaronicPriesthood: false, templeBaptisms: false, patriarchalBlessing: false, melchizedekPriesthood: false, endowment: false },
                femaleOrdinances: { templeBaptisms: false, patriarchalBlessing: false, endowment: false },
                selfRelianceCompleted: { emotionalResilience: false, personalFinances: false, startGrowBusiness: false, educationBetterWork: false, findBetterJob: false },
                notes: person.notes || '',
                baptismDate: new Date().toISOString().split('T')[0]
            });
        }

        window.addPerson = () => {
            const list = getCurrentList();
            const newId = Math.max(...list.map(p => p.id), 0) + 1;
            list.push({ id: newId, name: '', notes: '', progress: {}, assignment: '' });
            setCurrentList(list);
            saveToFirebase();
            render();
        };

        window.removePerson = (id) => {
            const list = getCurrentList();
            if (list.length > 1) {
                setCurrentList(list.filter(p => p.id !== id));
                saveToFirebase();
                render();
            }
        };

        window.updateCovenantField = (personId, field, value) => {
            state.covenantPath = state.covenantPath.map(person => {
                if (person.id === personId) {
                    if (field.startsWith('ordinance_')) {
                        const key = field.replace('ordinance_', '');
                        return { ...person, ordinances: { ...person.ordinances, [key]: value } };
                    } else if (field.startsWith('femaleOrd_')) {
                        const key = field.replace('femaleOrd_', '');
                        return { ...person, femaleOrdinances: { ...person.femaleOrdinances, [key]: value } };
                    } else if (field.startsWith('selfReliance_')) {
                        const key = field.replace('selfReliance_', '');
                        return { ...person, selfRelianceCompleted: { ...person.selfRelianceCompleted, [key]: value } };
                    } else {
                        return { ...person, [field]: value };
                    }
                }
                return person;
            });
            saveToFirebase();
            render();
        };

        window.removeFromCovenantPath = (personId) => {
            if (confirm('Remove this person from the Covenant Path?')) {
                state.covenantPath = state.covenantPath.filter(p => p.id !== personId);
                saveToFirebase();
                render();
            }
        };

        window.exportData = () => {
            const data = { ...state, exportDate: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `focus5-data-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        };

        window.importData = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.investigators) state.investigators = data.investigators;
                        if (data.returning) state.returning = data.returning;
                        if (data.covenantPath) state.covenantPath = data.covenantPath;
                        saveToFirebase();
                        showSaveMessage('✓ Data imported successfully!');
                    } catch (error) {
                        showSaveMessage('Error importing data');
                    }
                };
                reader.readAsText(file);
            }
        };

        window.setActiveTab = (tab) => {
            state.activeTab = tab;
            render();
        };

        window.setViewMode = (mode) => {
            state.viewMode = mode;
            render();
        };

        window.updateBackgroundImage = (url) => {
            state.backgroundImage = url;
            saveToFirebase();
            render();
        };

        window.showBackgroundImageModal = () => {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div class="bg-white rounded-3xl p-8 max-w-2xl w-full shadow-2xl">
                    <h3 class="text-3xl font-black text-purple-900 mb-6">🖼️ Change Background Image</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Image URL</label>
                            <input id="bgImageUrl" type="text" value="${state.backgroundImage}" placeholder="https://example.com/image.jpg" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none" />
                        </div>
                        <div class="bg-purple-50 rounded-xl p-4">
                            <p class="text-sm text-purple-900 font-semibold mb-2">💡 Suggested Images:</p>
                            <div class="space-y-2">
                                <button onclick="document.getElementById('bgImageUrl').value='https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1920&q=80'" class="w-full text-left px-3 py-2 bg-white rounded-lg hover:bg-purple-100 text-sm">🏛️ Jordan River Temple</button>
                                <button onclick="document.getElementById('bgImageUrl').value='https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80'" class="w-full text-left px-3 py-2 bg-white rounded-lg hover:bg-purple-100 text-sm">🏔️ Mountains</button>
                                <button onclick="document.getElementById('bgImageUrl').value='https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=1920&q=80'" class="w-full text-left px-3 py-2 bg-white rounded-lg hover:bg-purple-100 text-sm">⭐ Night Sky</button>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-6">
                        <button onclick="this.closest('.fixed').remove()" class="flex-1 bg-gray-200 text-gray-700 px-6 py-3 rounded-xl font-semibold hover:bg-gray-300">Cancel</button>
                        <button onclick="updateBackgroundImage(document.getElementById('bgImageUrl').value); this.closest('.fixed').remove();" class="flex-1 bg-gradient-to-r from-purple-600 to-pink-600 text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg">Update Background</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        };

        window.addEvent = () => {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div class="bg-white rounded-3xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="text-5xl">📅</div>
                        <h3 class="font-black text-3xl text-purple-900">Add Ward Event</h3>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Event Name *</label>
                            <input id="eventName" type="text" placeholder="e.g., Ward BBQ, Youth Activity" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Date *</label>
                            <input id="eventDate" type="date" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Time</label>
                            <input id="eventTime" type="time" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Location</label>
                            <input id="eventLocation" type="text" placeholder="Church building, Park, etc." class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Event Type</label>
                            <select id="eventType" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none">
                                <option value="🏛️ Church Activity">🏛️ Church Activity</option>
                                <option value="🎉 Social Event">🎉 Social Event</option>
                                <option value="⚾ Sports/Recreation">⚾ Sports/Recreation</option>
                                <option value="🤝 Service Project">🤝 Service Project</option>
                                <option value="👨‍👩‍👧 Family Activity">👨‍👩‍👧 Family Activity</option>
                                <option value="📖 Scripture Study">📖 Scripture Study</option>
                                <option value="🙏 Spiritual">🙏 Spiritual</option>
                                <option value="🏃 Youth Activity">🏃 Youth Activity</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Description</label>
                            <textarea id="eventDescription" rows="3" placeholder="Event details..." class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none"></textarea>
                        </div>
                        <div class="bg-indigo-50 rounded-xl p-4">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input id="eventInviteReady" type="checkbox" class="w-5 h-5 text-indigo-600 rounded">
                                <span class="text-sm font-semibold">✨ Great for inviting investigators</span>
                            </label>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-6">
                        <button onclick="this.closest('.fixed').remove()" class="flex-1 bg-gray-200 text-gray-700 px-6 py-3 rounded-xl font-semibold hover:bg-gray-300">Cancel</button>
                        <button onclick="saveNewEvent()" class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg">Add Event</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('eventDate').valueAsDate = new Date();
        };

        window.saveNewEvent = () => {
            const name = document.getElementById('eventName').value.trim();
            const date = document.getElementById('eventDate').value;
            const time = document.getElementById('eventTime').value;
            const location = document.getElementById('eventLocation').value.trim();
            const type = document.getElementById('eventType').value;
            const description = document.getElementById('eventDescription').value.trim();
            const inviteReady = document.getElementById('eventInviteReady').checked;

            if (!name || !date) {
                alert('Please enter an event name and date');
                return;
            }

            const newEvent = {
                name, date, time, location, type, description, inviteReady,
                createdAt: new Date().toISOString()
            };

            const newEventRef = ref(database, `events/${Date.now()}`);
            set(newEventRef, newEvent);
            document.querySelector('.fixed').remove();
        };

        window.editEvent = (eventId) => {
            const event = state.events.find(e => e.id === eventId);
            if (!event) return;

            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div class="bg-white rounded-3xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="text-5xl">✏️</div>
                        <h3 class="font-black text-3xl text-purple-900">Edit Event</h3>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Event Name *</label>
                            <input id="editEventName" type="text" value="${event.name}" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Date *</label>
                            <input id="editEventDate" type="date" value="${event.date}" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Time</label>
                            <input id="editEventTime" type="time" value="${event.time || ''}" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Location</label>
                            <input id="editEventLocation" type="text" value="${event.location || ''}" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none" />
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Event Type</label>
                            <select id="editEventType" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none">
                                ${['🏛️ Church Activity', '🎉 Social Event', '⚾ Sports/Recreation', '🤝 Service Project', '👨‍👩‍👧 Family Activity', '📖 Scripture Study', '🙏 Spiritual', '🏃 Youth Activity'].map(t => 
                                    `<option value="${t}" ${event.type === t ? 'selected' : ''}>${t}</option>`
                                ).join('')}
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Description</label>
                            <textarea id="editEventDescription" rows="3" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none">${event.description || ''}</textarea>
                        </div>
                        <div class="bg-indigo-50 rounded-xl p-4">
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input id="editEventInviteReady" type="checkbox" ${event.inviteReady ? 'checked' : ''} class="w-5 h-5 text-indigo-600 rounded">
                                <span class="text-sm font-semibold">✨ Great for inviting investigators</span>
                            </label>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-6">
                        <button onclick="deleteEvent('${eventId}')" class="bg-red-500 text-white px-6 py-3 rounded-xl font-semibold hover:bg-red-600">Delete</button>

            const description = document.getElementById('editEventDescription').value.trim();
            const inviteReady = document.getElementById('editEventInviteReady').checked;

            if (!name || !date) {
                alert('Please enter an event name and date');
                return;

            const eventRef = ref(database, `events/${eventId}`);
            set(eventRef, { name, date, time, location, type, description, inviteReady });
            document.querySelector('.fixed').remove();

        window.handleIndicatorToggle = (personId, month, indicatorCode, isChecked) => {
            const list = getCurrentList();
            const updated = list.map(person => {
                if (person.id === personId) {
                    if (!person.progress) person.progress = {};
                    const monthData = person.progress[month] || [];
                    
                    let newMonthData;
                    if (isChecked) {
                        if (!monthData.includes(indicatorCode)) {
                            newMonthData = [...monthData, indicatorCode];
                        } else {
                            newMonthData = monthData;
                        }
                    } else {
                        newMonthData = monthData.filter(code => code !== indicatorCode);
                    }
                    
                    if (indicatorCode === 'B' && isChecked && !monthData.includes('B')) {
                        setTimeout(() => {
                            document.querySelector('.fixed')?.remove();
                            moveToCovenantPath(person);
                        }, 500);
                        return null;
                    }
                    
                    return {
                        ...person,
                        progress: {
                            ...person.progress,
                            [month]: newMonthData
                        }
                    };
                }
                return person;
            }).filter(p => p !== null);
            
            setCurrentList(updated);
            saveToFirebase();
            render();

                        <div class="flex items-center gap-3">
                            <div class="text-5xl">🎉</div>
                            <h2 class="text-4xl font-black bg-gradient-to-r from-green-600 to-emerald-600 bg-clip-text text-transparent">Ward Events Calendar</h2>
                        </div>
                        <button onclick="addEvent()" class="flex items-center gap-2 px-8 py-4 bg-gradient-to-r from-green-600 to-emerald-600 text-white rounded-2xl hover:from-green-700 hover:to-emerald-700 transition-all font-bold text-lg shadow-xl hover-lift">
                            ➕ Add Event
                        </button>
                    </div>

                    ${sortedEvents.length === 0 ? `
                        <div class="text-center py-16 text-gray-400">
                            <div class="text-8xl mb-6">📅</div>
                            <p class="text-2xl font-bold">No events scheduled yet</p>
                            <p class="text-lg mt-3">Click "Add Event" to get started</p>
                        </div>
                    ` : `
                        ${upcomingEvents.length > 0 ? `
                            <div class="mb-8">
                                <h3 class="text-2xl font-black text-green-900 mb-4">📆 Upcoming Events</h3>
                                <div class="space-y-4">
                                    ${upcomingEvents.map(event => {
                                        const eventDate = new Date(event.date);
                                        const daysUntil = Math.ceil((eventDate - today) / (1000 * 60 * 60 * 24));
                                        const isSoon = daysUntil <= 7;
                                        
                                        return `
                                            <div onclick="editEvent('${event.id}')" class="bg-gradient-to-r from-white to-green-50 rounded-2xl p-6 cursor-pointer hover:shadow-2xl transition-all hover-lift border-l-8 ${isSoon ? 'border-orange-500' : 'border-green-500'}">
                                                <div class="flex items-start gap-4">
                                                    <div class="text-5xl">${event.type.split(' ')[0]}</div>
                                                    <div class="flex-1">
                                                        <div class="flex items-start justify-between mb-3 flex-wrap gap-2">
                                                            <div>
                                                                <h4 class="font-black text-2xl text-gray-900">${event.name}</h4>
                                                                <div class="flex items-center gap-2 mt-2 flex-wrap">
                                                                    ${isSoon ? `<span class="bg-gradient-to-r from-orange-500 to-red-500 text-white px-4 py-2 rounded-full text-sm font-black shadow-lg">${daysUntil === 0 ? '🔥 TODAY!' : daysUntil === 1 ? '⚡ Tomorrow' : `⏰ ${daysUntil} days`}</span>` : `<span class="bg-gradient-to-r from-green-500 to-emerald-500 text-white px-4 py-2 rounded-full text-sm font-black shadow-lg">📅 ${daysUntil} days</span>`}
                                                                    <span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-semibold">${event.type}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                        <p class="text-lg font-semibold text-gray-700">📅 ${new Date(event.date).toLocaleDateString('en-US', {weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'})} ${event.time ? `⏰ ${event.time}` : ''}</p>
                                                        ${event.location ? `<p class="text-md text-gray-600 mt-1">📍 ${event.location}</p>` : ''}
                                                        ${event.description ? `<p class="text-md text-gray-700 mt-3">${event.description}</p>` : ''}
                                                        ${event.inviteReady ? '<div class="mt-3"><span class="inline-flex items-center gap-2 bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-4 py-2 rounded-full text-sm font-black shadow-lg">✨ Great for investigators!</span></div>' : ''}
                                                    </div>
                                                </div>
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>
                        ` : ''}

                        ${pastEvents.length > 0 ? `
                            <div>
                                <h3 class="text-2xl font-black text-gray-600 mb-4">📜 Past Events</h3>
                                <div class="space-y-3">
                                    ${pastEvents.slice(0, 5).map(event => `
                                        <div onclick="editEvent('${event.id}')" class="bg-gray-50 rounded-xl p-4 cursor-pointer hover:bg-gray-100 transition-all opacity-70 hover:opacity-100">
                                            <div class="flex items-center gap-3">
                                                <div class="text-3xl">${event.type.split(' ')[0]}</div>
                                                <div class="flex-1">
                                                    <h4 class="font-bold text-lg">${event.name}</h4>
                                                    <p class="text-sm text-gray-600">${new Date(event.date).toLocaleDateString('en-US', {month: 'short', day: 'numeric', year: 'numeric'})} ${event.time || ''}</p>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                    ${pastEvents.length > 5 ? `<p class="text-center text-sm text-gray-500 mt-4">+ ${pastEvents.length - 5} more past events</p>` : ''}
                                </div>
                            </div>
                        ` : ''}
                    `}
                </div>
            `;
        }

        function renderCovenantPath() {
            return `
                <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 mt-8 hover-lift">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="text-6xl">📖</div>
                        <h2 class="text-5xl font-black bg-gradient-to-r from-purple-600 via-pink-600 to-red-600 bg-clip-text text-transparent">The Covenant Path</h2>
                    </div>
                    <div class="space-y-8">
                        ${state.covenantPath.map(person => {
                            const isMale = person.type === 'Male';
                            const isFemaleOrOAY = person.type === 'Female' || person.type === 'OAY';
                            return `
                                <div class="bg-gradient-to-br from-purple-100 via-pink-100 to-indigo-100 rounded-3xl p-8 border-4 border-purple-300 shadow-2xl hover-lift">
                                    <div class="flex items-start justify-between mb-8">
                                        <div class="flex-1">
                                            <h3 class="text-4xl font-black text-purple-900 mb-3">${person.name}</h3>
                                            <div class="flex gap-3 flex-wrap">
                                                <span class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-5 py-2 rounded-full text-lg font-black shadow-lg">✨ Baptized: ${new Date(person.baptismDate).toLocaleDateString()}</span>
                                                ${person.assignment ? `<span class="bg-gradient-to-r from-blue-600 to-cyan-600 text-white px-5 py-2 rounded-full text-lg font-black shadow-lg">📍 ${person.assignment}</span>` : ''}
                                            </div>
                                        </div>
                                        <button onclick="removeFromCovenantPath(${person.id})" class="text-red-500 hover:bg-red-100 p-4 rounded-2xl transition-all hover-lift">🗑️</button>
                                    </div>

                                    ${!person.type ? `
                                        <div class="mb-8 bg-white rounded-2xl p-6 border-4 border-purple-400 shadow-xl">
                                            <label class="block text-xl font-black mb-4 text-purple-900">Select Type:</label>
                                            <div class="grid grid-cols-3 gap-4">
                                                <button onclick="updateCovenantField(${person.id}, 'type', 'Male')" class="bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-8 py-6 rounded-2xl font-black text-2xl transition-all shadow-xl hover-lift">👨 Male</button>
                                                <button onclick="updateCovenantField(${person.id}, 'type', 'Female')" class="bg-gradient-to-r from-pink-500 to-pink-600 hover:from-pink-600 hover:to-pink-700 text-white px-8 py-6 rounded-2xl font-black text-2xl transition-all shadow-xl hover-lift">👩 Female</button>
                                                <button onclick="updateCovenantField(${person.id}, 'type', 'OAY')" class="bg-gradient-to-r from-purple-500 to-purple-600 hover:from-purple-600 hover:to-purple-700 text-white px-8 py-6 rounded-2xl font-black text-2xl transition-all shadow-xl hover-lift">🎓 OAY</button>
                                            </div>
                                        </div>
                                    ` : ''}

                                    ${isMale ? `
                                        <div class="mb-8">
                                            <h4 class="font-black text-2xl text-purple-900 mb-6 flex items-center gap-3">🏆 Ordinance Path (Male)</h4>
                                            <div class="grid md:grid-cols-2 gap-4">
                                                ${[
                                                    { key: 'aaronicPriesthood', label: 'Aaronic Priesthood', emoji: '✋' },
                                                    { key: 'templeBaptisms', label: 'Temple Baptisms', emoji: '🏛️' },
                                                    { key: 'patriarchalBlessing', label: 'Patriarchal Blessing', emoji: '📜' },
                                                    { key: 'melchizedekPriesthood', label: 'Melchizedek Priesthood', emoji: '👔' },
                                                    { key: 'endowment', label: 'Temple Endowment', emoji: '⭐' }
                                                ].map(ord => `
                                                    <label class="flex items-center gap-4 bg-white p-6 rounded-2xl cursor-pointer hover:bg-purple-50 transition-all hover-lift border-3 border-purple-200 shadow-lg">
                                                        <input type="checkbox" ${person.ordinances[ord.key] ? 'checked' : ''} onchange="updateCovenantField(${person.id}, 'ordinance_${ord.key}', this.checked)" class="w-7 h-7 text-purple-600 rounded-lg" />
                                                        <span class="text-3xl">${ord.emoji}</span>
                                                        <span class="font-black text-lg">${ord.label}</span>
                                                    </label>
                                                `).join('')}
                                            </div>
                                        </div>
                                    ` : ''}

                                    ${isFemaleOrOAY ? `
                                        <div class="mb-8">
                                            <h4 class="font-black text-2xl text-purple-900 mb-6 flex items-center gap-3">🏆 Ordinance Path (${person.type})</h4>
                                            <div class="grid md:grid-cols-2 gap-4">
                                                ${[
                                                    { key: 'templeBaptisms', label: 'Temple Baptisms', emoji: '🏛️' },
                                                    { key: 'patriarchalBlessing', label: 'Patriarchal Blessing', emoji: '📜' },
                                                    { key: 'endowment', label: 'Temple Endowment', emoji: '⭐' }
                                                ].map(ord => `
                                                    <label class="flex items-center gap-4 bg-white p-6 rounded-2xl cursor-pointer hover:bg-purple-50 transition-all hover-lift border-3 border-purple-200 shadow-lg">
                                                        <input type="checkbox" ${person.femaleOrdinances[ord.key] ? 'checked' : ''} onchange="updateCovenantField(${person.id}, 'femaleOrd_${ord.key}', this.checked)" class="w-7 h-7 text-purple-600 rounded-lg" />
                                                        <span class="text-3xl">${ord.emoji}</span>
                                                        <span class="font-black text-lg">${ord.label}</span>
                                                    </label>
                                                `).join('')}
                                            </div>
                                        </div>
                                    ` : ''}

                                    ${person.type ? `
                                        <div class="mb-8">
                                            <h4 class="font-black text-2xl text-purple-900 mb-6 flex items-center gap-3">✨ Self-Reliance Classes</h4>
                                            <div class="grid md:grid-cols-2 gap-4">
                                                ${[
                                                    { key: 'emotionalResilience', label: 'Emotional Resilience', emoji: '💙' },
                                                    { key: 'personalFinances', label: 'Personal Finances', emoji: '💰' },
                                                    { key: 'startGrowBusiness', label: 'Start & Grow Business', emoji: '🚀' },
                                                    { key: 'educationBetterWork', label: 'Education for Better Work', emoji: '🎓' },
                                                    { key: 'findBetterJob', label: 'Find a Better Job', emoji: '💼' }
                                                ].map(sr => `
                                                    <label class="flex items-center gap-4 bg-white p-6 rounded-2xl cursor-pointer hover:bg-blue-50 transition-all hover-lift border-3 border-blue-200 shadow-lg">
                                                        <input type="checkbox" ${person.selfRelianceCompleted[sr.key] ? 'checked' : ''} onchange="updateCovenantField(${person.id}, 'selfReliance_${sr.key}', this.checked)" class="w-7 h-7 text-blue-600 rounded-lg" />
                                                        <span class="text-3xl">${sr.emoji}</span>
                                                        <span class="font-black text-lg">${sr.label}</span>
                                                    </label>
                                                `).join('')}
                                            </div>
                                        </div>
                                        <div>
                                            <label class="block text-xl font-black mb-4 text-purple-900">📝 Notes:</label>
                                            <textarea onchange="updateCovenantField(${person.id}, 'notes', this.value)" placeholder="Track church attendance, new member discussions, and progress..." class="w-full px-6 py-4 border-4 border-purple-300 rounded-2xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none text-lg font-semibold shadow-lg" rows="4">${person.notes}</textarea>
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        window.saveToFirebase = saveToFirebase;
        render();
    </script>
</body>
</html>
