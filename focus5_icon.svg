<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101d3c"/>
      <stop offset="0.5" stop-color="#080f20"/>
      <stop offset="1" stop-color="#05080f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.14" r="0.9">
      <stop offset="0" stop-color="#e7bd6a" stop-opacity="0.30"/>
      <stop offset="0.45" stop-color="#e8825a" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#e7bd6a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6dca0"/>
      <stop offset="0.55" stop-color="#e7bd6a"/>
      <stop offset="1" stop-color="#bd8f3e"/>
    </linearGradient>
    <radialGradient id="goldDot" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#fbe9c2"/>
      <stop offset="0.6" stop-color="#e7bd6a"/>
      <stop offset="1" stop-color="#c2933f"/>
    </radialGradient>
    <clipPath id="round"><rect x="0" y="0" width="512" height="512" rx="116" ry="116"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>
    <!-- faint tapa lattice -->
    <g fill="none" stroke="#e7bd6a" stroke-width="2" opacity="0.07">
      <path d="M0 256 L256 0 L512 256 L256 512 Z"/>
      <path d="M128 256 L256 128 L384 256 L256 384 Z"/>
    </g>
    <!-- hairline inner frame -->
    <rect x="22" y="22" width="468" height="468" rx="98" ry="98" fill="none" stroke="#e7bd6a" stroke-opacity="0.22" stroke-width="3"/>
  </g>

  <!-- focus reticle -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#gold)" stroke-width="9"/>
  <g stroke="url(#gold)" stroke-width="9" stroke-linecap="round">
    <line x1="256" y1="86"  x2="256" y2="122"/>
    <line x1="256" y1="390" x2="256" y2="426"/>
    <line x1="86"  y1="256" x2="122" y2="256"/>
    <line x1="390" y1="256" x2="426" y2="256"/>
  </g>

  <!-- five dots: the Focus Five quincunx -->
  <g fill="url(#goldDot)">
    <circle cx="194" cy="194" r="23"/>
    <circle cx="318" cy="194" r="23"/>
    <circle cx="194" cy="318" r="23"/>
    <circle cx="318" cy="318" r="23"/>
    <circle cx="256" cy="256" r="28"/>
  </g>
</svg>
