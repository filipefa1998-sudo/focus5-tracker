            --ss-gold:#edc878; --ss-gold-deep:#f6dfa6; --ss-gold-wash:rgba(231,189,106,.16);
            --ss-red:#e891a0; --ss-red-wash:rgba(217,106,122,.18);
            --ss-sage:#8fdca0; --ss-sage-wash:rgba(120,200,140,.16);
            --ss-violet:#c4a6f7; --ss-violet-wash:rgba(168,120,247,.16);
            --ss-bar:#1b2a52; --ss-bar-text:#f6dfa6;
        }
        .dark-mode {
            --ss-ink:#f7f0e6; --ss-ink-soft:#d8cfbf;
            --ss-bg:#0a1224; --ss-surface:#152144; --ss-surface-2:#101a38;
            --ss-line:rgba(231,189,106,.28); --ss-line-2:rgba(244,236,224,.12);
            --ss-muted:#aaa090;
            --ss-gold:#edc878; --ss-gold-deep:#f6dfa6; --ss-gold-wash:rgba(231,189,106,.18);
            --ss-red:#ed9aa9; --ss-red-wash:rgba(217,106,122,.20);
            --ss-sage:#8fdca0; --ss-sage-wash:rgba(120,200,140,.18);
            --ss-violet:#c4a6f7; --ss-violet-wash:rgba(168,120,247,.18);
            --ss-bar:#16234a; --ss-bar-text:#f6dfa6;
        }
        body { background: var(--ss-bg) !important; color: var(--ss-ink); }
        h1,h2,h3 { font-family:'Fraunces', Georgia, serif !important; letter-spacing:-0.01em; color:var(--ss-ink); }

        /* layered Pacific Noir canvas (gold + ember + sea over deep navy) + tapa lattice */
        .pn-canvas{
            background:

              radial-gradient(1000px 760px at 14% 2%, rgba(231,189,106,.16), transparent 60%),
              radial-gradient(1050px 950px at 96% 55%, rgba(231,189,106,.13), transparent 62%),
              radial-gradient(1000px 900px at 6% 60%, rgba(231,189,106,.12), transparent 62%),
              radial-gradient(980px 880px at 12% 104%, rgba(232,130,90,.16), transparent 60%),
              radial-gradient(980px 880px at 88% 106%, rgba(232,130,90,.12), transparent 60%),
              radial-gradient(1300px 1000px at 50% 45%, rgba(42,84,118,.40), transparent 72%),
              linear-gradient(160deg, #0e1830 0%, #0c1426 46%, #101a32 100%) !important;
        }
        .pn-canvas::after{
            content:"";position:absolute;inset:0;opacity:.07;pointer-events:none;
            background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'><g fill='none' stroke='%23e7bd6a' stroke-width='1.1'><path d='M0 60 L60 0 L120 60 L60 120 Z'/><path d='M30 60 L60 30 L90 60 L60 90 Z'/><path d='M60 48 L72 60 L60 72 L48 60 Z'/></g></svg>");
            background-size:120px 120px;
        }

        /* surfaces -> dark glass panels */
        [class~="bg-white"],[class~="bg-white/90"],[class~="bg-white/95"],[class~="bg-white/98"],[class~="bg-gray-50"]{ background-color:var(--ss-surface)!important; }
        [class~="bg-gray-100"]{ background-color:var(--ss-surface-2)!important; }
        [class~="bg-gray-200"],[class~="bg-gray-300"]{ background-color:rgba(244,236,224,.10)!important; }
        [class~="bg-amber-50"],[class~="bg-amber-100"],[class~="bg-blue-50"],[class~="bg-blue-100"],[class~="bg-purple-50"],[class~="bg-purple-100"],[class~="bg-indigo-50"],[class~="bg-indigo-100"],[class~="bg-yellow-100"]{ background-color:var(--ss-gold-wash)!important; }
        [class~="bg-amber-200"]{ background-color:rgba(231,189,106,.20)!important; }
        [class~="bg-green-50"],[class~="bg-green-100"]{ background-color:var(--ss-sage-wash)!important; }
        [class~="bg-red-50"],[class~="bg-red-100"],[class~="bg-rose-50"],[class~="bg-rose-100"],[class~="bg-rose-200"]{ background-color:var(--ss-red-wash)!important; }
        [class~="bg-red-500"]{ background-color:var(--ss-red)!important; }
        [class~="bg-green-500"],[class~="bg-emerald-500"]{ background-color:var(--ss-sage)!important; }

        /* flatten gradients, re-solid by family using the Noir palette */
        [class*="bg-gradient"]:not(.pn-canvas){ background-image:none!important; }
        [class~="from-amber-500"],[class~="from-amber-600"],[class~="from-green-500"],[class~="from-green-600"],[class~="from-indigo-500"],[class~="from-indigo-600"],[class~="from-purple-600"],[class~="from-orange-500"],[class~="from-yellow-400"],[class~="from-teal-600"],[class~="from-blue-600"]{ background-color:var(--ss-bar)!important; color:var(--ss-bar-text)!important; border-color:var(--ss-line)!important; }
        [class~="from-rose-600"],[class~="from-red-500"],[class~="from-red-600"]{ background-color:rgba(217,106,122,.18)!important; color:var(--ss-red)!important; border-color:var(--ss-line)!important; }
        [class~="from-emerald-500"]{ background-color:var(--ss-sage-wash)!important; color:var(--ss-sage)!important; }
        [class~="from-gray-50"]{ background-color:var(--ss-surface-2)!important; }

        /* text */
        [class~="text-amber-300"],[class~="text-amber-600"],[class~="text-amber-700"],[class~="text-amber-800"],[class~="text-amber-900"],[class~="text-orange-700"],[class~="text-yellow-900"]{ color:var(--ss-gold)!important; }
        [class~="text-blue-700"],[class~="text-blue-800"],[class~="text-indigo-700"],[class~="text-indigo-800"],[class~="text-purple-600"],[class~="text-purple-700"],[class~="text-purple-800"],[class~="text-purple-900"],[class~="text-purple-300"]{ color:var(--ss-gold)!important; }
        [class~="text-green-600"],[class~="text-green-700"],[class~="text-green-800"]{ color:var(--ss-sage)!important; }
        [class~="text-red-600"],[class~="text-red-700"],[class~="text-rose-700"],[class~="text-red-400"]{ color:var(--ss-red)!important; }
        [class~="text-gray-400"],[class~="text-gray-500"],[class~="text-gray-300"]{ color:var(--ss-muted)!important; }
        [class~="text-gray-600"],[class~="text-gray-700"],[class~="text-gray-800"],[class~="text-gray-900"]{ color:var(--ss-ink)!important; }

        /* bright nav-tab wording — the dark -900 Tailwind shades were unreadable on dark glass */
        [class~="text-green-900"],[class~="text-emerald-900"]{ color:var(--ss-sage)!important; }
        [class~="text-indigo-900"],[class~="text-purple-900"],[class~="text-violet-900"]{ color:var(--ss-violet)!important; }
        [class~="text-rose-900"],[class~="text-red-900"]{ color:var(--ss-red)!important; }
        [class~="text-blue-900"]{ color:#9ec5ff!important; }
        [class~="text-violet-700"],[class~="text-violet-800"]{ color:var(--ss-violet)!important; }

        [class~="text-emerald-600"],[class~="text-emerald-700"],[class~="text-emerald-800"]{ color:var(--ss-sage)!important; }
        [class~="text-blue-600"],[class~="text-blue-700"],[class~="text-blue-800"]{ color:#9ec5ff!important; }
        [class~="text-orange-600"],[class~="text-orange-700"],[class~="text-orange-800"]{ color:#f6b87a!important; }

        .tw-field::placeholder{ color:var(--ss-muted); opacity:.85; }
        .tw-field{ color:var(--ss-ink); }
        .tw-field option{ background:var(--ss-surface); color:var(--ss-ink); }
        .tw-field::-webkit-calendar-picker-indicator{ filter:invert(.85); }

        [class~="bg-purple-50"],[class~="bg-purple-100"],[class~="bg-indigo-50"],[class~="bg-indigo-100"]{ background-color:var(--ss-violet-wash)!important; }

        /* borders -> gold hairline */
        [class~="border-amber-100"],[class~="border-amber-200"],[class~="border-amber-300"],[class~="border-amber-400"],[class~="border-gray-100"],[class~="border-gray-200"],[class~="border-green-200"],[class~="border-rose-200"],[class~="border-rose-400"],[class~="border-purple-200"],[class~="border-purple-400"],[class~="border-purple-500"],[class~="border-indigo-100"],[class~="border-indigo-200"],[class~="border-blue-200"],[class~="border-red-200"],[class~="border-yellow-200"]{ border-color:var(--ss-line)!important; }

        /* inputs */
        input,textarea,select{ background-color:var(--ss-surface-2)!important; color:var(--ss-ink)!important; border-color:var(--ss-line)!important; }
        input::placeholder,textarea::placeholder{ color:var(--ss-muted)!important; }
        select option{ background-color:#0b1428; color:var(--ss-ink); }
        input:focus,textarea:focus,select:focus{ border-color:var(--ss-gold)!important; outline:none!important; box-shadow:0 0 0 3px rgba(231,189,106,.20)!important; }
        input[type="date"]{ color-scheme:dark; }

        /* motion only on actionable things — never whole rows */
        .hover-lift{ transition:transform .12s ease, box-shadow .12s ease!important; }
        button.hover-lift:hover,a.hover-lift:hover,label.hover-lift:hover{ box-shadow:0 8px 26px rgba(0,0,0,.45)!important; }
        button:active{ transform:scale(.985); }
        tr{ transition:none!important; }
        tr:hover{ background:inherit!important; }
        [class*="shadow"]{ box-shadow:0 1px 2px rgba(0,0,0,.4), 0 14px 40px rgba(0,0,0,.35)!important; }

        /* gold underline on active tabs/toggles */
        [class~="scale-105"],[class~="scale-110"]{ transform:none!important; box-shadow:inset 0 -3px 0 var(--ss-gold)!important; }

        /* sticky frosted toolbar */
        .ss-sticky{ position:sticky; top:0; z-index:50; backdrop-filter:saturate(140%) blur(14px); -webkit-backdrop-filter:saturate(140%) blur(14px); background:rgba(14,22,42,.74); margin:0 0 16px; padding:14px; border:1px solid var(--ss-line); border-radius:18px; box-shadow:0 14px 40px rgba(0,0,0,.28); }

        /* status dots + chips */
        .ss-dot{ display:inline-block; width:9px; height:9px; border-radius:50%; flex:0 0 auto; box-shadow:0 0 0 1px rgba(0,0,0,.35), 0 0 6px rgba(231,189,106,.15); }
        .ss-chip{ display:inline-flex; align-items:center; gap:5px; padding:2px 8px 2px 6px; border-radius:999px; background:rgba(255,255,255,.04); border:1px solid var(--ss-line-2); font-size:11px; font-weight:700; color:var(--ss-ink); letter-spacing:.02em; }
        .ss-dotrow{ display:flex; flex-wrap:wrap; gap:5px; align-items:center; justify-content:center; }

        /* presence / streak bar */
        .ss-presence{ margin-top:6px; }
        .ss-presence-track{ height:6px; border-radius:999px; background:rgba(255,255,255,.08); overflow:hidden; }
        .ss-presence-fill{ height:100%; border-radius:999px; background:linear-gradient(90deg,var(--ss-gold-deep),var(--ss-gold)); transition:width .3s ease; }
        .ss-presence-meta{ display:flex; gap:8px; align-items:center; margin-top:5px; font-size:11px; font-weight:600; color:var(--ss-muted); flex-wrap:wrap; }
        .ss-presence-meta .hot{ color:var(--ss-gold); }
        .ss-presence-meta .warn{ color:var(--ss-red); font-weight:700; }

        .pulse-glow{ animation:none; }
        .floating-particle{ display:none!important; }
        @keyframes shimmer { 0%{background-position:-1000px 0} 100%{background-position:1000px 0} }
        .shimmer{ background:linear-gradient(90deg,transparent,rgba(231,189,106,.18),transparent); background-size:1000px 100%; animation:shimmer 3s infinite; }

        @media (max-width: 768px) {
            .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .mobile-hide { display: none; }
            .ss-sticky{ margin:0 0 12px; padding:10px; border-radius:14px; }
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            #app { display: none !important; }
            #printReport { display: block !important; }
        }
    </style>

        function parseLocalDate(str) {
            if (!str) return new Date();
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);   // local midnight — no timezone shift

                                        return `<th class="text-white p-2 md:p-5 text-center font-black text-xs md:text-base ${state.trackerView === 'month' ? 'min-w-[200px]' : 'min-w-[65px]'} ${state.trackerView === 'month' && isCurrentM ? 'bg-white/20' : ''}">${m}</th>`;

                            <tbody>
                                ${currentList.map((person, idx) => {

                                    return `
                                        <tr style="border-bottom:1px solid var(--ss-line);">

                                                <div class="flex items-center gap-2">
                                                    <button onclick="openEmojiPicker(${person.id})" class="text-2xl md:text-3xl hover:scale-110 transition-transform flex-shrink-0" title="${currentLang==='to'?'Liliu fakaʻilonga':'Change avatar'}">${person.emoji||'👤'}</button>
                                                    <div class="flex-1 min-w-0">
                                                        <input type="text" value="${person.name || ''}" onchange="updateName(${person.id}, this.value)" placeholder="${idx + 1}. ${currentLang==='to'?'Hingoa...':'Name...'}" class="w-full px-2 py-1.5 border-2 border-amber-200 rounded-lg focus:border-amber-500 focus:outline-none font-bold text-sm shadow-sm" />
                                                        <input type="text" value="${person.goal || ''}" onchange="updateGoal(${person.id}, this.value)" placeholder="${currentLang==='to'?'🎯 Taumu...':'🎯 Goal...'}" class="w-full px-2 py-1 border border-amber-100 rounded-lg focus:border-amber-400 focus:outline-none text-xs text-gray-400 shadow-sm mt-1 hidden md:block" />
                                                        <div class="mt-1.5">
                                                            ${(() => {
                                                                const streak = (() => { let s=0; for(let i=new Date().getMonth();i>=0;i--){ if((person.progress?.[MONTHS[i]]?.length||0)>0)s++;else break;} return s; })();
                                                                const totalActs = Object.values(person.progress||{}).flat().length;
                                                                const thisMonthActs = person.progress?.[currentMonthName]?.length||0;
                                                                const GOAL = 5;
                                                                const pct = Math.min(100, Math.round((thisMonthActs / GOAL) * 100));
                                                                if (!person.name) return '';
                                                                return `
                                                                <div class="ss-presence">
                                                                    <div class="ss-presence-track"><div class="ss-presence-fill" style="width:${pct}%;${thisMonthActs===0?'background:var(--ss-line-2);':''}"></div></div>
                                                                    <div class="ss-presence-meta">
                                                                        ${streak > 0 ? `<span class="hot">${streak} mo streak</span>` : ''}
                                                                        <span>${thisMonthActs}/${GOAL} this mo</span>
                                                                        ${totalActs > 0 ? `<span>· ${totalActs} total</span>` : ''}
                                                                        ${hasNoActivity ? `<span class="warn">needs contact</span>` : ''}
                                                                    </div>
                                                                </div>`;
                                                            })()}
                                                        </div>
                                                    </div>
                                                </div>
                                            </td>
                                            ${visibleMonths.map(month => {
                                                const monthData = person.progress?.[month] || [];
                                                const isCurrentM = month === currentMonthName;
                                                const cellBg = '';
                                                return `<td class="p-2 md:p-4 text-center border-l ${state.trackerView === 'month' ? 'min-w-[200px]' : ''}" style="border-color:var(--ss-line);${isCurrentM ? 'background:var(--ss-gold-wash);' : ''}">
                                                    ${state.trackerView === 'month' ? `

                                                                }).join('')
                                                                : `<div class="text-center" style="color:var(--ss-muted);">
                                                                    <div class="text-2xl mb-0.5" style="color:var(--ss-line-2);">+</div>
                                                                    <div class="text-xs font-semibold">${t('Tap to log')}</div>
                                                                </div>`}
                                                        </div>
                                                        <button onclick="openIndicatorModal(${person.id}, '${month}')"
                                                            class="w-full py-2 text-xs rounded-xl transition-all" style="font-weight:600;${monthData.length > 0 ? 'background:var(--ss-gold-wash);color:var(--ss-gold-deep);border:1px solid var(--ss-line);' : 'background:var(--ss-bar);color:var(--ss-bar-text);'}">
                                                            ${monthData.length > 0 ? `${t('Edit Activities')}` : `+ ${t('Log Activities')}`}
                                                        </button>
                                                    </div>` : `
                                                    <div class="min-h-[44px] flex items-center justify-center flex-wrap gap-1.5 py-1">
                                                        ${monthData.length > 0
                                                            ? monthData.map(code => { const ind = INDICATORS.find(i => i.code === code); return `<span class="ss-dot" style="background:${indDot(ind||code)};width:11px;height:11px;" title="${ind ? (currentLang==='to'?ind.toName:ind.name) : code} (${code})"></span>`; }).join('')
                                                            : `<button onclick="openIndicatorModal(${person.id}, '${month}')" class="text-2xl transition-colors" style="color:var(--ss-line-2);">+</button>`}
                                                    </div>
                                                    ${monthData.length > 0 ? `<button onclick="openIndicatorModal(${person.id}, '${month}')" class="text-xs font-bold" style="color:var(--ss-gold-deep);">${t('Edit')}</button>` : ''}`}

                                                    <option value="Elders Quorum" ${person.assignedTo==='Elders Quorum'?'selected':''}>⚡ Elders Quorum</option>
                                                    <option value="Relief Society" ${person.assignedTo==='Relief Society'?'selected':''}>🌸 Relief Society</option>

                                                    <option value="Young Women" ${person.assignedTo==='Young Women'?'selected':''}>⭐ Young Women</option>

                                            <td class="p-2 md:p-3">

                    </div>

        function renderWeekBadge() {
            const today = new Date(); today.setHours(0,0,0,0);
            const in7 = new Date(today); in7.setDate(today.getDate()+7);
            const allPeople = [...state.investigators, ...state.returning].filter(p => p.name);
            const overdue = allPeople.filter(p => p.nextContactDate && parseLocalDate(p.nextContactDate) < today).length;
            const thisWeek = allPeople.filter(p => p.nextContactDate && parseLocalDate(p.nextContactDate) >= today && parseLocalDate(p.nextContactDate) <= in7).length;
            const total = overdue + thisWeek;
            if (total === 0) return '';
            return `<span class="ml-1 ${overdue > 0 ? 'bg-red-500' : 'bg-orange-400'} text-white rounded-full px-1.5 text-xs font-black">${total}</span>`;
        }

        function renderThisWeek() {
            const today = new Date(); today.setHours(0,0,0,0);
            const in7 = new Date(today); in7.setDate(today.getDate()+7);
            // Filter based on activeTab — default shows all, but user can toggle
            const weekFilter = state.weekFilter || 'all';
            const rawInv = state.investigators.map(p=>({...p,_tab:'investigators'})).filter(p=>p.name);
            const rawRet = state.returning.map(p=>({...p,_tab:'returning'})).filter(p=>p.name);
            const allPeople = weekFilter === 'investigators' ? rawInv : weekFilter === 'returning' ? rawRet : [...rawInv, ...rawRet];

            function getDaysUntil(dateStr) {
                if (!dateStr) return null;
                const d = parseLocalDate(dateStr); d.setHours(0,0,0,0);
                return Math.ceil((d - today) / (1000*60*60*24));
            }
            function getDaysSinceContact(dateStr) {
                if (!dateStr) return null;
                const d = parseLocalDate(dateStr); d.setHours(0,0,0,0);
                return Math.ceil((today - d) / (1000*60*60*24));
            }

            const completed = allPeople.filter(p => p.taskDone).sort((a,b)=> (b.taskDoneDate||'').localeCompare(a.taskDoneDate||''));
            const active = allPeople.filter(p => !p.taskDone);
            const overdue = active.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) < 0).sort((a,b)=>parseLocalDate(a.nextContactDate)-parseLocalDate(b.nextContactDate));
            const dueThisWeek = active.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) >= 0 && getDaysUntil(p.nextContactDate) <= 7).sort((a,b)=>parseLocalDate(a.nextContactDate)-parseLocalDate(b.nextContactDate));
            const upcoming = active.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) > 7).sort((a,b)=>parseLocalDate(a.nextContactDate)-parseLocalDate(b.nextContactDate));
            const noDate = active.filter(p => !p.nextContactDate);

            function renderPersonCard(p, urgency) {
                const days = getDaysUntil(p.nextContactDate);
                const sinceContact = getDaysSinceContact(p.lastContactDate);
                const accent = { overdue:'#f87171', today:'#fb923c', week:'#fbbf24', upcoming:'#4ade80', none:'#94a3b8', done:'#34d399' }[urgency] || '#94a3b8';
                const badgeStyle = {
                    overdue:'background:#ef4444;color:#fff',
                    today:'background:#f97316;color:#fff',
                    week:'background:#f59e0b;color:#1a1206',
                    upcoming:'background:#16a34a;color:#fff',
                    none:'background:rgba(255,255,255,.12);color:var(--ss-ink-soft)',
                    done:'background:#16a34a;color:#fff'
                }[urgency] || 'background:rgba(255,255,255,.12);color:var(--ss-ink-soft)';
                let badgeText = '';
                if (urgency === 'done') badgeText = `✅ ${t('Completed')}${p.taskDoneDate ? ' · '+p.taskDoneDate.slice(5) : ''}`;
                else if (days === null) badgeText = '⚪ No date';
                else if (days < 0) badgeText = `🔴 ${Math.abs(days)}d overdue`;
                else if (days === 0) badgeText = '🔥 Today!';
                else if (days === 1) badgeText = '⚡ Tomorrow';
                else badgeText = `📅 In ${days} days`;

                const tabIcon = p._tab === 'investigators' ? '👤' : '💙';
                const isDone = urgency === 'done';
                const fieldStyle = 'background:rgba(255,255,255,.06);border:1px solid var(--ss-line-2);color:var(--ss-ink)';
                return `
                <div class="tw-card rounded-xl p-4 transition-all" style="background:rgba(255,255,255,.05);border:1px solid var(--ss-line-2);border-left:4px solid ${accent};">
                    <div class="flex items-start justify-between gap-3 flex-wrap">
                        <div class="flex items-start gap-3 flex-1 min-w-0">
                            <span class="text-2xl flex-shrink-0">${p.emoji||tabIcon}</span>
                            <div class="min-w-0 flex-1">
                                <div class="font-black text-base leading-tight ${isDone ? 'line-through opacity-60' : ''}" style="color:var(--ss-ink);">${p.name || '(unnamed)'}</div>
                                <div class="flex items-center gap-2 mt-1 flex-wrap">
                                    ${p.assignedTo
                                        ? `<span class="text-xs px-2 py-0.5 rounded-full font-bold" style="background:var(--ss-gold-wash);color:var(--ss-gold-deep);">👤 ${p.assignedTo}</span>`
                                        : `<span class="text-xs px-2 py-0.5 rounded-full font-bold" style="background:var(--ss-red-wash);color:var(--ss-red);">⚠️ Unassigned</span>`}
                                    <span class="text-xs font-bold" style="color:${p._tab==='investigators'?'var(--ss-gold)':'var(--ss-sage)'};">${p._tab==='investigators'?'Investigator':'Returning'}</span>
                                </div>
                                <input type="text" value="${(p.nextAction||'').replace(/"/g,'&quot;')}" onchange="quickSetAction('${p.id}','${p._tab}',this.value)" placeholder="📝 ${t('Add a task / next action...')}" class="tw-field mt-2 w-full text-sm font-semibold rounded-lg px-2 py-1.5 focus:outline-none ${isDone?'line-through opacity-60':''}" style="${fieldStyle}" />
                                <textarea onchange="quickSetNotes('${p.id}','${p._tab}',this.value)" rows="1" placeholder="🗒️ ${t('Note for this contact...')}" class="tw-field mt-2 w-full text-xs rounded-lg px-2 py-1.5 resize-none focus:outline-none" style="${fieldStyle}">${p.notes||''}</textarea>
                                ${sinceContact !== null ? `<div class="mt-1.5 text-xs font-semibold" style="color:var(--ss-muted);">Last contacted: ${sinceContact === 0 ? 'today' : sinceContact+'d ago'}</div>` : ''}
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-2 flex-shrink-0">
                            <span class="text-xs font-black px-3 py-1 rounded-full" style="${badgeStyle}">${badgeText}</span>
                            ${isDone
                                ? `<button onclick="toggleTaskDone('${p.id}','${p._tab}')" class="text-xs font-black px-3 py-1.5 rounded-lg transition-all" style="background:rgba(255,255,255,.08);border:1px solid var(--ss-line-2);color:var(--ss-ink-soft);">↩️ ${t('Reopen')}</button>`
                                : `<button onclick="markContacted_tab('${p.id}','${p._tab}')" class="text-xs font-black px-3 py-1.5 rounded-lg transition-all" style="background:var(--ss-red-wash);border:1px solid var(--ss-red);color:var(--ss-red);">✅ Mark Contacted</button>
                                   <button onclick="toggleTaskDone('${p.id}','${p._tab}')" class="text-xs font-black px-3 py-1.5 rounded-lg transition-all" style="background:var(--ss-sage-wash);border:1px solid var(--ss-sage);color:var(--ss-sage);">✓ ${t('Mark Done')}</button>
                                   <input type="date" value="${p.nextContactDate||''}" onchange="quickSetDate('${p.id}','${p._tab}',this.value)" class="tw-field text-xs rounded-lg px-2 py-1 focus:outline-none" style="${fieldStyle}" title="Set next contact date" />
                                   <select onchange="logContactActivity('${p.id}','${p._tab}',this.value); this.value='';" class="tw-field text-xs rounded-lg px-2 py-1 focus:outline-none" style="${fieldStyle}" title="Log an activity (also marks contacted)">
                                       <option value="">＋ ${t('Log activity')}</option>
                                       ${INDICATORS.map(i=>`<option value="${i.code}">${i.emoji} ${i.code} — ${currentLang==='to'?i.toName:i.name}</option>`).join('')}
                                   </select>`}
                        </div>
                    </div>
                </div>`;
            }

            // Weekly share summary generator
            function generateWeeklySummary() {
                const lines = ['📋 This Week\'s Focus — Riverton 24th Tongan Ward\n'];
                if (overdue.length) {
                    lines.push('🔴 OVERDUE:');
                    overdue.forEach(p => lines.push(`  • ${p.name}${p.assignedTo?' → '+p.assignedTo:''} — ${p.nextAction||'Contact needed'}`));
                }
                if (dueThisWeek.length) {
                    lines.push('\n🟡 DUE THIS WEEK:');
                    dueThisWeek.forEach(p => {
                        const d = getDaysUntil(p.nextContactDate);
                        const when = d===0?'Today':d===1?'Tomorrow':`${parseLocalDate(p.nextContactDate).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}`;
                        lines.push(`  • ${p.name} — ${when}${p.assignedTo?' ('+p.assignedTo+')':''}: ${p.nextAction||'Follow up'}`);
                    });
                }
                return lines.join('\n');
            }

            const totalAction = overdue.length + dueThisWeek.length;

            return `
            <div class="space-y-5">
                <!-- Header -->
                <div class="bg-gradient-to-r from-rose-600 to-red-600 rounded-2xl p-5 shadow-xl text-white">
                    <div class="flex items-center justify-between flex-wrap gap-3">
                        <div class="flex items-center gap-3">
                            <span class="text-4xl">📋</span>
                            <div>
                                <h2 class="text-2xl font-black">This Week's Focus</h2>
                                <p class="text-rose-200 text-sm font-semibold">Who needs to be contacted and by whom</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 flex-wrap">
                            <!-- Tab filter -->
                            <div class="flex bg-white/20 rounded-xl p-1 gap-1">
                                <button onclick="setWeekFilter('all')" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all ${weekFilter==='all'?'bg-white text-rose-700 shadow':'text-white'}">All</button>
                                <button onclick="setWeekFilter('investigators')" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all ${weekFilter==='investigators'?'bg-white text-rose-700 shadow':'text-white'}">👤 Invest.</button>
                                <button onclick="setWeekFilter('returning')" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all ${weekFilter==='returning'?'bg-white text-rose-700 shadow':'text-white'}">💙 Return.</button>
                            </div>
                            <div class="text-center bg-white/20 rounded-xl px-4 py-2">
                                <div class="text-2xl font-black">${totalAction}</div>
                                <div class="text-xs font-bold text-rose-200">Need Action</div>
                            </div>
                            <button onclick="toggleAddContact()" class="flex items-center gap-2 px-4 py-2.5 bg-white/20 text-white rounded-xl font-black text-sm shadow-lg hover:bg-white/30 transition-all hover-lift">➕ ${t('Add')}</button>
                            <button onclick="sendWeeklyFocus()" class="flex items-center gap-2 px-4 py-2.5 bg-white text-rose-700 rounded-xl font-black text-sm shadow-lg hover:shadow-xl transition-all hover-lift">
                                📱 Send Summary
                            </button>
                        </div>
                    </div>
                </div>

                <!-- KPI headline strip -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <div class="rounded-2xl p-4 text-center" style="background:var(--ss-surface);border:1px solid var(--ss-line-2);border-top:3px solid #ef4444;">
                        <div class="text-3xl font-black" style="color:#f87171;">${overdue.length}</div>
                        <div class="text-xs font-bold uppercase tracking-wide" style="color:var(--ss-muted);">${t('Overdue')}</div>
                    </div>
                    <div class="rounded-2xl p-4 text-center" style="background:var(--ss-surface);border:1px solid var(--ss-line-2);border-top:3px solid #f59e0b;">
                        <div class="text-3xl font-black" style="color:#fbbf24;">${dueThisWeek.length}</div>
                        <div class="text-xs font-bold uppercase tracking-wide" style="color:var(--ss-muted);">${t('Due This Week')}</div>
                    </div>
                    <div class="rounded-2xl p-4 text-center" style="background:var(--ss-surface);border:1px solid var(--ss-line-2);border-top:3px solid #94a3b8;">
                        <div class="text-3xl font-black" style="color:var(--ss-ink);">${noDate.length}</div>
                        <div class="text-xs font-bold uppercase tracking-wide" style="color:var(--ss-muted);">${t('Awaiting Date')}</div>
                    </div>
                    <div class="rounded-2xl p-4 text-center" style="background:var(--ss-surface);border:1px solid var(--ss-line-2);border-top:3px solid #16a34a;">
                        <div class="text-3xl font-black" style="color:#34d399;">${completed.length}</div>
                        <div class="text-xs font-bold uppercase tracking-wide" style="color:var(--ss-muted);">${t('Task Completed')}</div>
                    </div>
                </div>

                ${allPeople.length === 0 ? `
                <div class="rounded-2xl p-10 text-center" style="background:var(--ss-surface);border:1px dashed var(--ss-line);">
                    <div class="text-5xl mb-3">🌱</div>
                    <h3 class="text-xl font-black mb-1" style="color:var(--ss-ink);">${t('Nobody to follow up with yet')}</h3>
                    <p class="text-sm mb-4" style="color:var(--ss-muted);">${t('Add your first contact to start tracking who needs a visit, a call, or an invitation.')}</p>
                    <button onclick="toggleAddContact()" class="px-5 py-2.5 rounded-xl font-black text-sm hover-lift" style="background:linear-gradient(90deg,#e11d48,#be123c);color:#fff;">➕ ${t('Add Contact & Task')}</button>
                </div>` : ''}

                ${state.showAddContact ? `
                <div class="rounded-2xl p-5 shadow-xl border" style="background:var(--ss-surface);border-color:var(--ss-line);">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="font-black text-lg" style="color:var(--ss-gold-deep);">➕ ${t('Add Contact & Task')}</h3>
                        <button onclick="toggleAddContact()" class="text-sm font-bold" style="color:var(--ss-muted);">✕</button>
                    </div>
                    <div class="grid md:grid-cols-2 gap-3">
                        <input id="twAddName" type="text" placeholder="${t('Name')}" class="tw-field rounded-lg px-3 py-2 text-sm focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid var(--ss-line-2);color:var(--ss-ink);" />
                        <select id="twAddType" class="tw-field rounded-lg px-3 py-2 text-sm focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid var(--ss-line-2);color:var(--ss-ink);">
                            <option value="investigators">👤 ${t('Investigators')}</option>
                            <option value="returning">💙 ${t('Returning')}</option>
                        </select>
                        <input id="twAddAction" type="text" placeholder="📝 ${t('Add a task / next action...')}" class="tw-field rounded-lg px-3 py-2 text-sm focus:outline-none md:col-span-1" style="background:rgba(255,255,255,.06);border:1px solid var(--ss-line-2);color:var(--ss-ink);" />
                        <input id="twAddDate" type="date" class="tw-field rounded-lg px-3 py-2 text-sm focus:outline-none" style="background:rgba(255,255,255,.06);border:1px solid var(--ss-line-2);color:var(--ss-ink);" />
                    </div>
                    <button onclick="thisWeekAddContact()" class="mt-3 px-5 py-2.5 rounded-xl font-black text-sm transition-all hover-lift" style="background:linear-gradient(90deg,#16a34a,#15803d);color:#fff;">✓ ${t('Add')}</button>
                </div>` : ''}

                ${overdue.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-red-200">
                    <div class="bg-gradient-to-r from-red-500 to-red-600 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">🔴</span>
                        <h3 class="font-black text-white text-lg">Overdue <span class="bg-white/30 text-white text-sm px-2 py-0.5 rounded-full ml-1">${overdue.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${overdue.map(p=>renderPersonCard(p,'overdue')).join('')}</div>
                </div>` : ''}

                ${dueThisWeek.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-yellow-200">
                    <div class="bg-gradient-to-r from-yellow-400 to-orange-400 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">🟡</span>
                        <h3 class="font-black text-yellow-900 text-lg">Due This Week <span class="bg-yellow-900/20 text-yellow-900 text-sm px-2 py-0.5 rounded-full ml-1">${dueThisWeek.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${dueThisWeek.map(p=>renderPersonCard(p,'week')).join('')}</div>
                </div>` : ''}

                ${upcoming.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-green-200">
                    <div class="bg-gradient-to-r from-green-400 to-emerald-500 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">🟢</span>
                        <h3 class="font-black text-white text-lg">Upcoming <span class="bg-white/30 text-white text-sm px-2 py-0.5 rounded-full ml-1">${upcoming.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${upcoming.map(p=>renderPersonCard(p,'upcoming')).join('')}</div>
                </div>` : ''}

                ${noDate.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-gray-200">
                    <div class="bg-gray-200 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">⚪</span>
                        <h3 class="font-black text-gray-700 text-lg">No Contact Date Set <span class="bg-gray-400/20 text-gray-600 text-sm px-2 py-0.5 rounded-full ml-1">${noDate.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${noDate.filter(p=>p.name).map(p=>renderPersonCard(p,'none')).join('')}</div>
                </div>` : ''}

                ${completed.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-green-200">
                    <div class="bg-gradient-to-r from-green-500 to-emerald-600 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">✅</span>
                        <h3 class="font-black text-white text-lg">${t('Task Completed')} <span class="bg-white/30 text-white text-sm px-2 py-0.5 rounded-full ml-1">${completed.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${completed.map(p=>renderPersonCard(p,'done')).join('')}</div>
                </div>` : ''}

                ${allPeople.length === 0 ? `
                <div class="bg-white/95 rounded-2xl shadow-xl p-12 text-center">
                    <div class="text-7xl mb-4">📋</div>
                    <p class="text-xl font-black text-gray-600">No people added yet</p>
                    <p class="text-gray-400 mt-2">Add investigators and returning members first, then set their contact dates.</p>
                </div>` : ''}
            </div>`;
        }

        function addDaysISO(days) {
            const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() + days);
            return d.toISOString().split('T')[0];
        }
        window.markContacted_tab = (id, tab) => {
            const today = new Date().toISOString().split('T')[0];
            const nextDate = addDaysISO(7);
            const apply = p => p.id === parseInt(id) ? { ...p, lastContactDate: today, nextContactDate: nextDate } : p;
            if (tab === 'investigators') state.investigators = state.investigators.map(apply);
            else state.returning = state.returning.map(apply);
            saveToFirebase();
            render();
            showSaveMessage(currentLang==='to'?'✓ Fetuʻutaki ʻosi · fai hoko +7 ʻaho':'✓ Contacted · next follow-up in 7 days');
        };
        window.logContactActivity = (id, tab, code) => {
            if (!code) return;
            const today = new Date();
            const monthKey = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][today.getMonth()];
            const todayISO = today.toISOString().split('T')[0];
            const nextDate = addDaysISO(7);
            const idNum = parseInt(id);
            const apply = p => {
                if (p.id !== idNum) return p;
                const prog = { ...(p.progress||{}) };
                const month = prog[monthKey] || [];
                if (!month.includes(code)) prog[monthKey] = [...month, code];
                return { ...p, progress: prog, lastContactDate: todayISO, nextContactDate: nextDate };
            };
            if (tab === 'investigators') state.investigators = state.investigators.map(apply);
            else state.returning = state.returning.map(apply);
            saveToFirebase();
            render();
            const ind = INDICATORS.find(i => i.code === code);
            showSaveMessage('✓ ' + (ind ? ind.emoji+' '+code : code) + ' · ' + (currentLang==='to'?'fetuʻutaki ʻosi':'logged & contacted'));
        };

        window.quickSetDate = (id, tab, dateVal) => {
            const idNum = parseInt(id);
            if (tab === 'investigators') state.investigators = state.investigators.map(p => p.id === idNum ? { ...p, nextContactDate: dateVal } : p);
            else state.returning = state.returning.map(p => p.id === idNum ? { ...p, nextContactDate: dateVal } : p);
            saveToFirebase();
            render();
        };

        window.toggleTaskDone = (id, tab) => {
            const idNum = parseInt(id);
            const today = new Date().toISOString().split('T')[0];
            const flip = p => p.id === idNum ? { ...p, taskDone: !p.taskDone, taskDoneDate: !p.taskDone ? today : '' } : p;
            if (tab === 'investigators') state.investigators = state.investigators.map(flip);
            else state.returning = state.returning.map(flip);
            saveToFirebase();
            render();
        };

        window.quickSetNotes = (id, tab, val) => {
            const idNum = parseInt(id);
            if (tab === 'investigators') state.investigators = state.investigators.map(p => p.id === idNum ? { ...p, notes: val } : p);
            else state.returning = state.returning.map(p => p.id === idNum ? { ...p, notes: val } : p);
            saveToFirebase();
        };

        window.sendWeeklyFocus = () => {
            const today = new Date(); today.setHours(0,0,0,0);
            const in7 = new Date(today); in7.setDate(today.getDate()+7);
            const allPeople = [...state.investigators.map(p=>({...p,_tab:'investigators'})), ...state.returning.map(p=>({...p,_tab:'returning'}))].filter(p=>p.name);
            function getDaysUntil(dateStr) {
                if (!dateStr) return null;
                const d = parseLocalDate(dateStr); d.setHours(0,0,0,0);
                return Math.ceil((d - today) / (1000*60*60*24));
            }
            const overdue = allPeople.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) < 0);
            const dueThisWeek = allPeople.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) >= 0 && getDaysUntil(p.nextContactDate) <= 7);
            const lines = ['📋 This Week\'s Focus — Riverton 24th Tongan Ward\n'];
            if (overdue.length) {
                lines.push('🔴 OVERDUE:');
                overdue.forEach(p => lines.push(`  • ${p.name}${p.assignedTo?' → '+p.assignedTo:''}: ${p.nextAction||'Contact needed'}`));
            }
            if (dueThisWeek.length) {
                lines.push('\n🟡 DUE THIS WEEK:');
                dueThisWeek.forEach(p => {
                    const d = getDaysUntil(p.nextContactDate);
                    const when = d===0?'Today':d===1?'Tomorrow':`${parseLocalDate(p.nextContactDate).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}`;
                    lines.push(`  • ${p.name} — ${when}${p.assignedTo?' ('+p.assignedTo+')':''}: ${p.nextAction||'Follow up'}`);
                });
            }
            if (!overdue.length && !dueThisWeek.length) lines.push('✅ No urgent contacts this week!');
            const text = lines.join('\n');
            if (navigator.share) {
                navigator.share({ title: 'This Week\'s Focus', text });
            } else {
                navigator.clipboard.writeText(text).then(() => showSaveMessage('✓ Weekly summary copied to clipboard!'));
            }
        };

        function renderActionBoard() {
            const today = new Date(); today.setHours(0,0,0,0);
            const currentMonthKey = MONTHS[today.getMonth()];
            const allPeople = [...state.investigators.map(p=>({...p,_tab:'investigators'})), ...state.returning.map(p=>({...p,_tab:'returning'}))].filter(p=>p.name);
            const boardFilter = state.boardFilter || 'all';
            const filteredPeople = boardFilter === 'all' ? allPeople : allPeople.filter(p => (p.assignment || p.assignedTo) === boardFilter);

            function getColumn(p) {
                const allActs = Object.values(p.progress||{}).flat();
                const hasBaptism = allActs.includes('B') || allActs.includes('C');
                const hasBaptismDate = allActs.includes('BD');
                const totalActs = allActs.length;

                if (hasBaptism || hasBaptismDate) return 'milestone';
                if (totalActs === 0) return 'new';

                // Check recency: prefer explicit lastContactDate, fall back to most recent month with activity
                let daysSinceContact = null;
                if (p.lastContactDate) {
                    daysSinceContact = Math.ceil((today - parseLocalDate(p.lastContactDate)) / (1000*60*60*24));
                } else {
                    // Find most recent month with activity as proxy for last contact
                    for (let i = today.getMonth(); i >= 0; i--) {
                        if ((p.progress?.[MONTHS[i]]?.length||0) > 0) {
                            // Approximate: use the last day of that month
                            const approxDate = new Date(today.getFullYear(), i+1, 0);
                            daysSinceContact = Math.ceil((today - approxDate) / (1000*60*60*24));
                            break;
                        }
                    }
                }
                if (daysSinceContact === null || daysSinceContact > 30) return 'attention';
                return 'inprogress';
            }

            function getDaysSinceContact(p) {
                if (!p.lastContactDate) return null;
                return Math.ceil((today - parseLocalDate(p.lastContactDate)) / (1000*60*60*24));
            }

            const columns = {
                new: { label: '🌱 New', subtitle: 'No engagement yet', color: 'from-slate-500 to-slate-600', bg: 'bg-slate-50', border: 'border-slate-200', people: [] },

                    <div class="p-4 md:p-6">

                            <div class="flex items-center gap-1.5 ml-2">

                                        <div class="text-2xl">${ev.type.split(' ')[0]}</div>

                                            <div class="text-xs text-gray-500 font-semibold">${evDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}${ev.time?' · '+ev.time:''} ${ev.location?'· 📍'+ev.location:''}</div>

        function renderCharts(currentList) {
            const totalActivities = currentList.reduce((sum, p) => sum + Object.values(p.progress||{}).flat().length, 0);
            const avgPerPerson = currentList.length > 0 ? (totalActivities/currentList.length).toFixed(1) : 0;
            const isInv = state.activeTab === 'investigators';

            // Most active month
            const monthTotals = MONTHS.map(m => currentList.reduce((s,p) => s + (p.progress?.[m]?.length||0), 0));
            const peakMonthIdx = monthTotals.indexOf(Math.max(...monthTotals));
            const peakMonth = MONTHS[peakMonthIdx];

            // People with activity this month
            const currentMonth = MONTHS[new Date().getMonth()];
            const activeThisMonth = currentList.filter(p => (p.progress?.[currentMonth]?.length||0) > 0).length;

            // Indicator frequency
            const indCounts = {};
            INDICATORS.forEach(ind => { indCounts[ind.code] = 0; });
            currentList.forEach(p => Object.values(p.progress||{}).flat().forEach(code => { if(indCounts[code] !== undefined) indCounts[code]++; }));
            const topIndicators = Object.entries(indCounts).sort((a,b)=>b[1]-a[1]).filter(([,v])=>v>0).slice(0,6);

            // Baptisms / Active members reached
            const baptized = currentList.reduce((s,p)=>s+(Object.values(p.progress||{}).flat().includes('B')?1:0),0) + state.covenantPath.length;
            const activeMember = currentList.reduce((s,p)=>s+(Object.values(p.progress||{}).flat().includes('ACTIVE')?1:0),0);

                                </div>
                                <div class="bg-white/10 backdrop-blur rounded-xl p-4 text-center border border-white/20">
                                    <div class="text-3xl mb-1">🏛️</div>
                                    <div class="text-3xl font-black text-white">${cpEndowed}</div>
                                    <div class="text-xs text-purple-300 font-bold mt-1 uppercase tracking-wide">Endowed</div>
                                </div>
                                <div class="bg-white/10 backdrop-blur rounded-xl p-4 text-center border border-white/20">
                                    <div class="text-3xl mb-1">📜</div>
                                    <div class="text-3xl font-black text-amber-300">${Math.round((totalOrdinances/Math.max(maxOrdinances,1))*100)}%</div>
                                    <div class="text-xs text-purple-300 font-bold mt-1 uppercase tracking-wide">Ordinance Rate</div>
                                </div>
                            </div>

                            <!-- Charts row -->
                            <div class="grid md:grid-cols-2 gap-4 mb-5">
                                <div class="bg-white/10 backdrop-blur rounded-xl p-5 border border-white/20">
                                    <h4 class="font-black text-white mb-1">👥 ${t('Member Types')}</h4>
                                    <p class="text-xs text-purple-300 mb-3 font-semibold">${t('Male / Female / OAY breakdown')}</p>
                                    <div style="height:180px;position:relative;">
                                        ${(cpMale+cpFemale+cpOAY)>0 ? '<canvas id="cpTypeDonut"></canvas>' : `<div class="flex items-center justify-center h-full text-purple-300 text-sm font-bold">${t('Assign types to members first')}</div>`}
                                    </div>
                                </div>
                                <div class="bg-white/10 backdrop-blur rounded-xl p-5 border border-white/20">
                                    <h4 class="font-black text-white mb-1">💼 ${t('Self-Reliance Classes')}</h4>
                                    <p class="text-xs text-purple-300 mb-3 font-semibold">${t('Completed courses across all members')}</p>
                                    <div style="height:180px;position:relative;">
                                        <canvas id="cpSRBar"></canvas>
                                    </div>
                                </div>
                            </div>

                            <!-- Ordinance Progress Bars -->
                            <div class="bg-white/10 backdrop-blur rounded-xl p-5 border border-white/20 mb-4">
                                <h4 class="font-black text-white mb-4">🏆 ${t('Ordinance Progress')} (${totalOrdinances} / ${maxOrdinances} total)</h4>
                                <div class="space-y-3">
                                    ${[
                                        { label: t('Aaronic Priesthood'), count: cpAaronic, emoji: '✋', color: 'from-blue-400 to-blue-500' },
                                        { label: t('Temple Baptisms'), count: cpTemple, emoji: '🏛️', color: 'from-indigo-400 to-indigo-500' },
                                        { label: t('Patriarchal Blessing'), count: cpPatriarchal, emoji: '📜', color: 'from-purple-400 to-purple-500' },
                                        { label: t('Melchizedek Priesthood'), count: cpMelch, emoji: '👔', color: 'from-pink-400 to-pink-500' },
                                        { label: t('Temple Endowment'), count: cpEndowed, emoji: '⭐', color: 'from-amber-400 to-amber-500' },
                                    ].map(ord => {
                                        const pct = cpBaptized > 0 ? Math.round((ord.count/cpBaptized)*100) : 0;
                                        return `<div>
                                            <div class="flex justify-between mb-1">
                                                <span class="text-sm font-bold text-white">${ord.emoji} ${ord.label}</span>
                                                <span class="text-sm font-black text-amber-300">${ord.count} / ${cpBaptized}</span>
                                            </div>
                                            <div class="bg-white/10 rounded-full h-5 overflow-hidden">
                                                <div class="bg-gradient-to-r ${ord.color} h-full rounded-full transition-all flex items-center justify-end pr-2" style="width:${pct}%">
                                                    ${pct > 15 ? `<span class="text-white text-xs font-black">${pct}%</span>` : ''}
                                                </div>
                                            </div>
                                        </div>`;
                                    }).join('')}
                                </div>
                            </div>

                            <!-- Member list with pre-baptism activity count -->
                            <div class="bg-white/10 backdrop-blur rounded-xl p-5 border border-white/20">
                                <h4 class="font-black text-white mb-4">📋 ${t('Member Overview')}</h4>
                                <div class="space-y-3">
                                    ${cp.map(person => {
                                        const preActs = Object.values(person.progress||{}).flat().length;
                                        const ordinanceDone = [
                                            person.ordinances?.aaronicPriesthood, person.ordinances?.templeBaptisms,
                                            person.ordinances?.patriarchalBlessing, person.ordinances?.melchizedekPriesthood, person.ordinances?.endowment,
                                            person.femaleOrdinances?.templeBaptisms, person.femaleOrdinances?.patriarchalBlessing, person.femaleOrdinances?.endowment
                                        ].filter(Boolean).length;
                                        const srDone = Object.values(person.selfRelianceCompleted||{}).filter(Boolean).length;
                                        return `<div class="flex items-center gap-3 bg-white/10 rounded-xl p-3">
                                            <div class="text-2xl">✨</div>
                                            <div class="flex-1">
                                                <div class="font-black text-white text-sm">${person.name}</div>
                                                <div class="text-xs text-purple-300 font-semibold">${t('Baptized')} ${parseLocalDate(person.baptismDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
                                            </div>
                                            <div class="flex gap-2 text-xs font-bold">
                                                <span class="bg-amber-400/20 text-amber-300 px-2 py-1 rounded-lg">⭐ ${preActs} ${t('pre-acts')}</span>
                                                <span class="bg-purple-400/20 text-purple-200 px-2 py-1 rounded-lg">🏛️ ${ordinanceDone} ords</span>
                                                <span class="bg-blue-400/20 text-blue-200 px-2 py-1 rounded-lg">💼 ${srDone} SR</span>
                                            </div>
                                        </div>`;
                                    }).join('')}
                                </div>
                            </div>
                        </div>`;
                    })() : ''}
                </div>`;
        }

        function renderPrayer() {
            const pl = state.prayerList;
            return `
                <div class="space-y-5">
                    <!-- Header card -->
                    <div class="bg-gradient-to-br from-indigo-700 via-purple-700 to-indigo-800 rounded-3xl shadow-2xl p-6 md:p-8">
                        <div class="flex items-center gap-4 mb-2">
                            <div class="text-5xl">🙏</div>
                            <div>
                                <h2 class="text-2xl md:text-3xl font-black text-white">${t('Prayer List')}</h2>
                                <p class="text-indigo-200 text-sm font-semibold mt-0.5">${pl.length} ${pl.length === 1 ? t('person') : t('people')} ${t('on your prayer list · shared with your team')}</p>
                            </div>
                        </div>
                        <p class="text-indigo-200 text-sm mt-3 italic">"And the Lord said unto me: Marvel not that all mankind, yea, men and women, all nations... must be born again." — Mosiah 27:25</p>
                    </div>

                    <!-- Add new person -->
                    <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-5 border-2 border-indigo-100">
                        <h3 class="font-black text-lg text-indigo-800 mb-3">➕ ${t('Add to Prayer List')}</h3>
                        <div class="flex gap-3">
                            <input id="prayerNameInput" type="text" placeholder="${t('Enter a name...')}" class="flex-1 px-4 py-3 border-2 border-indigo-200 rounded-xl focus:border-indigo-500 focus:outline-none font-semibold text-base shadow-sm"
                                onkeydown="if(event.key==='Enter'){addPrayerPerson(this.value);this.value='';}" />
                            <button onclick="addPrayerPerson(document.getElementById('prayerNameInput').value);document.getElementById('prayerNameInput').value='';"
                                class="px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-black hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg hover-lift">
                                ${t('Add 🙏')}
                            </button>
                        </div>
                    </div>

                    <!-- Prayer list -->
                    ${pl.length === 0 ? `
                        <div class="bg-white/95 rounded-2xl shadow-xl p-12 text-center">
                            <div class="text-7xl mb-4">🕊️</div>
                            <p class="text-xl font-black text-gray-600">${t('Your prayer list is empty')}</p>
                            <p class="text-gray-400 mt-2 font-semibold">${t('Add names above — this list is shared with your whole team')}</p>
                        </div>
                    ` : `
                        <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-indigo-100">
                            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-4">
                                <h3 class="font-black text-white text-lg">🙏 ${t('Currently Praying For')} (${pl.length})</h3>
                            </div>
                            <div class="divide-y divide-indigo-50">
                                ${pl.map((person, i) => `
                                    <div class="flex items-center gap-4 p-4 hover:bg-indigo-50/50 transition-all">
                                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-black text-lg flex-shrink-0">${i+1}</div>
                                        <div class="flex-1 min-w-0">
                                            <div class="font-black text-gray-900 text-base">${person.name}</div>
                                            <div class="flex items-center gap-2 mt-1">
                                                <span class="text-xs text-gray-400 font-semibold">${t('Added')} ${new Date(person.addedDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
                                            </div>
                                            <input type="text" value="${person.notes||''}" onchange="updatePrayerNotes(${person.id}, this.value)" placeholder="${t('Notes (answered prayers, updates...')}" class="w-full mt-1.5 px-3 py-1.5 border border-indigo-100 rounded-lg text-xs text-gray-600 focus:border-indigo-400 focus:outline-none" />
                                        </div>
                                        <button onclick="removePrayerPerson(${person.id})" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-xl transition-all text-xl flex-shrink-0" title="Remove">🗑️</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `}

                    <!-- Quick-add from tracker -->
                    ${(state.investigators.filter(p=>p.name).length > 0 || state.returning.filter(p=>p.name).length > 0) ? `
                    <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-5 border-2 border-indigo-100">
                        <h3 class="font-black text-lg text-indigo-800 mb-3">⚡ ${t('Quick Add from Tracker')}</h3>
                        <p class="text-sm text-gray-500 mb-3 font-semibold">${t('Tap a name to add them to your prayer list')}</p>
                        <div class="flex flex-wrap gap-2">
                            ${[...state.investigators, ...state.returning].filter(p=>p.name&&!pl.find(x=>x.name===p.name)).map(p=>`
                                <button onclick="addPrayerPerson('${p.name}')" class="flex items-center gap-2 px-3 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-800 rounded-xl font-bold text-sm transition-all border border-indigo-200 hover-lift">
                                    ${p.emoji||'👤'} ${p.name}
                                </button>`).join('')}
                        </div>
                    </div>` : ''}
                </div>
            `;
        }

        function renderCovenantPath() {
            // Split: active (no endowment yet) vs complete (endowment done)
            const active = state.covenantPath.filter(p => {
                if (p.type === 'OAY') return !p.femaleOrdinances?.templeBaptisms;
                if (p.type === 'Female') return !p.femaleOrdinances?.endowment;
                if (p.type === 'Male') return !p.ordinances?.endowment;
                return true; // no type yet = still active
            });
            const completed = state.covenantPath.filter(p => {
                if (p.type === 'OAY') return !!p.femaleOrdinances?.templeBaptisms;
                if (p.type === 'Female') return !!p.femaleOrdinances?.endowment;
                if (p.type === 'Male') return !!p.ordinances?.endowment;
                return false;
            });

            function renderCard(person) {
                const isMale = person.type === 'Male';
                const isFemale = person.type === 'Female';
                const isOAY = person.type === 'OAY';
                const isComplete = completed.includes(person);

                // Ordinance rows to show
                let ordinanceItems = [];
                if (isMale) ordinanceItems = [
                    { key: 'aaronicPriesthood', label: t('Aaronic Priesthood'), emoji: '✋', src: 'ordinances' },
                    { key: 'templeBaptisms',    label: t('Temple Baptisms'),     emoji: '🏛️', src: 'ordinances' },
                    { key: 'patriarchalBlessing', label: t('Patriarchal Blessing'), emoji: '📜', src: 'ordinances' },
                    { key: 'melchizedekPriesthood', label: t('Melchizedek Priesthood'), emoji: '👔', src: 'ordinances' },
                    { key: 'endowment',         label: t('Temple Endowment'),    emoji: '⭐', src: 'ordinances' },
                ];
                else if (isFemale) ordinanceItems = [
                    { key: 'templeBaptisms',    label: t('Temple Baptisms'),     emoji: '🏛️', src: 'femaleOrdinances' },
                    { key: 'patriarchalBlessing', label: t('Patriarchal Blessing'), emoji: '📜', src: 'femaleOrdinances' },
                    { key: 'endowment',         label: t('Temple Endowment'),    emoji: '⭐', src: 'femaleOrdinances' },
                ];
                else if (isOAY) ordinanceItems = [
                    { key: 'templeBaptisms',    label: t('Temple Baptisms'),     emoji: '🏛️', src: 'femaleOrdinances' },
                ];

                const srItems = [
                    { key: 'emotionalResilience',  label: t('Emotional Resilience'),    emoji: '💙' },
                    { key: 'personalFinances',     label: t('Personal Finances'),       emoji: '💰' },
                    { key: 'startGrowBusiness',    label: t('Start & Grow Business'),   emoji: '🚀' },
                    { key: 'educationBetterWork',  label: t('Education for Better Work'),emoji: '🎓' },
                    { key: 'findBetterJob',        label: t('Find a Better Job'),       emoji: '💼' },
                ];

                const ordDone = ordinanceItems.filter(o => {
                    return o.src === 'ordinances' ? person.ordinances?.[o.key] : person.femaleOrdinances?.[o.key];
                }).length;
                const srDone = Object.values(person.selfRelianceCompleted||{}).filter(Boolean).length;

                return `<div class="bg-white rounded-2xl border border-purple-100 shadow-md overflow-hidden ${isComplete ? 'opacity-75' : ''}">
                    <!-- Compact header -->
                    <div class="flex items-center gap-3 px-4 py-3 ${isComplete ? 'bg-gradient-to-r from-emerald-500 to-teal-600' : 'bg-gradient-to-r from-purple-600 to-indigo-600'}">
                        <div class="text-2xl">${isComplete ? '🏆' : '✨'}</div>
                        <div class="flex-1 min-w-0">
                            <div class="font-black text-white text-base leading-tight">${person.name}</div>
                            <div class="text-xs text-white/80 font-semibold">${person.assignment || ''} ${person.type ? '· '+person.type : ''}</div>
                        </div>
                        <div class="flex items-center gap-2">
                            ${isComplete ? `<span class="text-xs bg-white/20 text-white px-2 py-1 rounded-lg font-black">✅ ${t('Complete')}</span>` : `<span class="text-xs bg-white/20 text-white px-2 py-1 rounded-lg font-black">${ordDone}/${ordinanceItems.length} ords</span>`}
                            <button onclick="removeFromCovenantPath(${person.id})" class="text-white/60 hover:text-white text-lg px-1">🗑️</button>
                        </div>
                    </div>

                    <!-- Body -->
                    <div class="p-4 space-y-4">
                        <!-- Baptism date + type selector -->
                        <div class="flex items-center gap-3 flex-wrap">
                            <div class="flex items-center gap-2 bg-purple-50 border border-purple-200 rounded-xl px-3 py-2">
                                <span class="text-sm">📅</span>
                                <div>
                                    <div class="text-xs font-black text-purple-600 uppercase tracking-wide leading-none mb-0.5">${t('Baptism Date')}</div>
                                    <input type="date" value="${person.baptismDate}" onchange="updateCovenantField(${person.id},'baptismDate',this.value)"
                                        class="text-sm font-bold text-purple-900 bg-transparent border-none outline-none cursor-pointer" />
                                </div>
                            </div>
                            ${!person.type ? `
                            <div class="flex gap-2">
                                <button onclick="updateCovenantField(${person.id},'type','Male')" class="px-3 py-1.5 bg-blue-100 text-blue-700 rounded-lg text-xs font-black border border-blue-200">👨 ${t('Male')}</button>
                                <button onclick="updateCovenantField(${person.id},'type','Female')" class="px-3 py-1.5 bg-pink-100 text-pink-700 rounded-lg text-xs font-black border border-pink-200">👩 ${t('Female')}</button>
                                <button onclick="updateCovenantField(${person.id},'type','OAY')" class="px-3 py-1.5 bg-purple-100 text-purple-700 rounded-lg text-xs font-black border border-purple-200">🎓 ${t('OAY')}</button>
                            </div>` : ''}
                        </div>

                        ${ordinanceItems.length > 0 ? `
                        <!-- Ordinances -->
                        <div>
                            <div class="text-xs font-black text-gray-500 uppercase tracking-wide mb-2">
                                ${isOAY ? `🏛️ ${t('Temple Baptisms')}` : `🏆 ${t('Ordinance Path')}`}
                            </div>
                            <div class="grid grid-cols-1 ${isOAY ? '' : 'sm:grid-cols-2 md:grid-cols-3'} gap-2">
                                ${ordinanceItems.map(o => {
                                    const checked = o.src === 'ordinances' ? person.ordinances?.[o.key] : person.femaleOrdinances?.[o.key];
                                    const field = o.src === 'ordinances' ? 'ordinance_'+o.key : 'femaleOrd_'+o.key;
                                    return `<label class="flex items-center gap-2 p-2.5 rounded-xl cursor-pointer border transition-colors ${checked ? 'bg-purple-100 border-purple-300' : 'bg-gray-50 border-gray-200 hover:bg-purple-50'}">
                                        <input type="checkbox" ${checked?'checked':''} onchange="updateCovenantField(${person.id},'${field}',this.checked)" class="w-4 h-4 text-purple-600 rounded" />
                                        <span class="text-lg">${o.emoji}</span>
                                        <span class="text-xs font-bold text-gray-700 flex-1">${o.label}</span>
                                        ${checked ? '<span class="text-green-500 text-sm">✓</span>' : ''}
                                    </label>`;
                                }).join('')}
                            </div>
                        </div>` : ''}

                        ${person.type && !isOAY ? `
                        <!-- Self Reliance — compact -->
                        <div>
                            <div class="text-xs font-black text-gray-500 uppercase tracking-wide mb-2">💼 ${t('Self-Reliance Classes')}</div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
                                ${srItems.map(sr => {
                                    const checked = person.selfRelianceCompleted?.[sr.key];
                                    return `<label class="flex items-center gap-2 p-2 rounded-lg cursor-pointer border transition-colors ${checked ? 'bg-blue-50 border-blue-200' : 'bg-gray-50 border-gray-100 hover:bg-blue-50'}">
                                        <input type="checkbox" ${checked?'checked':''} onchange="updateCovenantField(${person.id},'selfReliance_${sr.key}',this.checked)" class="w-4 h-4 text-blue-500 rounded" />
                                        <span class="text-base">${sr.emoji}</span>
                                        <span class="text-xs font-semibold text-gray-600 flex-1 leading-tight">${sr.label}</span>
                                        ${checked ? '<span class="text-blue-500 text-sm">✓</span>' : ''}
                                    </label>`;
                                }).join('')}
                            </div>
                        </div>` : ''}

                        <!-- Notes -->
                        <textarea onchange="updateCovenantField(${person.id},'notes',this.value)" rows="2"
                            placeholder="${t('Notes on progress, attendance, etc...')}"
                            class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs text-gray-600 focus:border-purple-400 focus:outline-none resize-none">${person.notes||''}</textarea>
                    </div>
                </div>`;
            }

            return `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl mt-6 overflow-hidden border border-purple-200">
                    <!-- Header -->
                    <div class="bg-gradient-to-r from-purple-700 to-indigo-700 px-5 py-4 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <span class="text-3xl">📖</span>
                            <div>
                                <h2 class="text-lg font-black text-white">${t('The Covenant Path')}</h2>
                                <p class="text-purple-200 text-xs font-semibold">${active.length} ${t('active')} · ${completed.length} ${t('complete')}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 text-xs">
                            <span class="bg-white/20 text-white px-3 py-1 rounded-full font-black">${state.covenantPath.length} ${t('total')}</span>
                        </div>
                    </div>

                    <div class="p-4 space-y-3">
                        ${active.length > 0 ? `
                            <div class="text-xs font-black text-purple-700 uppercase tracking-wider mb-2">🔄 ${t('In Progress')}</div>
                            ${active.map(renderCard).join('')}
                        ` : ''}

                        ${completed.length > 0 ? `
                            <div class="text-xs font-black text-emerald-600 uppercase tracking-wider mt-4 mb-2">🏆 ${t('Temple Endowment Complete')}</div>
                            ${completed.map(renderCard).join('')}
                        ` : ''}
                    </div>
                </div>`;
        }

        window.saveToFirebase = saveToFirebase;
        render();
    </script>
</body>
</html>
