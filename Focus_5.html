    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&display=swap');
        * { font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif; }

        /* ─────────── PACIFIC NOIR — design tokens (matches Unga ministering deck) ─────────── */
        :root {
            --ss-ink:#f4ece0; --ss-ink-soft:#cfc6b6;
            --ss-bg:#070c18; --ss-surface:#131d38; --ss-surface-2:#0e1730;
            --ss-line:rgba(231,189,106,.20); --ss-line-2:rgba(244,236,224,.12);
            --ss-muted:#a99f90;
            --ss-gold:#e7bd6a; --ss-gold-deep:#f3d79a; --ss-gold-wash:rgba(231,189,106,.12);
            --ss-red:#e0808a; --ss-red-wash:rgba(217,106,122,.14);
            --ss-sage:#7fb089; --ss-sage-wash:rgba(120,200,140,.12);
            --ss-bar:#0b1428; --ss-bar-text:#f3d79a;
        }
        .dark-mode {
            --ss-ink:#f4ece0; --ss-ink-soft:#cfc6b6;
            --ss-bg:#04070f; --ss-surface:#0f1830; --ss-surface-2:#0a1226;
            --ss-line:rgba(231,189,106,.22); --ss-line-2:rgba(244,236,224,.10);
            --ss-muted:#9a9080;
            --ss-gold:#e7bd6a; --ss-gold-deep:#f3d79a; --ss-gold-wash:rgba(231,189,106,.14);
            --ss-red:#e89aa2; --ss-red-wash:rgba(217,106,122,.16);
            --ss-sage:#8fbf97; --ss-sage-wash:rgba(120,200,140,.14);
            --ss-bar:#07101f; --ss-bar-text:#f3d79a;
        }
        body { background: var(--ss-bg) !important; color: var(--ss-ink); }
        h1,h2,h3 { font-family:'Fraunces', Georgia, serif !important; letter-spacing:-0.01em; color:var(--ss-ink); }

        /* layered Pacific Noir canvas (gold + ember + sea over deep navy) + tapa lattice */
        .pn-canvas{
            background:
              radial-gradient(1100px 700px at 78% -8%, rgba(231,189,106,.16), transparent 60%),
              radial-gradient(900px 800px at 12% 108%, rgba(232,130,90,.13), transparent 60%),
              radial-gradient(1400px 1000px at 50% 50%, rgba(14,42,58,.55), transparent 70%),
              linear-gradient(160deg, #070c18 0%, #060a14 45%, #08101f 100%) !important;
        }
        .pn-canvas::after{
            content:"";position:absolute;inset:0;opacity:.05;pointer-events:none;
            background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'><g fill='none' stroke='%23e7bd6a' stroke-width='1.1'><path d='M0 60 L60 0 L120 60 L60 120 Z'/><path d='M30 60 L60 30 L90 60 L60 90 Z'/><path d='M60 48 L72 60 L60 72 L48 60 Z'/></g></svg>");
            background-size:120px 120px;
        }

        /* surfaces -> dark glass panels */
        [class~="bg-white"],[class~="bg-white/90"],[class~="bg-white/95"],[class~="bg-white/98"],[class~="bg-gray-50"]{ background-color:var(--ss-surface)!important; }
        [class~="bg-gray-100"]{ background-color:var(--ss-surface-2)!important; }
        [class~="bg-gray-200"],[class~="bg-gray-300"]{ background-color:rgba(244,236,224,.10)!important; }
        [class~="bg-amber-50"],[class~="bg-amber-100"],[class~="bg-blue-50"],[class~="bg-blue-100"],[class~="bg-purple-50"],[class~="bg-purple-100"],[class~="bg-indigo-50"],[class~="bg-indigo-100"],[class~="bg-yellow-100"]{ background-color:var(--ss-gold-wash)!important; }
        [class~="bg-amber-200"]{ background-color:rgba(231,189,106,.20)!important; }
        [class~="bg-green-50"],[class~="bg-green-100"]{ background-color:var(--ss-sage-wash)!important; }
        [class~="bg-red-50"],[class~="bg-red-100"],[class~="bg-rose-50"],[class~="bg-rose-100"],[class~="bg-rose-200"]{ background-color:var(--ss-red-wash)!important; }
        [class~="bg-red-500"]{ background-color:var(--ss-red)!important; }
        [class~="bg-green-500"],[class~="bg-emerald-500"]{ background-color:var(--ss-sage)!important; }

        /* flatten gradients, re-solid by family using the Noir palette */
        [class*="bg-gradient"]:not(.pn-canvas){ background-image:none!important; }
        [class~="from-amber-500"],[class~="from-amber-600"],[class~="from-green-500"],[class~="from-green-600"],[class~="from-indigo-500"],[class~="from-indigo-600"],[class~="from-purple-600"],[class~="from-orange-500"],[class~="from-yellow-400"],[class~="from-teal-600"],[class~="from-blue-600"]{ background-color:var(--ss-bar)!important; color:var(--ss-bar-text)!important; border-color:var(--ss-line)!important; }
        [class~="from-rose-600"],[class~="from-red-500"],[class~="from-red-600"]{ background-color:rgba(217,106,122,.18)!important; color:var(--ss-red)!important; border-color:var(--ss-line)!important; }
        [class~="from-emerald-500"]{ background-color:var(--ss-sage-wash)!important; color:var(--ss-sage)!important; }
        [class~="from-gray-50"]{ background-color:var(--ss-surface-2)!important; }

        /* text */
        [class~="text-amber-300"],[class~="text-amber-600"],[class~="text-amber-700"],[class~="text-amber-800"],[class~="text-amber-900"],[class~="text-orange-700"],[class~="text-yellow-900"]{ color:var(--ss-gold)!important; }
        [class~="text-blue-700"],[class~="text-blue-800"],[class~="text-indigo-700"],[class~="text-indigo-800"],[class~="text-purple-600"],[class~="text-purple-700"],[class~="text-purple-800"],[class~="text-purple-900"],[class~="text-purple-300"]{ color:var(--ss-gold)!important; }
        [class~="text-green-600"],[class~="text-green-700"],[class~="text-green-800"]{ color:var(--ss-sage)!important; }

        window.handleIndicatorToggle = (personId, month, indicatorCode, isChecked) => {

                    const monthData = person.progress[month] || [];
                    let newMonthData = isChecked
                        ? (monthData.includes(indicatorCode) ? monthData : [...monthData, indicatorCode])
                        : monthData.filter(code => code !== indicatorCode);
                    if (indicatorCode === 'B' && isChecked && !monthData.includes('B')) {
                        setTimeout(() => { document.querySelector('.fixed')?.remove(); moveToCovenantPath(person); }, 500);
                        return null;
                    }
                    if (indicatorCode === 'ACTIVE' && isChecked && !monthData.includes('ACTIVE')) {
                        setTimeout(() => { document.querySelector('.fixed')?.remove(); moveToCovenantPath(person); }, 500);
                        return null;
                    }
                    return { ...person, progress: { ...person.progress, [month]: newMonthData } };

                return person;

            setCurrentList(updated);
            saveToFirebase();
            render();

                                                    ${state.trackerView === 'month' ? `

                                                        ${monthData.length > 0
                                                            ? monthData.map(code => { const ind = INDICATORS.find(i => i.code === code); return `<span class="ss-dot" style="background:${indDot(ind||code)};width:11px;height:11px;" title="${ind ? (currentLang==='to'?ind.toName:ind.name) : code} (${code})"></span>`; }).join('')
                                                            : `<button onclick="openIndicatorModal(${person.id}, '${month}')" class="text-2xl transition-colors" style="color:var(--ss-line-2);">+</button>`}
                                                    </div>
                                                    ${monthData.length > 0 ? `<button onclick="openIndicatorModal(${person.id}, '${month}')" class="text-xs font-bold" style="color:var(--ss-gold-deep);">${t('Edit')}</button>` : ''}`}
                                                </td>`;

                                            <td class="p-2 md:p-4 mobile-hide">

                                            </td>

                                                <select onchange="updateCombinedAssignment(${person.id}, this.value)" class="w-full px-2 py-1.5 border border-rose-200 rounded-lg text-xs font-semibold mb-1.5 focus:outline-none focus:border-rose-400" title="Who is responsible for this person">
                                                    <option value="">👤 Assign to...</option>
                                                    <option value="EQ President" ${person.assignedTo==='EQ President'?'selected':''}>⚡ EQ President</option>
                                                    <option value="RS President" ${person.assignedTo==='RS President'?'selected':''}>🌸 RS President</option>

                                                    <option value="Bishop" ${person.assignedTo==='Bishop'?'selected':''}>🏛️ Bishop</option>

                                                </select>
                                                <input type="date" value="${person.nextContactDate||''}" onchange="updateNextContactDate(${person.id}, this.value)"
                                                    class="w-full px-2 py-1.5 border border-rose-200 rounded-lg text-xs font-semibold mb-1.5 focus:outline-none focus:border-rose-400" title="Next Contact Date" />
                                                <input type="text" value="${person.nextAction||''}" onchange="updateNextAction(${person.id}, this.value)"
                                                    placeholder="📝 Next action..." class="w-full px-2 py-1.5 border border-rose-200 rounded-lg text-xs focus:outline-none focus:border-rose-400 mb-1.5" />
                                                <button onclick="markContacted(${person.id})" class="w-full py-1.5 text-xs font-black rounded-lg transition-all ${person.lastContactDate ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-rose-100 text-rose-700 hover:bg-rose-200'}">

        }

        function renderWeekBadge() {
            const today = new Date(); today.setHours(0,0,0,0);
            const in7 = new Date(today); in7.setDate(today.getDate()+7);
            const allPeople = [...state.investigators, ...state.returning].filter(p => p.name);
            const overdue = allPeople.filter(p => p.nextContactDate && parseLocalDate(p.nextContactDate) < today).length;
            const thisWeek = allPeople.filter(p => p.nextContactDate && parseLocalDate(p.nextContactDate) >= today && parseLocalDate(p.nextContactDate) <= in7).length;
            const total = overdue + thisWeek;
            if (total === 0) return '';
            return `<span class="ml-1 ${overdue > 0 ? 'bg-red-500' : 'bg-orange-400'} text-white rounded-full px-1.5 text-xs font-black">${total}</span>`;
        }

        function renderThisWeek() {
            const today = new Date(); today.setHours(0,0,0,0);
            const in7 = new Date(today); in7.setDate(today.getDate()+7);
            // Filter based on activeTab — default shows all, but user can toggle
            const weekFilter = state.weekFilter || 'all';
            const rawInv = state.investigators.map(p=>({...p,_tab:'investigators'})).filter(p=>p.name);
            const rawRet = state.returning.map(p=>({...p,_tab:'returning'})).filter(p=>p.name);
            const allPeople = weekFilter === 'investigators' ? rawInv : weekFilter === 'returning' ? rawRet : [...rawInv, ...rawRet];

            function getDaysUntil(dateStr) {
                if (!dateStr) return null;
                const d = parseLocalDate(dateStr); d.setHours(0,0,0,0);
                return Math.ceil((d - today) / (1000*60*60*24));
            }
            function getDaysSinceContact(dateStr) {
                if (!dateStr) return null;
                const d = parseLocalDate(dateStr); d.setHours(0,0,0,0);
                return Math.ceil((today - d) / (1000*60*60*24));
            }

            const overdue = allPeople.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) < 0).sort((a,b)=>parseLocalDate(a.nextContactDate)-parseLocalDate(b.nextContactDate));
            const dueThisWeek = allPeople.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) >= 0 && getDaysUntil(p.nextContactDate) <= 7).sort((a,b)=>parseLocalDate(a.nextContactDate)-parseLocalDate(b.nextContactDate));
            const upcoming = allPeople.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) > 7).sort((a,b)=>parseLocalDate(a.nextContactDate)-parseLocalDate(b.nextContactDate));
            const noDate = allPeople.filter(p => !p.nextContactDate);

            function renderPersonCard(p, urgency) {
                const days = getDaysUntil(p.nextContactDate);
                const sinceContact = getDaysSinceContact(p.lastContactDate);
                const urgencyColors = {
                    overdue: 'border-l-4 border-red-500 bg-red-50',
                    today: 'border-l-4 border-orange-500 bg-orange-50',
                    week: 'border-l-4 border-yellow-400 bg-yellow-50',
                    upcoming: 'border-l-4 border-green-400 bg-green-50',
                    none: 'border-l-4 border-gray-200 bg-gray-50'
                };
                const badgeColors = {
                    overdue: 'bg-red-500 text-white',
                    today: 'bg-orange-500 text-white',
                    week: 'bg-yellow-400 text-yellow-900',
                    upcoming: 'bg-green-100 text-green-800',
                    none: 'bg-gray-100 text-gray-500'
                };
                let badgeText = '';
                if (days === null) badgeText = '⚪ No date';
                else if (days < 0) badgeText = `🔴 ${Math.abs(days)}d overdue`;
                else if (days === 0) badgeText = '🔥 Today!';
                else if (days === 1) badgeText = '⚡ Tomorrow';
                else badgeText = `📅 In ${days} days`;

                const tabIcon = p._tab === 'investigators' ? '👤' : '💙';
                return `
                <div class="rounded-xl p-4 ${urgencyColors[urgency]} hover:shadow-md transition-all">
                    <div class="flex items-start justify-between gap-3 flex-wrap">
                        <div class="flex items-center gap-3 flex-1 min-w-0">
                            <span class="text-2xl flex-shrink-0">${p.emoji||tabIcon}</span>
                            <div class="min-w-0">
                                <div class="font-black text-gray-900 text-base leading-tight">${p.name}</div>
                                <div class="flex items-center gap-2 mt-0.5 flex-wrap">
                                    ${p.assignedTo ? `<span class="text-xs bg-white border border-gray-200 text-gray-700 px-2 py-0.5 rounded-full font-bold">👤 ${p.assignedTo}</span>` : `<span class="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-bold">⚠️ Unassigned</span>`}
                                    ${p.assignment ? `<span class="text-xs text-gray-400 font-semibold">${p.assignment}</span>` : ''}
                                    <span class="text-xs ${p._tab==='investigators'?'text-amber-600':'text-green-600'} font-bold">${p._tab==='investigators'?'Investigator':'Returning'}</span>
                                </div>
                                ${p.nextAction ? `<div class="mt-1.5 text-sm text-gray-700 font-semibold bg-white/70 rounded-lg px-2 py-1">📝 ${p.nextAction}</div>` : `<div class="mt-1.5 text-xs text-gray-400 italic">No next action written</div>`}
                                ${sinceContact !== null ? `<div class="mt-1 text-xs text-gray-400 font-semibold">Last contacted: ${sinceContact === 0 ? 'today' : sinceContact+'d ago'}</div>` : ''}
                            </div>
                        </div>
                        <div class="flex flex-col items-end gap-2 flex-shrink-0">
                            <span class="text-xs font-black px-3 py-1 rounded-full ${badgeColors[urgency]}">${badgeText}</span>
                            <button onclick="markContacted_tab('${p.id}','${p._tab}')" class="text-xs font-black px-3 py-1.5 bg-white border-2 border-rose-300 text-rose-600 rounded-lg hover:bg-rose-50 transition-all">✅ Mark Contacted</button>
                            <div class="flex items-center gap-1">
                                <input type="date" value="${p.nextContactDate||''}" onchange="quickSetDate('${p.id}','${p._tab}',this.value)" class="text-xs border border-gray-300 rounded-lg px-2 py-1 focus:outline-none focus:border-rose-400 bg-white" title="Set next contact date" />
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            // Weekly share summary generator
            function generateWeeklySummary() {
                const lines = ['📋 This Week\'s Focus — Riverton 24th Tongan Ward\n'];
                if (overdue.length) {
                    lines.push('🔴 OVERDUE:');
                    overdue.forEach(p => lines.push(`  • ${p.name}${p.assignedTo?' → '+p.assignedTo:''} — ${p.nextAction||'Contact needed'}`));
                }
                if (dueThisWeek.length) {
                    lines.push('\n🟡 DUE THIS WEEK:');
                    dueThisWeek.forEach(p => {
                        const d = getDaysUntil(p.nextContactDate);
                        const when = d===0?'Today':d===1?'Tomorrow':`${parseLocalDate(p.nextContactDate).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}`;
                        lines.push(`  • ${p.name} — ${when}${p.assignedTo?' ('+p.assignedTo+')':''}: ${p.nextAction||'Follow up'}`);
                    });
                }
                return lines.join('\n');
            }

            const totalAction = overdue.length + dueThisWeek.length;

            return `
            <div class="space-y-5">
                <!-- Header -->
                <div class="bg-gradient-to-r from-rose-600 to-red-600 rounded-2xl p-5 shadow-xl text-white">
                    <div class="flex items-center justify-between flex-wrap gap-3">
                        <div class="flex items-center gap-3">
                            <span class="text-4xl">📋</span>
                            <div>
                                <h2 class="text-2xl font-black">This Week's Focus</h2>
                                <p class="text-rose-200 text-sm font-semibold">Who needs to be contacted and by whom</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 flex-wrap">
                            <!-- Tab filter -->
                            <div class="flex bg-white/20 rounded-xl p-1 gap-1">
                                <button onclick="state.weekFilter='all';render()" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all ${weekFilter==='all'?'bg-white text-rose-700 shadow':'text-white'}">All</button>
                                <button onclick="state.weekFilter='investigators';render()" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all ${weekFilter==='investigators'?'bg-white text-rose-700 shadow':'text-white'}">👤 Invest.</button>
                                <button onclick="state.weekFilter='returning';render()" class="px-3 py-1.5 rounded-lg text-xs font-black transition-all ${weekFilter==='returning'?'bg-white text-rose-700 shadow':'text-white'}">💙 Return.</button>
                            </div>
                            <div class="text-center bg-white/20 rounded-xl px-4 py-2">
                                <div class="text-2xl font-black">${totalAction}</div>
                                <div class="text-xs font-bold text-rose-200">Need Action</div>
                            </div>
                            <button onclick="sendWeeklyFocus()" class="flex items-center gap-2 px-4 py-2.5 bg-white text-rose-700 rounded-xl font-black text-sm shadow-lg hover:shadow-xl transition-all hover-lift">
                                📱 Send Summary
                            </button>
                        </div>
                    </div>
                </div>

                ${overdue.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-red-200">
                    <div class="bg-gradient-to-r from-red-500 to-red-600 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">🔴</span>
                        <h3 class="font-black text-white text-lg">Overdue <span class="bg-white/30 text-white text-sm px-2 py-0.5 rounded-full ml-1">${overdue.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${overdue.map(p=>renderPersonCard(p,'overdue')).join('')}</div>
                </div>` : ''}

                ${dueThisWeek.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-yellow-200">
                    <div class="bg-gradient-to-r from-yellow-400 to-orange-400 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">🟡</span>
                        <h3 class="font-black text-yellow-900 text-lg">Due This Week <span class="bg-yellow-900/20 text-yellow-900 text-sm px-2 py-0.5 rounded-full ml-1">${dueThisWeek.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${dueThisWeek.map(p=>renderPersonCard(p,'week')).join('')}</div>
                </div>` : ''}

                ${upcoming.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-green-200">
                    <div class="bg-gradient-to-r from-green-400 to-emerald-500 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">🟢</span>
                        <h3 class="font-black text-white text-lg">Upcoming <span class="bg-white/30 text-white text-sm px-2 py-0.5 rounded-full ml-1">${upcoming.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${upcoming.map(p=>renderPersonCard(p,'upcoming')).join('')}</div>
                </div>` : ''}

                ${noDate.length > 0 ? `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-gray-200">
                    <div class="bg-gray-200 px-5 py-3 flex items-center gap-2">
                        <span class="text-xl">⚪</span>
                        <h3 class="font-black text-gray-700 text-lg">No Contact Date Set <span class="bg-gray-400/20 text-gray-600 text-sm px-2 py-0.5 rounded-full ml-1">${noDate.length}</span></h3>
                    </div>
                    <div class="p-4 space-y-3">${noDate.filter(p=>p.name).map(p=>renderPersonCard(p,'none')).join('')}</div>
                </div>` : ''}

                ${allPeople.length === 0 ? `
                <div class="bg-white/95 rounded-2xl shadow-xl p-12 text-center">
                    <div class="text-7xl mb-4">📋</div>
                    <p class="text-xl font-black text-gray-600">No people added yet</p>
                    <p class="text-gray-400 mt-2">Add investigators and returning members first, then set their contact dates.</p>
                </div>` : ''}
            </div>`;
        }

        window.markContacted_tab = (id, tab) => {
            const today = new Date().toISOString().split('T')[0];
            const list = tab === 'investigators' ? state.investigators : state.returning;
            const idNum = parseInt(id);
            if (tab === 'investigators') state.investigators = list.map(p => p.id === idNum ? { ...p, lastContactDate: today } : p);
            else state.returning = list.map(p => p.id === idNum ? { ...p, lastContactDate: today } : p);
            saveToFirebase();
            showSaveMessage(currentLang==='to'?'✓ Faka\'ilonga fetuʻutaki!':'✓ Marked as contacted today!');
        };

        window.quickSetDate = (id, tab, dateVal) => {
            const idNum = parseInt(id);
            if (tab === 'investigators') state.investigators = state.investigators.map(p => p.id === idNum ? { ...p, nextContactDate: dateVal } : p);
            else state.returning = state.returning.map(p => p.id === idNum ? { ...p, nextContactDate: dateVal } : p);
            saveToFirebase();
            render();
        };

        window.sendWeeklyFocus = () => {
            const today = new Date(); today.setHours(0,0,0,0);
            const in7 = new Date(today); in7.setDate(today.getDate()+7);
            const allPeople = [...state.investigators.map(p=>({...p,_tab:'investigators'})), ...state.returning.map(p=>({...p,_tab:'returning'}))].filter(p=>p.name);
            function getDaysUntil(dateStr) {
                if (!dateStr) return null;
                const d = parseLocalDate(dateStr); d.setHours(0,0,0,0);
                return Math.ceil((d - today) / (1000*60*60*24));
            }
            const overdue = allPeople.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) < 0);
            const dueThisWeek = allPeople.filter(p => p.nextContactDate && getDaysUntil(p.nextContactDate) >= 0 && getDaysUntil(p.nextContactDate) <= 7);
            const lines = ['📋 This Week\'s Focus — Riverton 24th Tongan Ward\n'];
            if (overdue.length) {
                lines.push('🔴 OVERDUE:');
                overdue.forEach(p => lines.push(`  • ${p.name}${p.assignedTo?' → '+p.assignedTo:''}: ${p.nextAction||'Contact needed'}`));
            }
            if (dueThisWeek.length) {
                lines.push('\n🟡 DUE THIS WEEK:');
                dueThisWeek.forEach(p => {
                    const d = getDaysUntil(p.nextContactDate);
                    const when = d===0?'Today':d===1?'Tomorrow':`${parseLocalDate(p.nextContactDate).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}`;
                    lines.push(`  • ${p.name} — ${when}${p.assignedTo?' ('+p.assignedTo+')':''}: ${p.nextAction||'Follow up'}`);
                });
            }
            if (!overdue.length && !dueThisWeek.length) lines.push('✅ No urgent contacts this week!');
            const text = lines.join('\n');
            if (navigator.share) {
                navigator.share({ title: 'This Week\'s Focus', text });
            } else {
                navigator.clipboard.writeText(text).then(() => showSaveMessage('✓ Weekly summary copied to clipboard!'));
            }
        };

        function renderActionBoard() {
            const today = new Date(); today.setHours(0,0,0,0);
            const currentMonthKey = MONTHS[today.getMonth()];
            const allPeople = [...state.investigators.map(p=>({...p,_tab:'investigators'})), ...state.returning.map(p=>({...p,_tab:'returning'}))].filter(p=>p.name);

            function getColumn(p) {
                const allActs = Object.values(p.progress||{}).flat();
                const hasBaptism = allActs.includes('B') || allActs.includes('C');
                const hasBaptismDate = allActs.includes('BD');
                const totalActs = allActs.length;

                if (hasBaptism || hasBaptismDate) return 'milestone';
                if (totalActs === 0) return 'new';

                // Check recency: prefer explicit lastContactDate, fall back to most recent month with activity
                let daysSinceContact = null;
                if (p.lastContactDate) {
                    daysSinceContact = Math.ceil((today - parseLocalDate(p.lastContactDate)) / (1000*60*60*24));
                } else {
                    // Find most recent month with activity as proxy for last contact
                    for (let i = today.getMonth(); i >= 0; i--) {
                        if ((p.progress?.[MONTHS[i]]?.length||0) > 0) {
                            // Approximate: use the last day of that month
                            const approxDate = new Date(today.getFullYear(), i+1, 0);
                            daysSinceContact = Math.ceil((today - approxDate) / (1000*60*60*24));
                            break;
                        }
                    }
                }
                if (daysSinceContact === null || daysSinceContact > 30) return 'attention';
                return 'inprogress';
            }

            function getDaysSinceContact(p) {
                if (!p.lastContactDate) return null;
                return Math.ceil((today - parseLocalDate(p.lastContactDate)) / (1000*60*60*24));
            }

            const columns = {
                new: { label: '🌱 New', subtitle: 'No engagement yet', color: 'from-slate-500 to-slate-600', bg: 'bg-slate-50', border: 'border-slate-200', people: [] },
                inprogress: { label: '🔄 In Progress', subtitle: 'Actively engaged', color: 'from-blue-500 to-blue-600', bg: 'bg-blue-50', border: 'border-blue-200', people: [] },
                attention: { label: '⚡ Needs Attention', subtitle: '30+ days no contact', color: 'from-orange-500 to-red-500', bg: 'bg-orange-50', border: 'border-orange-200', people: [] },
                milestone: { label: '🏆 Milestone Hit', subtitle: 'Baptism date or baptized', color: 'from-emerald-500 to-teal-600', bg: 'bg-emerald-50', border: 'border-emerald-200', people: [] },
            };

            allPeople.forEach(p => {
                const col = getColumn(p);
                columns[col].people.push(p);
            });

            function renderCard(p) {
                const allActs = Object.values(p.progress||{}).flat();
                const thisMonthActs = p.progress?.[currentMonthKey]?.length || 0;
                const daysSince = getDaysSinceContact(p);
                const topAct = allActs.length > 0 ? [...allActs].sort((a,b) => allActs.filter(x=>x===b).length - allActs.filter(x=>x===a).length)[0] : null;
                const topInd = topAct ? INDICATORS.find(i=>i.code===topAct) : null;
                const tabIcon = p._tab==='investigators' ? '👤' : '💙';
                const streak = (() => {
                    let s = 0;
                    for (let i = today.getMonth(); i >= 0; i--) {
                        if ((p.progress?.[MONTHS[i]]?.length||0) > 0) s++; else break;
                    }
                    return s;
                })();
                return `
                <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-100 hover:shadow-md transition-all">

                        <span class="text-xl flex-shrink-0">${p.emoji||tabIcon}</span>
                        <div class="flex-1 min-w-0">
                            <div class="font-black text-sm text-gray-900 leading-tight">${p.name}</div>
                            <div class="flex items-center gap-1 mt-0.5 flex-wrap">
                                ${p.assignedTo ? `<span class="text-xs bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded font-semibold">${p.assignedTo}</span>` : `<span class="text-xs bg-red-50 text-red-500 px-1.5 py-0.5 rounded font-semibold">Unassigned</span>`}
                                ${streak > 0 ? `<span class="text-xs bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded font-black">🔥 ${streak}mo</span>` : ''}
                            </div>
                            ${p.nextAction ? `<div class="mt-1 text-xs text-gray-600 bg-gray-50 rounded px-2 py-1 leading-tight">📝 ${p.nextAction}</div>` : ''}
                            <div class="flex items-center gap-2 mt-1.5 flex-wrap">
                                ${topInd ? `<span class="text-xs bg-white border border-gray-200 px-1.5 py-0.5 rounded font-bold">${topInd.emoji} ${topInd.code}</span>` : ''}
                                ${thisMonthActs > 0 ? `<span class="text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded font-bold">✓ ${thisMonthActs} this mo.</span>` : ''}
                                ${daysSince !== null ? `<span class="text-xs text-gray-400 font-semibold">${daysSince===0?'Today':daysSince+'d ago'}</span>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            return `
            <div class="space-y-5">
                <!-- Header -->
                <div class="bg-gradient-to-r from-violet-700 to-purple-700 rounded-2xl p-5 shadow-xl text-white">
                    <div class="flex items-center justify-between flex-wrap gap-3">
                        <div class="flex items-center gap-3">
                            <span class="text-4xl">🗂️</span>
                            <div>
                                <h2 class="text-2xl font-black">Action Board</h2>
                                <p class="text-violet-200 text-sm font-semibold">Sunday war-room view — who's where right now</p>
                            </div>
                        </div>
                        <div class="flex gap-2 flex-wrap">
                            ${Object.entries(columns).map(([k,c])=>`
                            <div class="bg-white/20 rounded-xl px-3 py-2 text-center">
                                <div class="text-xl font-black">${c.people.length}</div>
                                <div class="text-xs font-bold text-violet-200">${c.label.split(' ').slice(1).join(' ')}</div>
                            </div>`).join('')}
                        </div>
                    </div>
                </div>

                <!-- Kanban Board -->
                <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4">
                    ${Object.entries(columns).map(([k,col])=>`
                    <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 ${col.border}">
                        <div class="bg-gradient-to-r ${col.color} px-4 py-3">
                            <h3 class="font-black text-white text-base">${col.label} <span class="bg-white/30 text-white text-xs px-2 py-0.5 rounded-full ml-1">${col.people.length}</span></h3>
                            <p class="text-white/75 text-xs font-semibold mt-0.5">${col.subtitle}</p>
                        </div>
                        <div class="p-3 space-y-2 min-h-[120px]">
                            ${col.people.length > 0 ? col.people.map(renderCard).join('') : `<div class="text-center py-6 text-gray-300"><div class="text-3xl mb-1">✨</div><div class="text-xs font-bold">No one here</div></div>`}
                        </div>
                    </div>`).join('')}
                </div>

                <!-- Legend -->
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-5 border-2 border-violet-100">
                    <h3 class="font-black text-violet-800 mb-3">📖 How cards are sorted</h3>

            const sortedAll = [...state.events].sort((a,b)=>parseLocalDate(a.date)-parseLocalDate(b.date));

            // Prev month filler days
            for (let i = 0; i < firstDay; i++) {

            for (let d = 1; d <= daysInMonth; d++) {

                                    ${ev.inviteReady ? '✨ ' : ''}${ev.name}

            // Next month filler
            const totalCells = firstDay + daysInMonth;
            const remainder = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remainder; i++) {
                calCells += `<div class="min-h-[80px] p-1 bg-gray-50/50 rounded-lg border border-gray-100">
                    <span class="text-xs font-bold text-gray-300">${i}</span>
                </div>`;
            }

            return `
                <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden hover-lift">

                    <!-- Header -->
                    <div class="bg-gradient-to-r from-green-600 to-emerald-600 p-5 md:p-6">
                        <div class="flex items-center justify-between flex-wrap gap-3">
                            <div class="flex items-center gap-3">
                                <div class="text-4xl">🗓️</div>
                                <div>
                                    <h2 class="text-2xl md:text-3xl font-black text-white">${t('Ward Events Calendar')}</h2>
                                    <p class="text-green-100 text-sm font-semibold">${state.events.length} ${t('total events')} · ${monthEvents.length} ${t('in')} ${monthName}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 flex-wrap">
                                <!-- View toggle -->
                                <div class="flex bg-white/20 rounded-xl p-1 gap-1">
                                    <button onclick="setEventsView('calendar')" class="px-3 py-2 rounded-lg font-bold text-sm transition-all ${state.eventsView==='calendar' ? 'bg-white text-green-700 shadow' : 'text-white hover:bg-white/20'}">📅 ${t('Calendar')}</button>
                                    <button onclick="setEventsView('list')" class="px-3 py-2 rounded-lg font-bold text-sm transition-all ${state.eventsView==='list' ? 'bg-white text-green-700 shadow' : 'text-white hover:bg-white/20'}">📋 ${t('List')}</button>
                                </div>
                                <button onclick="addEvent()" class="flex items-center gap-2 px-5 py-2.5 bg-white text-green-700 rounded-xl font-black text-sm shadow-lg hover:shadow-xl transition-all hover-lift">➕ ${t('Add Event')}</button>
                            </div>

                        <div class="flex items-center justify-between mt-4 bg-white/15 rounded-2xl p-3">

                            <div class="text-center">

                                ${!isCurrentMonth ? `<button onclick="calGoToday()" class="text-xs text-green-200 hover:text-white font-bold underline mt-0.5">${t('Back to Today')}</button>` : `<div class="text-xs text-green-200 font-bold mt-0.5">${t('Current Month')}</div>`}
                            </div>
                            <button onclick="calNext()" class="flex items-center gap-1 px-4 py-2 bg-white/20 hover:bg-white/30 text-white rounded-xl font-black transition-all text-sm">${t('Next ▶')}</button>

                    </div>

                    <div class="p-4 md:p-6">

                        ${state.eventsView === 'calendar' ? `
                        <!-- Calendar Grid -->
                        <div class="mb-4">
                            <!-- Day headers -->
                            <div class="grid grid-cols-7 gap-1.5 mb-1.5">
                                ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`
                                    <div class="text-center text-xs font-black text-gray-500 uppercase tracking-wider py-1">${t(d)}</div>

                            <!-- Day cells -->
                            <div class="grid grid-cols-7 gap-1.5">

                            </div>

                        <!-- Legend -->
                        <div class="flex flex-wrap gap-2 mt-4 pt-4 border-t border-gray-100">
                            ${Object.entries(typeColors).map(([type, color])=>`
                                <div class="flex items-center gap-1.5">
                                    <div class="w-3 h-3 rounded-full ${color}"></div>
                                    <span class="text-xs font-semibold text-gray-600">${type.split(' ').slice(1).join(' ')}</span>

                            <div class="flex items-center gap-1.5 ml-2">
                                <span class="text-xs font-bold text-green-600">✨</span>
                                <span class="text-xs font-semibold text-gray-600">${t('Investigator-friendly')}</span>
                            </div>

                        <!-- This month event list (below calendar) -->
                        ${monthEvents.length > 0 ? `
                        <div class="mt-5 pt-5 border-t border-gray-100">
                            <h3 class="font-black text-lg text-green-800 mb-3">📋 ${monthName} ${t('Events')}</h3>
                            <div class="space-y-2">
                                ${[...monthEvents].sort((a,b)=>parseLocalDate(a.date)-parseLocalDate(b.date)).map(ev => {
                                    const evDate = parseLocalDate(ev.date);
                                    const daysUntil = Math.ceil((evDate - today)/(1000*60*60*24));
                                    const isPast = evDate < today;
                                    return `
                                    <div onclick="editEvent('${ev.id}')" class="flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-all hover:shadow-md ${isPast ? 'bg-gray-50 opacity-70 hover:opacity-100' : 'bg-green-50 hover:bg-green-100'} border border-gray-100">
                                        <div class="text-2xl">${ev.type.split(' ')[0]}</div>
                                        <div class="flex-1 min-w-0">
                                            <div class="font-black text-gray-900 text-sm truncate">${ev.inviteReady?'✨ ':''}${ev.name}</div>
                                            <div class="text-xs text-gray-500 font-semibold">${evDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}${ev.time?' · '+ev.time:''} ${ev.location?'· 📍'+ev.location:''}</div>
                                        </div>
                                        ${!isPast ? `<span class="text-xs font-black px-2 py-1 rounded-lg flex-shrink-0 ${daysUntil===0?'bg-red-100 text-red-700':daysUntil<=7?'bg-orange-100 text-orange-700':'bg-green-100 text-green-700'}">${daysUntil===0?t('TODAY'):daysUntil===1?t('Tomorrow'):daysUntil+' '+t('days')}</span>` : `<span class="text-xs font-bold text-gray-400 flex-shrink-0">${t('Past')}</span>`}
                                    </div>`;

                        </div>` : `
                        <div class="mt-5 pt-5 border-t border-gray-100 text-center py-8 text-gray-400">
                            <div class="text-5xl mb-3">📭</div>
                            <p class="font-bold text-lg">${t('No events in')} ${monthName} ${year}</p>
                            <p class="text-sm mt-1">${t('Click any day to add an event, or use ➕ Add Event')}</p>
                        </div>`}

                        ` : `
                        <!-- LIST VIEW -->

                            <div class="text-center py-16 text-gray-400">

                                        <div onclick="editEvent('${ev.id}')" class="bg-gradient-to-r from-white to-green-50 rounded-2xl p-5 cursor-pointer hover:shadow-xl transition-all hover-lift border-l-8 ${isSoon?'border-orange-500':'border-green-500'}">
                                            <div class="flex items-start gap-3">

                            ${past.length > 0 ? `

                                    ${past.length > 8 ? `<p class="text-center text-sm text-gray-400 mt-2 font-semibold">+ ${past.length-8} ${t('more past events')}</p>` : ''}
                                </div>
                            </div>` : ''}

                        `}
                    </div>
                </div>`;
        }

        function renderCharts(currentList) {
            const totalActivities = currentList.reduce((sum, p) => sum + Object.values(p.progress||{}).flat().length, 0);
            const avgPerPerson = currentList.length > 0 ? (totalActivities/currentList.length).toFixed(1) : 0;
            const isInv = state.activeTab === 'investigators';

            // Most active month
            const monthTotals = MONTHS.map(m => currentList.reduce((s,p) => s + (p.progress?.[m]?.length||0), 0));
            const peakMonthIdx = monthTotals.indexOf(Math.max(...monthTotals));
            const peakMonth = MONTHS[peakMonthIdx];

            // People with activity this month
            const currentMonth = MONTHS[new Date().getMonth()];
            const activeThisMonth = currentList.filter(p => (p.progress?.[currentMonth]?.length||0) > 0).length;

            // Indicator frequency
            const indCounts = {};
            INDICATORS.forEach(ind => { indCounts[ind.code] = 0; });
            currentList.forEach(p => Object.values(p.progress||{}).flat().forEach(code => { if(indCounts[code] !== undefined) indCounts[code]++; }));

                                    ${[
                                        { label: t('Aaronic Priesthood'), count: cpAaronic, emoji: '✋', color: 'from-blue-400 to-blue-500' },
                                        { label: t('Temple Baptisms'), count: cpTemple, emoji: '🏛️', color: 'from-indigo-400 to-indigo-500' },
                                        { label: t('Patriarchal Blessing'), count: cpPatriarchal, emoji: '📜', color: 'from-purple-400 to-purple-500' },
                                        { label: t('Melchizedek Priesthood'), count: cpMelch, emoji: '👔', color: 'from-pink-400 to-pink-500' },
                                        { label: t('Temple Endowment'), count: cpEndowed, emoji: '⭐', color: 'from-amber-400 to-amber-500' },
                                    ].map(ord => {
                                        const pct = cpBaptized > 0 ? Math.round((ord.count/cpBaptized)*100) : 0;
                                        return `<div>
                                            <div class="flex justify-between mb-1">
                                                <span class="text-sm font-bold text-white">${ord.emoji} ${ord.label}</span>
                                                <span class="text-sm font-black text-amber-300">${ord.count} / ${cpBaptized}</span>
                                            </div>
                                            <div class="bg-white/10 rounded-full h-5 overflow-hidden">
                                                <div class="bg-gradient-to-r ${ord.color} h-full rounded-full transition-all flex items-center justify-end pr-2" style="width:${pct}%">
                                                    ${pct > 15 ? `<span class="text-white text-xs font-black">${pct}%</span>` : ''}
                                                </div>
                                            </div>
                                        </div>`;
                                    }).join('')}
                                </div>
                            </div>

                            <!-- Member list with pre-baptism activity count -->
                            <div class="bg-white/10 backdrop-blur rounded-xl p-5 border border-white/20">
                                <h4 class="font-black text-white mb-4">📋 ${t('Member Overview')}</h4>
                                <div class="space-y-3">
                                    ${cp.map(person => {
                                        const preActs = Object.values(person.progress||{}).flat().length;
                                        const ordinanceDone = [
                                            person.ordinances?.aaronicPriesthood, person.ordinances?.templeBaptisms,
                                            person.ordinances?.patriarchalBlessing, person.ordinances?.melchizedekPriesthood, person.ordinances?.endowment,
                                            person.femaleOrdinances?.templeBaptisms, person.femaleOrdinances?.patriarchalBlessing, person.femaleOrdinances?.endowment
                                        ].filter(Boolean).length;
                                        const srDone = Object.values(person.selfRelianceCompleted||{}).filter(Boolean).length;
                                        return `<div class="flex items-center gap-3 bg-white/10 rounded-xl p-3">
                                            <div class="text-2xl">✨</div>
                                            <div class="flex-1">
                                                <div class="font-black text-white text-sm">${person.name}</div>
                                                <div class="text-xs text-purple-300 font-semibold">${t('Baptized')} ${parseLocalDate(person.baptismDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
                                            </div>
                                            <div class="flex gap-2 text-xs font-bold">
                                                <span class="bg-amber-400/20 text-amber-300 px-2 py-1 rounded-lg">⭐ ${preActs} ${t('pre-acts')}</span>
                                                <span class="bg-purple-400/20 text-purple-200 px-2 py-1 rounded-lg">🏛️ ${ordinanceDone} ords</span>
                                                <span class="bg-blue-400/20 text-blue-200 px-2 py-1 rounded-lg">💼 ${srDone} SR</span>
                                            </div>
                                        </div>`;
                                    }).join('')}
                                </div>
                            </div>
                        </div>`;
                    })() : ''}
                </div>`;
        }

        function renderPrayer() {
            const pl = state.prayerList;
            return `
                <div class="space-y-5">
                    <!-- Header card -->
                    <div class="bg-gradient-to-br from-indigo-700 via-purple-700 to-indigo-800 rounded-3xl shadow-2xl p-6 md:p-8">
                        <div class="flex items-center gap-4 mb-2">
                            <div class="text-5xl">🙏</div>
                            <div>
                                <h2 class="text-2xl md:text-3xl font-black text-white">${t('Prayer List')}</h2>
                                <p class="text-indigo-200 text-sm font-semibold mt-0.5">${pl.length} ${pl.length === 1 ? t('person') : t('people')} ${t('on your prayer list · shared with your team')}</p>
                            </div>
                        </div>
                        <p class="text-indigo-200 text-sm mt-3 italic">"And the Lord said unto me: Marvel not that all mankind, yea, men and women, all nations... must be born again." — Mosiah 27:25</p>
                    </div>

                    <!-- Add new person -->
                    <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-5 border-2 border-indigo-100">
                        <h3 class="font-black text-lg text-indigo-800 mb-3">➕ ${t('Add to Prayer List')}</h3>
                        <div class="flex gap-3">
                            <input id="prayerNameInput" type="text" placeholder="${t('Enter a name...')}" class="flex-1 px-4 py-3 border-2 border-indigo-200 rounded-xl focus:border-indigo-500 focus:outline-none font-semibold text-base shadow-sm"
                                onkeydown="if(event.key==='Enter'){addPrayerPerson(this.value);this.value='';}" />
                            <button onclick="addPrayerPerson(document.getElementById('prayerNameInput').value);document.getElementById('prayerNameInput').value='';"
                                class="px-6 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl font-black hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg hover-lift">
                                ${t('Add 🙏')}
                            </button>
                        </div>
                    </div>

                    <!-- Prayer list -->
                    ${pl.length === 0 ? `
                        <div class="bg-white/95 rounded-2xl shadow-xl p-12 text-center">
                            <div class="text-7xl mb-4">🕊️</div>
                            <p class="text-xl font-black text-gray-600">${t('Your prayer list is empty')}</p>
                            <p class="text-gray-400 mt-2 font-semibold">${t('Add names above — this list is shared with your whole team')}</p>
                        </div>
                    ` : `
                        <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border-2 border-indigo-100">
                            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 px-6 py-4">
                                <h3 class="font-black text-white text-lg">🙏 ${t('Currently Praying For')} (${pl.length})</h3>
                            </div>
                            <div class="divide-y divide-indigo-50">
                                ${pl.map((person, i) => `
                                    <div class="flex items-center gap-4 p-4 hover:bg-indigo-50/50 transition-all">
                                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white font-black text-lg flex-shrink-0">${i+1}</div>
                                        <div class="flex-1 min-w-0">
                                            <div class="font-black text-gray-900 text-base">${person.name}</div>
                                            <div class="flex items-center gap-2 mt-1">
                                                <span class="text-xs text-gray-400 font-semibold">${t('Added')} ${new Date(person.addedDate).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>
                                            </div>
                                            <input type="text" value="${person.notes||''}" onchange="updatePrayerNotes(${person.id}, this.value)" placeholder="${t('Notes (answered prayers, updates...')}" class="w-full mt-1.5 px-3 py-1.5 border border-indigo-100 rounded-lg text-xs text-gray-600 focus:border-indigo-400 focus:outline-none" />
                                        </div>
                                        <button onclick="removePrayerPerson(${person.id})" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-xl transition-all text-xl flex-shrink-0" title="Remove">🗑️</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `}

                    <!-- Quick-add from tracker -->
                    ${(state.investigators.filter(p=>p.name).length > 0 || state.returning.filter(p=>p.name).length > 0) ? `
                    <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-5 border-2 border-indigo-100">
                        <h3 class="font-black text-lg text-indigo-800 mb-3">⚡ ${t('Quick Add from Tracker')}</h3>
                        <p class="text-sm text-gray-500 mb-3 font-semibold">${t('Tap a name to add them to your prayer list')}</p>
                        <div class="flex flex-wrap gap-2">
                            ${[...state.investigators, ...state.returning].filter(p=>p.name&&!pl.find(x=>x.name===p.name)).map(p=>`
                                <button onclick="addPrayerPerson('${p.name}')" class="flex items-center gap-2 px-3 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-800 rounded-xl font-bold text-sm transition-all border border-indigo-200 hover-lift">
                                    ${p.emoji||'👤'} ${p.name}
                                </button>`).join('')}
                        </div>
                    </div>` : ''}
                </div>
            `;
        }

        function renderCovenantPath() {
            // Split: active (no endowment yet) vs complete (endowment done)
            const active = state.covenantPath.filter(p => {
                if (p.type === 'OAY') return !p.femaleOrdinances?.templeBaptisms;
                if (p.type === 'Female') return !p.femaleOrdinances?.endowment;
                if (p.type === 'Male') return !p.ordinances?.endowment;
                return true; // no type yet = still active
            });
            const completed = state.covenantPath.filter(p => {
                if (p.type === 'OAY') return !!p.femaleOrdinances?.templeBaptisms;
                if (p.type === 'Female') return !!p.femaleOrdinances?.endowment;
                if (p.type === 'Male') return !!p.ordinances?.endowment;
                return false;
            });

            function renderCard(person) {
                const isMale = person.type === 'Male';
                const isFemale = person.type === 'Female';
                const isOAY = person.type === 'OAY';
                const isComplete = completed.includes(person);

                // Ordinance rows to show
                let ordinanceItems = [];
                if (isMale) ordinanceItems = [
                    { key: 'aaronicPriesthood', label: t('Aaronic Priesthood'), emoji: '✋', src: 'ordinances' },
                    { key: 'templeBaptisms',    label: t('Temple Baptisms'),     emoji: '🏛️', src: 'ordinances' },
                    { key: 'patriarchalBlessing', label: t('Patriarchal Blessing'), emoji: '📜', src: 'ordinances' },
                    { key: 'melchizedekPriesthood', label: t('Melchizedek Priesthood'), emoji: '👔', src: 'ordinances' },
                    { key: 'endowment',         label: t('Temple Endowment'),    emoji: '⭐', src: 'ordinances' },
                ];
                else if (isFemale) ordinanceItems = [
                    { key: 'templeBaptisms',    label: t('Temple Baptisms'),     emoji: '🏛️', src: 'femaleOrdinances' },
                    { key: 'patriarchalBlessing', label: t('Patriarchal Blessing'), emoji: '📜', src: 'femaleOrdinances' },
                    { key: 'endowment',         label: t('Temple Endowment'),    emoji: '⭐', src: 'femaleOrdinances' },
                ];
                else if (isOAY) ordinanceItems = [
                    { key: 'templeBaptisms',    label: t('Temple Baptisms'),     emoji: '🏛️', src: 'femaleOrdinances' },
                ];

                const srItems = [
                    { key: 'emotionalResilience',  label: t('Emotional Resilience'),    emoji: '💙' },
                    { key: 'personalFinances',     label: t('Personal Finances'),       emoji: '💰' },
                    { key: 'startGrowBusiness',    label: t('Start & Grow Business'),   emoji: '🚀' },
                    { key: 'educationBetterWork',  label: t('Education for Better Work'),emoji: '🎓' },
                    { key: 'findBetterJob',        label: t('Find a Better Job'),       emoji: '💼' },
                ];

                const ordDone = ordinanceItems.filter(o => {
                    return o.src === 'ordinances' ? person.ordinances?.[o.key] : person.femaleOrdinances?.[o.key];
                }).length;
                const srDone = Object.values(person.selfRelianceCompleted||{}).filter(Boolean).length;

                return `<div class="bg-white rounded-2xl border border-purple-100 shadow-md overflow-hidden ${isComplete ? 'opacity-75' : ''}">
                    <!-- Compact header -->
                    <div class="flex items-center gap-3 px-4 py-3 ${isComplete ? 'bg-gradient-to-r from-emerald-500 to-teal-600' : 'bg-gradient-to-r from-purple-600 to-indigo-600'}">
                        <div class="text-2xl">${isComplete ? '🏆' : '✨'}</div>
                        <div class="flex-1 min-w-0">
                            <div class="font-black text-white text-base leading-tight">${person.name}</div>
                            <div class="text-xs text-white/80 font-semibold">${person.assignment || ''} ${person.type ? '· '+person.type : ''}</div>
                        </div>
                        <div class="flex items-center gap-2">
                            ${isComplete ? `<span class="text-xs bg-white/20 text-white px-2 py-1 rounded-lg font-black">✅ ${t('Complete')}</span>` : `<span class="text-xs bg-white/20 text-white px-2 py-1 rounded-lg font-black">${ordDone}/${ordinanceItems.length} ords</span>`}
                            <button onclick="removeFromCovenantPath(${person.id})" class="text-white/60 hover:text-white text-lg px-1">🗑️</button>
                        </div>
                    </div>

                    <!-- Body -->
                    <div class="p-4 space-y-4">
                        <!-- Baptism date + type selector -->
                        <div class="flex items-center gap-3 flex-wrap">
                            <div class="flex items-center gap-2 bg-purple-50 border border-purple-200 rounded-xl px-3 py-2">
                                <span class="text-sm">📅</span>
                                <div>
                                    <div class="text-xs font-black text-purple-600 uppercase tracking-wide leading-none mb-0.5">${t('Baptism Date')}</div>
                                    <input type="date" value="${person.baptismDate}" onchange="updateCovenantField(${person.id},'baptismDate',this.value)"
                                        class="text-sm font-bold text-purple-900 bg-transparent border-none outline-none cursor-pointer" />
                                </div>
                            </div>
                            ${!person.type ? `
                            <div class="flex gap-2">
                                <button onclick="updateCovenantField(${person.id},'type','Male')" class="px-3 py-1.5 bg-blue-100 text-blue-700 rounded-lg text-xs font-black border border-blue-200">👨 ${t('Male')}</button>
                                <button onclick="updateCovenantField(${person.id},'type','Female')" class="px-3 py-1.5 bg-pink-100 text-pink-700 rounded-lg text-xs font-black border border-pink-200">👩 ${t('Female')}</button>
                                <button onclick="updateCovenantField(${person.id},'type','OAY')" class="px-3 py-1.5 bg-purple-100 text-purple-700 rounded-lg text-xs font-black border border-purple-200">🎓 ${t('OAY')}</button>
                            </div>` : ''}
                        </div>

                        ${ordinanceItems.length > 0 ? `
                        <!-- Ordinances -->
                        <div>
                            <div class="text-xs font-black text-gray-500 uppercase tracking-wide mb-2">
                                ${isOAY ? `🏛️ ${t('Temple Baptisms')}` : `🏆 ${t('Ordinance Path')}`}
                            </div>
                            <div class="grid grid-cols-1 ${isOAY ? '' : 'sm:grid-cols-2 md:grid-cols-3'} gap-2">
                                ${ordinanceItems.map(o => {
                                    const checked = o.src === 'ordinances' ? person.ordinances?.[o.key] : person.femaleOrdinances?.[o.key];
                                    const field = o.src === 'ordinances' ? 'ordinance_'+o.key : 'femaleOrd_'+o.key;
                                    return `<label class="flex items-center gap-2 p-2.5 rounded-xl cursor-pointer border transition-colors ${checked ? 'bg-purple-100 border-purple-300' : 'bg-gray-50 border-gray-200 hover:bg-purple-50'}">
                                        <input type="checkbox" ${checked?'checked':''} onchange="updateCovenantField(${person.id},'${field}',this.checked)" class="w-4 h-4 text-purple-600 rounded" />
                                        <span class="text-lg">${o.emoji}</span>
                                        <span class="text-xs font-bold text-gray-700 flex-1">${o.label}</span>
                                        ${checked ? '<span class="text-green-500 text-sm">✓</span>' : ''}
                                    </label>`;
                                }).join('')}
                            </div>
                        </div>` : ''}

                        ${person.type && !isOAY ? `
                        <!-- Self Reliance — compact -->
                        <div>
                            <div class="text-xs font-black text-gray-500 uppercase tracking-wide mb-2">💼 ${t('Self-Reliance Classes')}</div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
                                ${srItems.map(sr => {
                                    const checked = person.selfRelianceCompleted?.[sr.key];
                                    return `<label class="flex items-center gap-2 p-2 rounded-lg cursor-pointer border transition-colors ${checked ? 'bg-blue-50 border-blue-200' : 'bg-gray-50 border-gray-100 hover:bg-blue-50'}">
                                        <input type="checkbox" ${checked?'checked':''} onchange="updateCovenantField(${person.id},'selfReliance_${sr.key}',this.checked)" class="w-4 h-4 text-blue-500 rounded" />
                                        <span class="text-base">${sr.emoji}</span>
                                        <span class="text-xs font-semibold text-gray-600 flex-1 leading-tight">${sr.label}</span>
                                        ${checked ? '<span class="text-blue-500 text-sm">✓</span>' : ''}
                                    </label>`;
                                }).join('')}
                            </div>
                        </div>` : ''}

                        <!-- Notes -->
                        <textarea onchange="updateCovenantField(${person.id},'notes',this.value)" rows="2"
                            placeholder="${t('Notes on progress, attendance, etc...')}"
                            class="w-full px-3 py-2 border border-gray-200 rounded-xl text-xs text-gray-600 focus:border-purple-400 focus:outline-none resize-none">${person.notes||''}</textarea>
                    </div>
                </div>`;
            }

            return `
                <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl mt-6 overflow-hidden border border-purple-200">
                    <!-- Header -->
                    <div class="bg-gradient-to-r from-purple-700 to-indigo-700 px-5 py-4 flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <span class="text-3xl">📖</span>
                            <div>
                                <h2 class="text-lg font-black text-white">${t('The Covenant Path')}</h2>
                                <p class="text-purple-200 text-xs font-semibold">${active.length} ${t('active')} · ${completed.length} ${t('complete')}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 text-xs">
                            <span class="bg-white/20 text-white px-3 py-1 rounded-full font-black">${state.covenantPath.length} ${t('total')}</span>
                        </div>
                    </div>

                    <div class="p-4 space-y-3">
                        ${active.length > 0 ? `
                            <div class="text-xs font-black text-purple-700 uppercase tracking-wider mb-2">🔄 ${t('In Progress')}</div>
                            ${active.map(renderCard).join('')}
                        ` : ''}

                        ${completed.length > 0 ? `
                            <div class="text-xs font-black text-emerald-600 uppercase tracking-wider mt-4 mb-2">🏆 ${t('Temple Endowment Complete')}</div>
                            ${completed.map(renderCard).join('')}
                        ` : ''}
                    </div>
                </div>`;
        }

        window.saveToFirebase = saveToFirebase;
        render();
    </script>
</body>
</html>
