<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Focus 5 Master Tracker - Riverton 24th Ward</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-20px) translateX(10px); }
            50% { transform: translateY(-40px) translateX(-10px); }
            75% { transform: translateY(-20px) translateX(10px); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
            50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.8); }
        }
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            background-size: 1000px 100%;
            animation: shimmer 3s infinite;
        }
        .hover-lift { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-lift:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        @media (max-width: 768px) {
            .hover-lift:hover { transform: none; }
            .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .mobile-hide { display: none; }
        }
        .pulse-glow { animation: pulse-glow 3s infinite; }
        .floating-particle { position: absolute; border-radius: 50%; background: white; opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-900">
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAMTk39-yO86IA36-ZzBCtpLswW4skCIH4",
            authDomain: "focus5-cd663.firebaseapp.com",
            databaseURL: "https://focus5-cd663-default-rtdb.firebaseio.com",
            projectId: "focus5-cd663"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const MONTHS = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        
        const INDICATORS = [
            { code: 'IAC', name: 'Invitation to Attend Church', color: 'from-blue-500 to-blue-600', emoji: '⛪' },
            { code: 'IRB', name: 'Invitation to Read Book of Mormon', color: 'from-green-500 to-green-600', emoji: '📖' },
            { code: 'IACA', name: 'Invitation to Attend Church Activity', color: 'from-purple-500 to-purple-600', emoji: '🎉' },
            { code: 'IFHE', name: 'Invitation to Family Home Evening', color: 'from-yellow-500 to-yellow-600', emoji: '🏠' },
            { code: 'ITM', name: 'Invited to be Taught by Missionaries', color: 'from-orange-500 to-orange-600', emoji: '👔' },
            { code: 'ITB', name: 'Invited to be Baptized', color: 'from-pink-500 to-pink-600', emoji: '💧' },
            { code: 'IFH', name: 'Invited to do Family History', color: 'from-indigo-500 to-indigo-600', emoji: '🌳' },
            { code: 'ISP', name: 'Invited to Service Project', color: 'from-teal-500 to-teal-600', emoji: '🤝' },
            { code: 'MV', name: 'Ministering Home Visit', color: 'from-cyan-500 to-cyan-600', emoji: '🚪' },
            { code: 'TXT', name: 'Texted or Called', color: 'from-gray-500 to-gray-600', emoji: '📱' },
            { code: 'AC', name: 'Attended Church', color: 'from-blue-600 to-blue-700', emoji: '🙏' },
            { code: 'RBOM', name: 'Reading the Book of Mormon', color: 'from-green-600 to-green-700', emoji: '📚' },
            { code: 'ACA', name: 'Attended Church Activity', color: 'from-purple-600 to-purple-700', emoji: '🎊' },
            { code: 'AFHE', name: 'Attended FHE', color: 'from-yellow-600 to-yellow-700', emoji: '👨‍👩‍👧' },
            { code: 'TML', name: 'Taking Missionary Lessons', color: 'from-orange-600 to-orange-700', emoji: '📝' },
            { code: 'BD', name: 'Baptismal Date Set', color: 'from-red-500 to-red-600', emoji: '📅' },
            { code: 'B', name: 'Baptized', color: 'from-red-600 to-red-700', emoji: '✨' },
            { code: 'C', name: 'Confirmed', color: 'from-red-700 to-red-800', emoji: '🕊️' },
            { code: 'FHS', name: 'Family History Started', color: 'from-indigo-600 to-indigo-700', emoji: '🌲' },
            { code: 'ASP', name: 'Attended Service Project', color: 'from-teal-600 to-teal-700', emoji: '💪' },
            { code: 'ACTIVE', name: 'Active Member', color: 'from-emerald-500 to-emerald-600', emoji: '⭐' }
        ];

        let state = {
            investigators: Array(5).fill().map((_, i) => ({ id: i + 1, name: '', notes: '', progress: {}, assignment: '' })),
            returning: Array(5).fill().map((_, i) => ({ id: i + 100, name: '', notes: '', progress: {}, assignment: '' })),
            covenantPath: [],
            events: [],
            activeTab: 'investigators',
            viewMode: 'tracker',
            saveMessage: '',
            backgroundImage: 'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1920&q=80',
            calendarYear: new Date().getFullYear(),
            calendarMonth: new Date().getMonth(),
            eventsView: 'calendar'
        };

        const dataRef = ref(database, 'trackerDataV2');
        const eventsRef = ref(database, 'events');
        
        onValue(dataRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state.investigators = data.investigators || state.investigators;
                state.returning = data.returning || state.returning;
                state.covenantPath = data.covenantPath || [];
                state.backgroundImage = data.backgroundImage || state.backgroundImage;
            }
            render();
        });

        onValue(eventsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state.events = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            }
            render();
        });

        function saveToFirebase() {
            set(dataRef, {
                investigators: state.investigators,
                returning: state.returning,
                covenantPath: state.covenantPath,
                backgroundImage: state.backgroundImage,
                lastSaved: Date.now()
            }).then(() => {
                showSaveMessage('✓ Saved successfully!');
            }).catch(err => {
                console.error('Save error:', err);
                showSaveMessage('Error saving');
            });
        }

        function showSaveMessage(msg) {
            state.saveMessage = msg;
            render();
            setTimeout(() => { state.saveMessage = ''; render(); }, 3000);
        }

        function getCurrentList() {
            return state.activeTab === 'investigators' ? state.investigators : state.returning;
        }

        function setCurrentList(list) {
            if (state.activeTab === 'investigators') { state.investigators = list; }
            else { state.returning = list; }
        }

        window.updateName = (id, name) => { const l = getCurrentList(); setCurrentList(l.map(p => p.id === id ? { ...p, name } : p)); saveToFirebase(); };
        window.updateNotes = (id, notes) => { const l = getCurrentList(); setCurrentList(l.map(p => p.id === id ? { ...p, notes } : p)); saveToFirebase(); };
        window.updateAssignment = (id, assignment) => { const l = getCurrentList(); setCurrentList(l.map(p => p.id === id ? { ...p, assignment } : p)); saveToFirebase(); };

        window.toggleIndicator = (personId, month, indicator) => {
            const list = getCurrentList();
            const updated = list.map(person => {
                if (person.id === personId) {
                    if (!person.progress) person.progress = {};
                    const monthData = person.progress[month] || [];
                    const hasIndicator = monthData.includes(indicator);
                    const newMonthData = hasIndicator ? monthData.filter(i => i !== indicator) : [...monthData, indicator];
                    if (indicator === 'B' && !hasIndicator) { moveToCovenantPath(person); return null; }
                    return { ...person, progress: { ...person.progress, [month]: newMonthData } };
                }
                return person;
            }).filter(p => p !== null);
            setCurrentList(updated);
            saveToFirebase();
            render();
        };

        function moveToCovenantPath(person) {
            state.covenantPath.push({
                id: Date.now(), name: person.name, assignment: person.assignment, type: '',
                ordinances: { aaronicPriesthood: false, templeBaptisms: false, patriarchalBlessing: false, melchizedekPriesthood: false, endowment: false },
                femaleOrdinances: { templeBaptisms: false, patriarchalBlessing: false, endowment: false },
                selfRelianceCompleted: { emotionalResilience: false, personalFinances: false, startGrowBusiness: false, educationBetterWork: false, findBetterJob: false },
                notes: person.notes || '',
                baptismDate: new Date().toISOString().split('T')[0],
                progress: person.progress || {}   // ✅ preserve full activity history
            });
        }

        window.addPerson = () => {
            const list = getCurrentList();
            const newId = Math.max(...list.map(p => p.id), 0) + 1;
            list.push({ id: newId, name: '', notes: '', progress: {}, assignment: '' });
            setCurrentList(list);
            saveToFirebase();
            render();
        };

        window.removePerson = (id) => {
            const list = getCurrentList();
            if (list.length > 1) { setCurrentList(list.filter(p => p.id !== id)); saveToFirebase(); render(); }
        };

        window.updateCovenantField = (personId, field, value) => {
            state.covenantPath = state.covenantPath.map(person => {
                if (person.id === personId) {
                    if (field.startsWith('ordinance_')) { const k = field.replace('ordinance_', ''); return { ...person, ordinances: { ...person.ordinances, [k]: value } }; }
                    else if (field.startsWith('femaleOrd_')) { const k = field.replace('femaleOrd_', ''); return { ...person, femaleOrdinances: { ...person.femaleOrdinances, [k]: value } }; }
                    else if (field.startsWith('selfReliance_')) { const k = field.replace('selfReliance_', ''); return { ...person, selfRelianceCompleted: { ...person.selfRelianceCompleted, [k]: value } }; }
                    else { return { ...person, [field]: value }; }
                }
                return person;
            });
            saveToFirebase();
            render();
        };

        window.removeFromCovenantPath = (personId) => {
            if (confirm('Remove this person from the Covenant Path?')) {
                state.covenantPath = state.covenantPath.filter(p => p.id !== personId);
                saveToFirebase();
                render();
            }
        };

        window.exportData = () => {
            const data = { ...state, exportDate: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `focus5-data-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        };

        window.importData = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.investigators) state.investigators = data.investigators;
                        if (data.returning) state.returning = data.returning;
                        if (data.covenantPath) state.covenantPath = data.covenantPath;
                        saveToFirebase();
                        showSaveMessage('✓ Data imported successfully!');
                    } catch (error) { showSaveMessage('Error importing data'); }
                };
                reader.readAsText(file);
            }
        };

        window.setActiveTab = (tab) => { state.activeTab = tab; render(); };
        window.setViewMode = (mode) => { state.viewMode = mode; render(); };
        window.setEventsView = (v) => { state.eventsView = v; render(); };
        window.calPrev = () => {
            if (state.calendarMonth === 0) { state.calendarMonth = 11; state.calendarYear--; }
            else { state.calendarMonth--; }
            render();
        };
        window.calNext = () => {
            if (state.calendarMonth === 11) { state.calendarMonth = 0; state.calendarYear++; }
            else { state.calendarMonth++; }
            render();
        };
        window.calGoToday = () => {
            state.calendarMonth = new Date().getMonth();
            state.calendarYear = new Date().getFullYear();
            render();
        };

        window.showBackgroundImageModal = () => {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div class="bg-white rounded-3xl p-8 max-w-2xl w-full shadow-2xl">
                    <h3 class="text-3xl font-black text-purple-900 mb-6">🖼️ Change Background Image</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold mb-2 text-gray-700">Image URL</label>
                            <input id="bgImageUrl" type="text" value="${state.backgroundImage}" placeholder="https://example.com/image.jpg" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:outline-none" />
                        </div>
                        <div class="bg-purple-50 rounded-xl p-4">
                            <p class="text-sm text-purple-900 font-semibold mb-2">💡 Suggested Images:</p>
                            <div class="space-y-2">
                                <button onclick="document.getElementById('bgImageUrl').value='https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1920&q=80'" class="w-full text-left px-3 py-2 bg-white rounded-lg hover:bg-purple-100 text-sm">🏛️ Jordan River Temple</button>
                                <button onclick="document.getElementById('bgImageUrl').value='https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80'" class="w-full text-left px-3 py-2 bg-white rounded-lg hover:bg-purple-100 text-sm">🏔️ Mountains</button>
                                <button onclick="document.getElementById('bgImageUrl').value='https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=1920&q=80'" class="w-full text-left px-3 py-2 bg-white rounded-lg hover:bg-purple-100 text-sm">⭐ Night Sky</button>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-6">
                        <button onclick="this.closest('.fixed').remove()" class="flex-1 bg-gray-200 text-gray-700 px-6 py-3 rounded-xl font-semibold hover:bg-gray-300">Cancel</button>
                        <button onclick="updateBackgroundImage(document.getElementById('bgImageUrl').value); this.closest('.fixed').remove();" class="flex-1 bg-gradient-to-r from-purple-600 to-pink-600 text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg">Update Background</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
        };

        window.addEvent = () => { addEventOnDay(''); };
        window.addEventOnDay = (dateStr) => {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `
                <div class="bg-white rounded-3xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
                    <div class="flex items-center gap-3 mb-6"><div class="text-5xl">📅</div><h3 class="font-black text-3xl text-purple-900">Add Ward Event</h3></div>
                    <div class="space-y-4">
                        <div><label class="block text-sm font-bold mb-2 text-gray-700">Event Name *</label><input id="eventName" type="text" placeholder="e.g., Ward BBQ, Youth Activity" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:outline-none" /></div>
                        <div><label class="block text-sm font-bold mb-2 text-gray-700">Date *</label><input id="eventDate" type="date" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:outline-none" /></div>
                        <div><label class="block text-sm font-bold mb-2 text-gray-700">Time</label><input id="eventTime" type="time" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:outline-none" /></div>
                        <div><label class="block text-sm font-bold mb-2 text-gray-700">Location</label><input id="eventLocation" type="text" placeholder="Church building, Park, etc." class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:outline-none" /></div>
                        <div><label class="block text-sm font-bold mb-2 text-gray-700">Event Type</label>
                        <select id="eventType" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:outline-none">
                            <option>🏛️ Church Activity</option><option>🎉 Social Event</option><option>⚾ Sports/Recreation</option><option>🤝 Service Project</option><option>👨‍👩‍👧 Family Activity</option><option>📖 Scripture Study</option><option>🙏 Spiritual</option><option>🏃 Youth Activity</option>
                        </select></div>
                        <div><label class="block text-sm font-bold mb-2 text-gray-700">Description</label><textarea id="eventDescription" rows="3" placeholder="Event details..." class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:border-purple-500 focus:outline-none"></textarea></div>
                        <div class="bg-indigo-50 rounded-xl p-4"><label class="flex items-center gap-3 cursor-pointer"><input id="eventInviteReady" type="checkbox" class="w-5 h-5 text-indigo-600 rounded"><span class="text-sm font-semibold">✨ Great for inviting investigators</span></label></div>
                    </div>
                    <div class="flex gap-3 mt-6">
                        <button onclick="this.closest('.fixed').remove()" class="flex-1 bg-gray-200 text-gray-700 px-6 py-3 rounded-xl font-semibold hover:bg-gray-300">Cancel</button>
                        <button onclick="saveNewEvent()" class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-6 py-3 rounded-xl font-semibold hover:shadow-lg">Add Event</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
            if (dateStr) { document.getElementById('eventDate').value = dateStr; }
            else { document.getElementById('eventDate').valueAsDate = new Date(); }
        };

        window.saveNewEvent = () => {
            const name = document.getElementById('eventName').value.trim();
            const date = document.getElementById('eventDate').value;
            if (!name || !date) { alert('Please enter an event name and date'); return; }
            const newEvent = {
                name, date,
                time: document.getElementById('eventTime').value,
                location: document.getElementById('eventLocation').value.trim(),
                type: document.getElementById('eventType').value,
                description: document.getElementById('eventDescription').value.trim(),
                inviteReady: document.getElementById('eventInviteReady').checked,
                createdAt: new Date().toISOString()
            };
            set(ref(database, `events/${Date.now()}`), newEvent);
            document.querySelector('.fixed').remove();
        };

        window.editEvent = (eventId) => {
            const event = state.events.find(e => e.id === eventId);
            if (!event) return;
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            const types = ['🏛️ Church Activity','🎉 Social Event','⚾ Sports/Recreation','🤝 Service Project','👨‍👩‍👧 Family Activity','📖 Scripture Study','🙏 Spiritual','🏃 Youth Activity'];
            modal.innerHTML = `
                <div class="bg-white rounded-3xl p-8 max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
                    <div class="flex items-center gap-3 mb-6"><div class="text-5xl">✏️</div><h3 class="font-black text-3xl text-purple-900">Edit Event</h3></div>
                    <div class="space-y-4">
                        <div><label class="block text-sm font-bold mb-2">Event Name *</label><input id="editEventName" type="text" value="${event.name}" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:outline-none" /></div>
                        <div><label class="block text-sm font-bold mb-2">Date *</label><input id="editEventDate" type="date" value="${event.date}" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:outline-none" /></div>
                        <div><label class="block text-sm font-bold mb-2">Time</label><input id="editEventTime" type="time" value="${event.time||''}" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:outline-none" /></div>
                        <div><label class="block text-sm font-bold mb-2">Location</label><input id="editEventLocation" type="text" value="${event.location||''}" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:outline-none" /></div>
                        <div><label class="block text-sm font-bold mb-2">Event Type</label><select id="editEventType" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:outline-none">${types.map(t=>`<option value="${t}"${event.type===t?' selected':''}>${t}</option>`).join('')}</select></div>
                        <div><label class="block text-sm font-bold mb-2">Description</label><textarea id="editEventDescription" rows="3" class="w-full px-4 py-3 border-2 border-purple-200 rounded-xl focus:outline-none">${event.description||''}</textarea></div>
                        <div class="bg-indigo-50 rounded-xl p-4"><label class="flex items-center gap-3 cursor-pointer"><input id="editEventInviteReady" type="checkbox" ${event.inviteReady?'checked':''} class="w-5 h-5 text-indigo-600 rounded"><span class="text-sm font-semibold">✨ Great for inviting investigators</span></label></div>
                    </div>
                    <div class="flex gap-3 mt-6">
                        <button onclick="deleteEvent('${eventId}')" class="bg-red-500 text-white px-6 py-3 rounded-xl font-semibold hover:bg-red-600">Delete</button>
                        <button onclick="this.closest('.fixed').remove()" class="flex-1 bg-gray-200 text-gray-700 px-6 py-3 rounded-xl font-semibold">Cancel</button>
                        <button onclick="updateEvent('${eventId}')" class="flex-1 bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-6 py-3 rounded-xl font-semibold">Save</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
        };

        window.updateEvent = (eventId) => {
            const name = document.getElementById('editEventName').value.trim();
            const date = document.getElementById('editEventDate').value;
            if (!name || !date) { alert('Please enter an event name and date'); return; }
            set(ref(database, `events/${eventId}`), {
                name, date,
                time: document.getElementById('editEventTime').value,
                location: document.getElementById('editEventLocation').value.trim(),
                type: document.getElementById('editEventType').value,
                description: document.getElementById('editEventDescription').value.trim(),
                inviteReady: document.getElementById('editEventInviteReady').checked
            });
            document.querySelector('.fixed').remove();
        };

        window.deleteEvent = (eventId) => {
            if (!confirm('Delete this event?')) return;
            set(ref(database, `events/${eventId}`), null);
            document.querySelector('.fixed').remove();
        };

        window.openIndicatorModal = (personId, month) => {
            const list = getCurrentList();
            const person = list.find(p => p.id === personId);
            const monthData = person.progress?.[month] || [];
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4';
            modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
            modal.innerHTML = `

        window.handleIndicatorToggle = (personId, month, indicatorCode, isChecked) => {
            const list = getCurrentList();
            const updated = list.map(person => {
                if (person.id === personId) {
                    if (!person.progress) person.progress = {};
                    const monthData = person.progress[month] || [];
                    let newMonthData = isChecked
                        ? (monthData.includes(indicatorCode) ? monthData : [...monthData, indicatorCode])
                        : monthData.filter(code => code !== indicatorCode);
                    if (indicatorCode === 'B' && isChecked && !monthData.includes('B')) {
                        setTimeout(() => { document.querySelector('.fixed')?.remove(); moveToCovenantPath(person); }, 500);
                        return null;
                    }
                    if (indicatorCode === 'ACTIVE' && isChecked && !monthData.includes('ACTIVE')) {
                        setTimeout(() => { document.querySelector('.fixed')?.remove(); moveToCovenantPath(person); }, 500);
                        return null;
                    }
                    return { ...person, progress: { ...person.progress, [month]: newMonthData } };
                }
                return person;
            }).filter(p => p !== null);
            setCurrentList(updated);
            saveToFirebase();
            render();
        };

        function renderEvents() {
            const today = new Date(); today.setHours(0,0,0,0);
            const year = state.calendarYear;
            const month = state.calendarMonth;
            const monthName = new Date(year, month, 1).toLocaleString('en-US', { month: 'long' });
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;

            // All events for this month
            const monthEvents = state.events.filter(e => {
                const d = new Date(e.date);
                return d.getFullYear() === year && d.getMonth() === month;
            });

            // Build calendar grid
            const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            // Events grouped by day
            const eventsByDay = {};
            monthEvents.forEach(e => {
                const day = new Date(e.date).getDate();
                if (!eventsByDay[day]) eventsByDay[day] = [];
                eventsByDay[day].push(e);
            });

            // Type color map
            const typeColors = {
                '🏛️ Church Activity': 'bg-blue-500',
                '🎉 Social Event': 'bg-pink-500',
                '⚾ Sports/Recreation': 'bg-orange-500',
                '🤝 Service Project': 'bg-teal-500',
                '👨‍👩‍👧 Family Activity': 'bg-yellow-500',
                '📖 Scripture Study': 'bg-indigo-500',
                '🙏 Spiritual': 'bg-purple-500',
                '🏃 Youth Activity': 'bg-green-500',
            };

            // Sorted upcoming/past for list view
            const sortedAll = [...state.events].sort((a,b)=>new Date(a.date)-new Date(b.date));
            const upcoming = sortedAll.filter(e=>new Date(e.date)>=today);
            const past = sortedAll.filter(e=>new Date(e.date)<today).reverse();

            // Calendar grid cells
            let calCells = '';
            // Prev month filler days
            for (let i = 0; i < firstDay; i++) {
                const d = daysInPrevMonth - firstDay + 1 + i;
                calCells += `<div class="min-h-[80px] p-1 bg-gray-50/50 rounded-lg border border-gray-100">
                    <span class="text-xs font-bold text-gray-300">${d}</span>
                </div>`;
            }
            // Current month days
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const dayEvents = eventsByDay[d] || [];
                const isToday = isCurrentMonth && today.getDate() === d;
                const isPast = new Date(year, month, d) < today;
                calCells += `
                    <div class="min-h-[80px] p-1.5 rounded-xl border-2 transition-all cursor-pointer hover:shadow-md ${isToday ? 'bg-amber-50 border-amber-400 shadow-lg' : isPast ? 'bg-gray-50/80 border-gray-100' : 'bg-white border-green-100 hover:border-green-300'}"
                         onclick="addEventOnDay('${dateStr}')">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs font-black ${isToday ? 'bg-amber-500 text-white w-5 h-5 rounded-full flex items-center justify-center text-xs' : isPast ? 'text-gray-400' : 'text-gray-700'}">${d}</span>
                            ${dayEvents.length > 0 ? `<span class="text-xs font-black text-green-600 bg-green-100 px-1.5 py-0.5 rounded-full">${dayEvents.length}</span>` : ''}
                        </div>
                        <div class="space-y-0.5">
                            ${dayEvents.slice(0,3).map(ev => `
                                <div onclick="event.stopPropagation(); editEvent('${ev.id}')"
                                     class="text-white text-xs font-bold px-1.5 py-0.5 rounded-md truncate cursor-pointer hover:opacity-80 transition-opacity ${typeColors[ev.type]||'bg-gray-500'}"
                                     title="${ev.name}${ev.time ? ' @ '+ev.time : ''}">
                                    ${ev.inviteReady ? '✨ ' : ''}${ev.name}
                                </div>`).join('')}
                            ${dayEvents.length > 3 ? `<div class="text-xs font-bold text-gray-500 pl-1">+${dayEvents.length-3} more</div>` : ''}
                        </div>
                    </div>`;
            }
            // Next month filler
            const totalCells = firstDay + daysInMonth;
            const remainder = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remainder; i++) {
                calCells += `<div class="min-h-[80px] p-1 bg-gray-50/50 rounded-lg border border-gray-100">
                    <span class="text-xs font-bold text-gray-300">${i}</span>
                </div>`;
            }

            return `
                <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden hover-lift">

                    <!-- Header -->
                    <div class="bg-gradient-to-r from-green-600 to-emerald-600 p-5 md:p-6">
                        <div class="flex items-center justify-between flex-wrap gap-3">
                            <div class="flex items-center gap-3">
                                <div class="text-4xl">🗓️</div>
                                <div>
                                    <h2 class="text-2xl md:text-3xl font-black text-white">Ward Events Calendar</h2>
                                    <p class="text-green-100 text-sm font-semibold">${state.events.length} total events · ${monthEvents.length} in ${monthName}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2 flex-wrap">
                                <!-- View toggle -->
                                <div class="flex bg-white/20 rounded-xl p-1 gap-1">
                                    <button onclick="setEventsView('calendar')" class="px-3 py-2 rounded-lg font-bold text-sm transition-all ${state.eventsView==='calendar' ? 'bg-white text-green-700 shadow' : 'text-white hover:bg-white/20'}">📅 Calendar</button>
                                    <button onclick="setEventsView('list')" class="px-3 py-2 rounded-lg font-bold text-sm transition-all ${state.eventsView==='list' ? 'bg-white text-green-700 shadow' : 'text-white hover:bg-white/20'}">📋 List</button>
                                </div>
                                <button onclick="addEvent()" class="flex items-center gap-2 px-5 py-2.5 bg-white text-green-700 rounded-xl font-black text-sm shadow-lg hover:shadow-xl transition-all hover-lift">➕ Add Event</button>
                            </div>
                        </div>

                        <!-- Month Navigation -->
                        <div class="flex items-center justify-between mt-4 bg-white/15 rounded-2xl p-3">
                            <button onclick="calPrev()" class="flex items-center gap-1 px-4 py-2 bg-white/20 hover:bg-white/30 text-white rounded-xl font-black transition-all text-sm">◀ Prev</button>
                            <div class="text-center">
                                <div class="text-2xl font-black text-white">${monthName} ${year}</div>

            const baptized = currentList.reduce((s,p)=>s+(Object.values(p.progress||{}).flat().includes('B')?1:0),0) + state.covenantPath.length;

                                x: { grid: { display: false }, ticks: { font: { weight: '700', size: 11 } } }

                            </div>

                                const maxActs = 12 * 5; // realistic target: 5 activities/month

                    <!-- Indicator Breakdown Table -->
                    ${topIndicators.length > 0 ? `
                    <div class="bg-white/95 backdrop-blur-md rounded-2xl shadow-xl p-6 hover-lift border-2 ${accentBorder}">
                        <h3 class="font-black text-xl mb-1 ${accentText}">📋 Full Indicator Breakdown</h3>
                        <p class="text-xs text-gray-500 mb-5 font-semibold">All recorded activity types ranked by frequency</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${Object.entries(indCounts).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]).map(([code, count], i) => {
                                const ind = INDICATORS.find(x=>x.code===code);
                                const maxCount = Math.max(...Object.values(indCounts));
                                const barPct = maxCount > 0 ? Math.round((count/maxCount)*100) : 0;
                                return `
                                    <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-xl hover:bg-gray-100 transition-all">
                                        <span class="text-2xl">${ind?.emoji||'•'}</span>
                                        <div class="flex-1 min-w-0">
                                            <div class="flex justify-between mb-1">
                                                <span class="font-black text-sm text-gray-800">${code}</span>
                                                <span class="font-black text-sm ${accentText}">${count}×</span>
                                            </div>
                                            <div class="bg-gray-200 rounded-full h-2">
                                                <div class="bg-gradient-to-r ${accentFrom} ${accentTo} h-2 rounded-full transition-all" style="width:${barPct}%"></div>
                                            </div>
                                        </div>
                                    </div>`;
                            }).join('')}
                        </div>
                    </div>` : ''}

                    <!-- ✅ COVENANT PATH KPI SECTION -->
                    ${state.covenantPath.length > 0 ? (() => {
                        const cp = state.covenantPath;
                        const cpTotalActs = cp.reduce((s,p)=>s+Object.values(p.progress||{}).flat().length,0);
                        const cpBaptized = cp.length;
                        const cpMale = cp.filter(p=>p.type==='Male').length;
                        const cpFemale = cp.filter(p=>p.type==='Female').length;
                        const cpOAY = cp.filter(p=>p.type==='OAY').length;
                        const cpEndowed = cp.filter(p=>p.ordinances?.endowment||p.femaleOrdinances?.endowment).length;
                        const cpMelch = cp.filter(p=>p.ordinances?.melchizedekPriesthood).length;
                        const cpPatriarchal = cp.filter(p=>p.ordinances?.patriarchalBlessing||p.femaleOrdinances?.patriarchalBlessing).length;
                        const cpTemple = cp.filter(p=>p.ordinances?.templeBaptisms||p.femaleOrdinances?.templeBaptisms).length;
                        const cpAaronic = cp.filter(p=>p.ordinances?.aaronicPriesthood).length;
                        const srKeys = ['emotionalResilience','personalFinances','startGrowBusiness','educationBetterWork','findBetterJob'];
                        const srLabels = ['Emotional Resilience','Personal Finances','Start & Grow Business','Education for Work','Find a Better Job'];
                        const srCounts = srKeys.map(k=>cp.filter(p=>p.selfRelianceCompleted?.[k]).length);
                        const totalOrdinances = cpEndowed + cpMelch + cpPatriarchal + cpTemple + cpAaronic;
                        const maxOrdinances = cp.length * 5;
                        const ordPct = maxOrdinances > 0 ? Math.round((totalOrdinances/maxOrdinances)*100) : 0;

                        setTimeout(() => {
                            const ctx5 = document.getElementById('cpTypeDonut');
                            if (ctx5 && (cpMale+cpFemale+cpOAY) > 0) {
                                if (ctx5._chartInstance) ctx5._chartInstance.destroy();
                                ctx5._chartInstance = new Chart(ctx5, {
                                    type: 'doughnut',
                                    data: {
                                        labels: ['Male','Female','OAY'],
                                        datasets: [{ data: [cpMale,cpFemale,cpOAY], backgroundColor: ['#3b82f6','#ec4899','#8b5cf6'], borderWidth: 3, borderColor: '#fff', hoverOffset: 8 }]
                                    },
                                    options: { responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ legend:{ position:'right', labels:{ font:{ weight:'bold', size:12 }, padding:10 } } } }
                                });
                            }
                            const ctx6 = document.getElementById('cpSRBar');
                            if (ctx6) {
                                if (ctx6._chartInstance) ctx6._chartInstance.destroy();
                                ctx6._chartInstance = new Chart(ctx6, {
                                    type: 'bar',
                                    data: {
                                        labels: ['Emotional','Finances','Business','Education','Job'],
                                        datasets: [{ label: 'Completed', data: srCounts, backgroundColor: ['#a855f7','#3b82f6','#10b981','#f59e0b','#ef4444'], borderRadius: 8, borderSkipped: false }]
                                    },
                                    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, max: Math.max(cpBaptized,1), ticks:{ stepSize:1, font:{ weight:'bold' } }, grid:{ color:'rgba(0,0,0,0.06)' } }, x:{ grid:{ display:false }, ticks:{ font:{ weight:'700', size:11 } } } } }
                                });
                            }
                        }, 150);

                        return `
                        <div class="bg-gradient-to-br from-purple-900 via-indigo-900 to-purple-900 rounded-2xl shadow-2xl p-6 hover-lift border-2 border-purple-400/40">
                            <div class="flex items-center gap-3 mb-6">
                                <div class="text-4xl">📖</div>
                                <div>
                                    <h3 class="font-black text-2xl text-white">Covenant Path Dashboard</h3>
                                    <p class="text-purple-300 text-sm font-semibold">Progress tracking for baptized members</p>
                                </div>
                            </div>

                            <!-- CP Stat Cards -->
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
                                <div class="bg-white/10 backdrop-blur rounded-xl p-4 text-center border border-white/20">
                                    <div class="text-3xl mb-1">✨</div>
                                    <div class="text-3xl font-black text-white">${cpBaptized}</div>
                                    <div class="text-xs text-purple-300 font-bold mt-1 uppercase tracking-wide">Baptized</div>
                                </div>
                                <div class="bg-white/10 backdrop-blur rounded-xl p-4 text-center border border-white/20">
                                    <div class="text-3xl mb-1">⭐</div>
                                    <div class="text-3xl font-black text-white">${cpTotalActs}</div>
                                    <div class="text-xs text-purple-300 font-bold mt-1 uppercase tracking-wide">Pre-Baptism Acts</div>
                                </div>
                                <div class="bg-white/10 backdrop-blur rounded-xl p-4 text-center border border-white/20">
                                    <div class="text-3xl mb-1">🏛️</div>
                                    <div class="text-3xl font-black text-white">${cpEndowed}</div>
                                    <div class="text-xs text-purple-300 font-bold mt-1 uppercase tracking-wide">Endowed</div>
                                </div>
                                <div class="bg-white/10 backdrop-blur rounded-xl p-4 text-center border border-white/20">
                                    <div class="text-3xl mb-1">📜</div>
                                    <div class="text-3xl font-black text-amber-300">${Math.round((totalOrdinances/Math.max(maxOrdinances,1))*100)}%</div>
                                    <div class="text-xs text-purple-300 font-bold mt-1 uppercase tracking-wide">Ordinance Rate</div>
                                </div>
                            </div>

                            <!-- Charts row -->
                            <div class="grid md:grid-cols-2 gap-4 mb-5">
                                <div class="bg-white/10 backdrop-blur rounded-xl p-5 border border-white/20">
                                    <h4 class="font-black text-white mb-1">👥 Member Types</h4>
                                    <p class="text-xs text-purple-300 mb-3 font-semibold">Male / Female / OAY breakdown</p>
                                    <div style="height:180px;position:relative;">
                                        ${(cpMale+cpFemale+cpOAY)>0 ? '<canvas id="cpTypeDonut"></canvas>' : '<div class="flex items-center justify-center h-full text-purple-300 text-sm font-bold">Assign types to members first</div>'}
                                    </div>
                                </div>
                                <div class="bg-white/10 backdrop-blur rounded-xl p-5 border border-white/20">
                                    <h4 class="font-black text-white mb-1">💼 Self-Reliance Classes</h4>
                                    <p class="text-xs text-purple-300 mb-3 font-semibold">Completed courses across all members</p>
                                    <div style="height:180px;position:relative;">
                                        <canvas id="cpSRBar"></canvas>
                                    </div>
                                </div>
                            </div>

                            <!-- Ordinance Progress Bars -->
                            <div class="bg-white/10 backdrop-blur rounded-xl p-5 border border-white/20 mb-4">
                                <h4 class="font-black text-white mb-4">🏆 Ordinance Progress (${totalOrdinances} / ${maxOrdinances} total)</h4>
                                <div class="space-y-3">
                                    ${[
                                        { label: 'Aaronic Priesthood', count: cpAaronic, emoji: '✋', color: 'from-blue-400 to-blue-500' },
                                        { label: 'Temple Baptisms', count: cpTemple, emoji: '🏛️', color: 'from-indigo-400 to-indigo-500' },
                                        { label: 'Patriarchal Blessing', count: cpPatriarchal, emoji: '📜', color: 'from-purple-400 to-purple-500' },
                                        { label: 'Melchizedek Priesthood', count: cpMelch, emoji: '👔', color: 'from-pink-400 to-pink-500' },
                                        { label: 'Temple Endowment', count: cpEndowed, emoji: '⭐', color: 'from-amber-400 to-amber-500' },
                                    ].map(ord => {
                                        const pct = cpBaptized > 0 ? Math.round((ord.count/cpBaptized)*100) : 0;
                                        return `<div>
                                            <div class="flex justify-between mb-1">
                                                <span class="text-sm font-bold text-white">${ord.emoji} ${ord.label}</span>
                                                <span class="text-sm font-black text-amber-300">${ord.count} / ${cpBaptized}</span>
                                            </div>
                                            <div class="bg-white/10 rounded-full h-5 overflow-hidden">
                                                <div class="bg-gradient-to-r ${ord.color} h-full rounded-full transition-all flex items-center justify-end pr-2" style="width:${pct}%">
                                                    ${pct > 15 ? `<span class="text-white text-xs font-black">${pct}%</span>` : ''}
                                                </div>
                                            </div>
                                        </div>`;
                                    }).join('')}
                                </div>
                            </div>

                            <!-- Member list with pre-baptism activity count -->
                            <div class="bg-white/10 backdrop-blur rounded-xl p-5 border border-white/20">
                                <h4 class="font-black text-white mb-4">📋 Member Overview</h4>
                                <div class="space-y-3">
                                    ${cp.map(person => {
                                        const preActs = Object.values(person.progress||{}).flat().length;
                                        const ordinanceDone = [
                                            person.ordinances?.aaronicPriesthood, person.ordinances?.templeBaptisms,
                                            person.ordinances?.patriarchalBlessing, person.ordinances?.melchizedekPriesthood, person.ordinances?.endowment,
                                            person.femaleOrdinances?.templeBaptisms, person.femaleOrdinances?.patriarchalBlessing, person.femaleOrdinances?.endowment
                                        ].filter(Boolean).length;
                                        const srDone = Object.values(person.selfRelianceCompleted||{}).filter(Boolean).length;
                                        return `<div class="flex items-center gap-3 bg-white/10 rounded-xl p-3">
                                            <div class="text-2xl">✨</div>
                                            <div class="flex-1">
                                                <div class="font-black text-white text-sm">${person.name}</div>
                                                <div class="text-xs text-purple-300 font-semibold">Baptized ${new Date(person.baptismDate).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
                                            </div>
                                            <div class="flex gap-2 text-xs font-bold">
                                                <span class="bg-amber-400/20 text-amber-300 px-2 py-1 rounded-lg">⭐ ${preActs} pre-acts</span>
                                                <span class="bg-purple-400/20 text-purple-200 px-2 py-1 rounded-lg">🏛️ ${ordinanceDone} ords</span>
                                                <span class="bg-blue-400/20 text-blue-200 px-2 py-1 rounded-lg">💼 ${srDone} SR</span>
                                            </div>
                                        </div>`;
                                    }).join('')}
                                </div>
                            </div>
                        </div>`;
                    })() : ''}
                </div>`;
        }

        function renderCovenantPath() {
            return `
                <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 mt-8 hover-lift">
                    <div class="flex items-center gap-4 mb-8"><div class="text-6xl">📖</div><h2 class="text-5xl font-black bg-gradient-to-r from-purple-600 via-pink-600 to-red-600 bg-clip-text text-transparent">The Covenant Path</h2></div>
                    <div class="space-y-8">
                        ${state.covenantPath.map(person => {
                            const isMale = person.type === 'Male';
                            const isFemaleOrOAY = person.type === 'Female' || person.type === 'OAY';
                            return `<div class="bg-gradient-to-br from-purple-100 via-pink-100 to-indigo-100 rounded-3xl p-8 border-4 border-purple-300 shadow-2xl hover-lift">
                                <div class="flex items-start justify-between mb-8">
                                    <div class="flex-1">
                                        <h3 class="text-4xl font-black text-purple-900 mb-3">${person.name}</h3>
                                        <div class="flex gap-3 flex-wrap">
                                            <span class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-5 py-2 rounded-full text-lg font-black shadow-lg">✨ Baptized: ${new Date(person.baptismDate).toLocaleDateString()}</span>
                                            ${person.assignment ? `<span class="bg-gradient-to-r from-blue-600 to-cyan-600 text-white px-5 py-2 rounded-full text-lg font-black shadow-lg">📍 ${person.assignment}</span>` : ''}
                                        </div>
                                    </div>
                                    <button onclick="removeFromCovenantPath(${person.id})" class="text-red-500 hover:bg-red-100 p-4 rounded-2xl transition-all hover-lift">🗑️</button>
                                </div>
                                ${!person.type ? `<div class="mb-8 bg-white rounded-2xl p-6 border-4 border-purple-400 shadow-xl"><label class="block text-xl font-black mb-4 text-purple-900">Select Type:</label><div class="grid grid-cols-3 gap-4"><button onclick="updateCovenantField(${person.id},'type','Male')" class="bg-gradient-to-r from-blue-500 to-blue-600 text-white px-8 py-6 rounded-2xl font-black text-2xl transition-all shadow-xl hover-lift">👨 Male</button><button onclick="updateCovenantField(${person.id},'type','Female')" class="bg-gradient-to-r from-pink-500 to-pink-600 text-white px-8 py-6 rounded-2xl font-black text-2xl transition-all shadow-xl hover-lift">👩 Female</button><button onclick="updateCovenantField(${person.id},'type','OAY')" class="bg-gradient-to-r from-purple-500 to-purple-600 text-white px-8 py-6 rounded-2xl font-black text-2xl transition-all shadow-xl hover-lift">🎓 OAY</button></div></div>` : ''}
                                ${isMale ? `<div class="mb-8"><h4 class="font-black text-2xl text-purple-900 mb-6">🏆 Ordinance Path (Male)</h4><div class="grid md:grid-cols-2 gap-4">${[{key:'aaronicPriesthood',label:'Aaronic Priesthood',emoji:'✋'},{key:'templeBaptisms',label:'Temple Baptisms',emoji:'🏛️'},{key:'patriarchalBlessing',label:'Patriarchal Blessing',emoji:'📜'},{key:'melchizedekPriesthood',label:'Melchizedek Priesthood',emoji:'👔'},{key:'endowment',label:'Temple Endowment',emoji:'⭐'}].map(ord=>`<label class="flex items-center gap-4 bg-white p-6 rounded-2xl cursor-pointer hover:bg-purple-50 transition-all hover-lift border-2 border-purple-200 shadow-lg"><input type="checkbox" ${person.ordinances[ord.key]?'checked':''} onchange="updateCovenantField(${person.id},'ordinance_${ord.key}',this.checked)" class="w-7 h-7 text-purple-600 rounded-lg" /><span class="text-3xl">${ord.emoji}</span><span class="font-black text-lg">${ord.label}</span></label>`).join('')}</div></div>` : ''}
                                ${isFemaleOrOAY ? `<div class="mb-8"><h4 class="font-black text-2xl text-purple-900 mb-6">🏆 Ordinance Path (${person.type})</h4><div class="grid md:grid-cols-2 gap-4">${[{key:'templeBaptisms',label:'Temple Baptisms',emoji:'🏛️'},{key:'patriarchalBlessing',label:'Patriarchal Blessing',emoji:'📜'},{key:'endowment',label:'Temple Endowment',emoji:'⭐'}].map(ord=>`<label class="flex items-center gap-4 bg-white p-6 rounded-2xl cursor-pointer hover:bg-purple-50 transition-all hover-lift border-2 border-purple-200 shadow-lg"><input type="checkbox" ${person.femaleOrdinances[ord.key]?'checked':''} onchange="updateCovenantField(${person.id},'femaleOrd_${ord.key}',this.checked)" class="w-7 h-7 text-purple-600 rounded-lg" /><span class="text-3xl">${ord.emoji}</span><span class="font-black text-lg">${ord.label}</span></label>`).join('')}</div></div>` : ''}
                                ${person.type ? `<div class="mb-8"><h4 class="font-black text-2xl text-purple-900 mb-6">✨ Self-Reliance Classes</h4><div class="grid md:grid-cols-2 gap-4">${[{key:'emotionalResilience',label:'Emotional Resilience',emoji:'💙'},{key:'personalFinances',label:'Personal Finances',emoji:'💰'},{key:'startGrowBusiness',label:'Start & Grow Business',emoji:'🚀'},{key:'educationBetterWork',label:'Education for Better Work',emoji:'🎓'},{key:'findBetterJob',label:'Find a Better Job',emoji:'💼'}].map(sr=>`<label class="flex items-center gap-4 bg-white p-6 rounded-2xl cursor-pointer hover:bg-blue-50 transition-all hover-lift border-2 border-blue-200 shadow-lg"><input type="checkbox" ${person.selfRelianceCompleted[sr.key]?'checked':''} onchange="updateCovenantField(${person.id},'selfReliance_${sr.key}',this.checked)" class="w-7 h-7 text-blue-600 rounded-lg" /><span class="text-3xl">${sr.emoji}</span><span class="font-black text-lg">${sr.label}</span></label>`).join('')}</div></div><div><label class="block text-xl font-black mb-4 text-purple-900">📝 Notes:</label><textarea onchange="updateCovenantField(${person.id},'notes',this.value)" placeholder="Track church attendance, new member discussions, and progress..." class="w-full px-6 py-4 border-4 border-purple-300 rounded-2xl focus:border-purple-500 focus:outline-none text-lg font-semibold shadow-lg" rows="4">${person.notes}</textarea></div>` : ''}
                            </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }

        window.saveToFirebase = saveToFirebase;
        render();
    </script>
</body>
</html>
