<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus 5 Master Tracker - Riverton 24th Ward</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-20px) translateX(10px); }
            50% { transform: translateY(-40px) translateX(-10px); }
            75% { transform: translateY(-20px) translateX(10px); }
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
            50% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.8); }
        }
        
        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            background-size: 1000px 100%;
            animation: shimmer 3s infinite;
        }
        
        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hover-lift:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        .pulse-glow {
            animation: pulse-glow 3s infinite;
        }
        
        .floating-particle {
            position: absolute;
            border-radius: 50%;
            background: white;
            opacity: 0.2;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-gray-900">
    <div id="app"></div>

    <!-- Firebase v9 modular -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAMTk39-yO86IA36-ZzBCtpLswW4skCIH4",
            authDomain: "focus5-cd663.firebaseapp.com",
            databaseURL: "https://focus5-cd663-default-rtdb.firebaseio.com",
            projectId: "focus5-cd663"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        const MONTHS = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        
        const INDICATORS = [
            { code: 'IAC', name: 'Invitation to Attend Church', color: 'from-blue-500 to-blue-600', emoji: '⛪' },
            { code: 'IRB', name: 'Invitation to Read Book of Mormon', color: 'from-green-500 to-green-600', emoji: '📖' },
            { code: 'IACA', name: 'Invitation to Attend Church Activity', color: 'from-purple-500 to-purple-600', emoji: '🎉' },
            { code: 'IFHE', name: 'Invitation to Family Home Evening', color: 'from-yellow-500 to-yellow-600', emoji: '🏠' },
            { code: 'ITM', name: 'Invited to be Taught by Missionaries', color: 'from-orange-500 to-orange-600', emoji: '👔' },
            { code: 'ITB', name: 'Invited to be Baptized', color: 'from-pink-500 to-pink-600', emoji: '💧' },
            { code: 'IFH', name: 'Invited to do Family History', color: 'from-indigo-500 to-indigo-600', emoji: '🌳' },
            { code: 'ISP', name: 'Invited to Service Project', color: 'from-teal-500 to-teal-600', emoji: '🤝' },
            { code: 'MV', name: 'Ministering Home Visit', color: 'from-cyan-500 to-cyan-600', emoji: '🚪' },
            { code: 'TXT', name: 'Texted or Called', color: 'from-gray-500 to-gray-600', emoji: '📱' },
            { code: 'AC', name: 'Attended Church', color: 'from-blue-600 to-blue-700', emoji: '🙏' },
            { code: 'RBOM', name: 'Reading the Book of Mormon', color: 'from-green-600 to-green-700', emoji: '📚' },
            { code: 'ACA', name: 'Attended Church Activity', color: 'from-purple-600 to-purple-700', emoji: '🎊' },
            { code: 'AFHE', name: 'Attended FHE', color: 'from-yellow-600 to-yellow-700', emoji: '👨‍👩‍👧' },
            { code: 'TML', name: 'Taking Missionary Lessons', color: 'from-orange-600 to-orange-700', emoji: '📝' },
            { code: 'BD', name: 'Baptismal Date Set', color: 'from-red-500 to-red-600', emoji: '📅' },
            { code: 'B', name: 'Baptized', color: 'from-red-600 to-red-700', emoji: '✨' },
            { code: 'C', name: 'Confirmed', color: 'from-red-700 to-red-800', emoji: '🕊️' },
            { code: 'FHS', name: 'Family History Started', color: 'from-indigo-600 to-indigo-700', emoji: '🌲' },
            { code: 'ASP', name: 'Attended Service Project', color: 'from-teal-600 to-teal-700', emoji: '💪' }
        ];

        let state = {
            investigators: Array(5).fill().map((_, i) => ({ id: i + 1, name: '', notes: '', progress: {}, assignment: '' })),
            returning: Array(5).fill().map((_, i) => ({ id: i + 100, name: '', notes: '', progress: {}, assignment: '' })),
            covenantPath: [],
            activeTab: 'investigators',
            viewMode: 'tracker',
            saveMessage: ''
        };

        const dataRef = ref(database, 'trackerDataV2');
        
        onValue(dataRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state.investigators = data.investigators || state.investigators;
                state.returning = data.returning || state.returning;
                state.covenantPath = data.covenantPath || [];
            }
            render();
        });

        function saveToFirebase() {
            set(dataRef, {
                investigators: state.investigators,
                returning: state.returning,
                covenantPath: state.covenantPath,
                lastSaved: Date.now()
            }).then(() => {
                showSaveMessage('✓ Saved successfully!');
            }).catch(err => {
                console.error('Save error:', err);
                showSaveMessage('Error saving');
            });
        }

        function showSaveMessage(msg) {
            state.saveMessage = msg;
            render();
            setTimeout(() => {
                state.saveMessage = '';
                render();
            }, 3000);
        }

        function getCurrentList() {
            return state.activeTab === 'investigators' ? state.investigators : state.returning;
        }

        function setCurrentList(list) {
            if (state.activeTab === 'investigators') {
                state.investigators = list;
            } else {
                state.returning = list;
            }
        }

        window.updateName = (id, name) => {
            const list = getCurrentList();
            const updated = list.map(p => p.id === id ? { ...p, name } : p);
            setCurrentList(updated);
            saveToFirebase();
        };

        window.updateNotes = (id, notes) => {
            const list = getCurrentList();
            const updated = list.map(p => p.id === id ? { ...p, notes } : p);
            setCurrentList(updated);
            saveToFirebase();
        };

        window.updateAssignment = (id, assignment) => {
            const list = getCurrentList();
            const updated = list.map(p => p.id === id ? { ...p, assignment } : p);
            setCurrentList(updated);
            saveToFirebase();
        };

        window.toggleIndicator = (personId, month, indicator) => {
            const list = getCurrentList();
            const updated = list.map(person => {
                if (person.id === personId) {
                    if (!person.progress) person.progress = {};
                    const monthData = person.progress[month] || [];
                    const hasIndicator = monthData.includes(indicator);
                    
                    const newMonthData = hasIndicator
                        ? monthData.filter(i => i !== indicator)
                        : [...monthData, indicator];
                    
                    if (indicator === 'B' && !hasIndicator) {
                        moveToCovenantPath(person);
                        return null;
                    }
                    
                    return { ...person, progress: { ...person.progress, [month]: newMonthData } };
                }
                return person;
            }).filter(p => p !== null);
            
            setCurrentList(updated);
            saveToFirebase();
            render();
        };

        function moveToCovenantPath(person) {
            state.covenantPath.push({
                id: Date.now(),
                name: person.name,
                assignment: person.assignment,
                type: '',
                ordinances: { aaronicPriesthood: false, templeBaptisms: false, patriarchalBlessing: false, melchizedekPriesthood: false, endowment: false },
                femaleOrdinances: { templeBaptisms: false, patriarchalBlessing: false, endowment: false },
                selfRelianceCompleted: { emotionalResilience: false, personalFinances: false, startGrowBusiness: false, educationBetterWork: false, findBetterJob: false },
                notes: person.notes || '',
                baptismDate: new Date().toISOString().split('T')[0]
            });
        }

        window.addPerson = () => {
            const list = getCurrentList();
            const newId = Math.max(...list.map(p => p.id), 0) + 1;
            list.push({ id: newId, name: '', notes: '', progress: {}, assignment: '' });
            setCurrentList(list);
            saveToFirebase();
            render();
        };

        window.removePerson = (id) => {
            const list = getCurrentList();
            if (list.length > 1) {
                setCurrentList(list.filter(p => p.id !== id));
                saveToFirebase();
                render();
            }
        };

        window.updateCovenantField = (personId, field, value) => {
            state.covenantPath = state.covenantPath.map(person => {
                if (person.id === personId) {
                    if (field.startsWith('ordinance_')) {
                        const key = field.replace('ordinance_', '');
                        return { ...person, ordinances: { ...person.ordinances, [key]: value } };
                    } else if (field.startsWith('femaleOrd_')) {
                        const key = field.replace('femaleOrd_', '');
                        return { ...person, femaleOrdinances: { ...person.femaleOrdinances, [key]: value } };
                    } else if (field.startsWith('selfReliance_')) {
                        const key = field.replace('selfReliance_', '');
                        return { ...person, selfRelianceCompleted: { ...person.selfRelianceCompleted, [key]: value } };
                    } else {
                        return { ...person, [field]: value };
                    }
                }
                return person;
            });
            saveToFirebase();
            render();
        };

        window.removeFromCovenantPath = (personId) => {
            if (confirm('Remove this person from the Covenant Path?')) {
                state.covenantPath = state.covenantPath.filter(p => p.id !== personId);
                saveToFirebase();
                render();
            }
        };

        window.exportData = () => {
            const data = { ...state, exportDate: new Date().toISOString() };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `focus5-data-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        };

        window.importData = (event) => {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.investigators) state.investigators = data.investigators;
                        if (data.returning) state.returning = data.returning;
                        if (data.covenantPath) state.covenantPath = data.covenantPath;
                        saveToFirebase();
                        showSaveMessage('✓ Data imported successfully!');
                    } catch (error) {
                        showSaveMessage('Error importing data');
                    }
                };
                reader.readAsText(file);
            }
        };

        window.setActiveTab = (tab) => {
            state.activeTab = tab;
            render();
        };

        window.setViewMode = (mode) => {
            state.viewMode = mode;
            render();
        };

        function getProgressStats(person) {
            const total = Object.values(person.progress || {}).flat().length;
            const unique = new Set(Object.values(person.progress || {}).flat()).size;
            return { total, unique };
        }

        function render() {
            const currentList = getCurrentList();
            const app = document.getElementById('app');
            
            // Generate floating particles
            let particlesHTML = '';
            for (let i = 0; i < 20; i++) {
                const size = Math.random() * 4 + 2;
                const top = Math.random() * 100;
                const left = Math.random() * 100;
                const duration = Math.random() * 10 + 10;
                const delay = Math.random() * 5;
                particlesHTML += `<div class="floating-particle" style="width:${size}px;height:${size}px;top:${top}%;left:${left}%;animation:float ${duration}s linear infinite;animation-delay:${delay}s;"></div>`;
            }
            
            app.innerHTML = `
                <div class="min-h-screen relative overflow-hidden">
                    <!-- Background -->
                    <div class="fixed inset-0 z-0">
                        <div class="absolute inset-0 bg-gradient-to-br from-blue-900 via-purple-900 to-indigo-900"></div>
                        <div class="absolute inset-0 opacity-10 bg-cover bg-center" style="background-image:url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=1920&q=80');filter:brightness(0.4)"></div>
                        <div class="absolute inset-0">${particlesHTML}</div>
                    </div>

                    <div class="relative z-10 p-6">
                        <div class="max-w-7xl mx-auto">
                            <!-- Header -->
                            <div class="mb-8">
                                <div class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 rounded-3xl shadow-2xl p-8 overflow-hidden hover-lift pulse-glow">
                                    <div class="absolute inset-0 shimmer"></div>
                                    <div class="relative z-10">
                                        <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
                                            <div class="flex items-center gap-4">
                                                <div class="text-7xl">📖</div>
                                                <div>
                                                    <h1 class="text-5xl font-black text-white mb-2 tracking-tight">Focus 5 Master Tracker</h1>
                                                    <p class="text-xl text-indigo-100 font-semibold">⛪ Riverton 24th Ward • 2025</p>
                                                </div>
                                            </div>
                                            <div class="flex gap-3 flex-wrap">
                                                <button onclick="saveToFirebase()" class="flex items-center gap-2 px-8 py-4 bg-white text-indigo-600 rounded-2xl hover:bg-indigo-50 transition-all shadow-2xl font-bold text-lg hover-lift">
                                                    💾 Save Progress
                                                </button>
                                                <button onclick="exportData()" class="flex items-center gap-2 px-6 py-4 bg-white/20 backdrop-blur-sm text-white rounded-2xl hover:bg-white/30 transition-all shadow-xl hover-lift">
                                                    📥
                                                </button>
                                                <label class="flex items-center gap-2 px-6 py-4 bg-white/20 backdrop-blur-sm text-white rounded-2xl hover:bg-white/30 transition-all cursor-pointer shadow-xl hover-lift">
                                                    📤
                                                    <input type="file" accept=".json" onchange="importData(event)" class="hidden" />
                                                </label>
                                            </div>
                                        </div>
                                        
                                        ${state.saveMessage ? `<div class="mt-4 p-4 bg-green-500 text-white rounded-2xl font-bold text-lg shadow-xl">${state.saveMessage}</div>` : ''}

                                        <div class="mt-6 bg-white/10 backdrop-blur-md rounded-2xl p-6 border border-white/20">
                                            <p class="text-white text-lg italic leading-relaxed">"And if it so be that you should labor all your days in crying repentance unto this people, and bring, save it be one soul unto me, how great shall be your joy with him in the kingdom of my Father!"</p>
                                            <p class="text-indigo-200 text-sm mt-3 font-semibold">— Doctrine & Covenants 18:15</p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- Tabs -->
                            <div class="flex gap-4 mb-6 flex-wrap">
                                <button onclick="setActiveTab('investigators')" class="flex items-center gap-3 px-8 py-5 rounded-2xl font-black text-xl transition-all shadow-2xl hover-lift ${state.activeTab === 'investigators' ? 'bg-gradient-to-r from-blue-500 to-cyan-500 text-white scale-110' : 'bg-white/90 backdrop-blur-sm text-gray-700 hover:bg-white'}">
                                    <span class="text-2xl">👤</span>
                                    <div>
                                        <div>Current Investigators</div>
                                        <div class="text-sm font-normal opacity-80">(${state.investigators.length})</div>
                                    </div>
                                </button>
                                <button onclick="setActiveTab('returning')" class="flex items-center gap-3 px-8 py-5 rounded-2xl font-black text-xl transition-all shadow-2xl hover-lift ${state.activeTab === 'returning' ? 'bg-gradient-to-r from-green-500 to-emerald-500 text-white scale-110' : 'bg-white/90 backdrop-blur-sm text-gray-700 hover:bg-white'}">
                                    <span class="text-2xl">💙</span>
                                    <div>
                                        <div>Returning Members</div>
                                        <div class="text-sm font-normal opacity-80">(${state.returning.length})</div>
                                    </div>
                                </button>
                            </div>

                            <!-- View Toggle -->
                            <div class="bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl p-5 mb-6">
                                <div class="flex gap-3 justify-center flex-wrap">
                                    <button onclick="setViewMode('tracker')" class="flex items-center gap-2 px-8 py-4 rounded-xl font-bold text-lg transition-all hover-lift ${state.viewMode === 'tracker' ? 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-xl' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}">
                                        📅 Monthly Tracker
                                    </button>
                                    <button onclick="setViewMode('charts')" class="flex items-center gap-2 px-8 py-4 rounded-xl font-bold text-lg transition-all hover-lift ${state.viewMode === 'charts' ? 'bg-gradient-to-r from-purple-600 to-pink-600 text-white shadow-xl' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}">
                                        📊 KPI Dashboard
                                    </button>
                                </div>
                            </div>

                            ${state.viewMode === 'tracker' ? renderTracker(currentList) : renderCharts(currentList)}
                            ${state.covenantPath.length > 0 ? renderCovenantPath() : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderTracker(currentList) {
            return `
                <!-- Indicators -->
                <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 mb-6 hover-lift">
                    <h3 class="font-black text-3xl mb-6 bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent flex items-center gap-3">
                        ✨ Key Indicators
                    </h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        ${INDICATORS.map(ind => `
                            <div class="flex items-center gap-3 bg-gradient-to-r from-gray-50 to-white p-4 rounded-xl hover:shadow-lg transition-all hover-lift border-2 border-gray-100">
                                <span class="text-3xl">${ind.emoji}</span>
                                <div>
                                    <span class="bg-gradient-to-r ${ind.color} text-white px-3 py-1 rounded-lg text-sm font-black shadow-md">${ind.code}</span>
                                    <div class="text-xs text-gray-700 font-semibold mt-1">${ind.name}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Table -->
                <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl overflow-hidden hover-lift">
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead class="${state.activeTab === 'investigators' ? 'bg-gradient-to-r from-blue-600 to-cyan-600' : 'bg-gradient-to-r from-green-600 to-emerald-600'}">
                                <tr>
                                    <th class="text-white p-6 text-left font-black text-lg">Name</th>
                                    <th class="text-white p-6 text-left font-black text-lg">Assigned To</th>
                                    ${MONTHS.map(m => `<th class="text-white p-4 text-center font-black text-sm">${m}</th>`).join('')}
                                    <th class="text-white p-6 text-left font-black text-lg">Notes</th>
                                    <th class="text-white p-6 text-center font-black text-lg">Stats</th>
                                    <th class="text-white p-4"></th>
                                </tr>
                            </thead>
                            <tbody>
                                ${currentList.map((person, idx) => {
                                    const stats = getProgressStats(person);
                                    return `
                                        <tr class="${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'} hover:bg-gradient-to-r hover:from-indigo-50 hover:to-purple-50 transition-all">
                                            <td class="p-4">
                                                <input type="text" value="${person.name || ''}" onchange="updateName(${person.id}, this.value)" placeholder="${idx + 1}. Enter name..." class="w-56 px-4 py-3 border-3 border-indigo-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-200 focus:outline-none font-bold text-lg shadow-sm hover:shadow-md transition-all" />
                                            </td>
                                            <td class="p-4">
                                                <select value="${person.assignment || ''}" onchange="updateAssignment(${person.id}, this.value)" class="w-full px-4 py-3 border-3 border-indigo-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-200 focus:outline-none font-semibold shadow-sm hover:shadow-md transition-all">
                                                    <option value="">Select...</option>
                                                    <option value="Elders Quorum" ${person.assignment === 'Elders Quorum' ? 'selected' : ''}>⚡ Elders Quorum</option>
                                                    <option value="Relief Society" ${person.assignment === 'Relief Society' ? 'selected' : ''}>🌸 Relief Society</option>
                                                    <option value="Young Men" ${person.assignment === 'Young Men' ? 'selected' : ''}>🎯 Young Men</option>
                                                    <option value="Young Women" ${person.assignment === 'Young Women' ? 'selected' : ''}>⭐ Young Women</option>
                                                    <option value="Primary" ${person.assignment === 'Primary' ? 'selected' : ''}>🌈 Primary</option>
                                                    <option value="Sunday School" ${person.assignment === 'Sunday School' ? 'selected' : ''}>📚 Sunday School</option>
                                                    <option value="Young Single Adult" ${person.assignment === 'Young Single Adult' ? 'selected' : ''}>🚀 Young Single Adult</option>
                                                </select>
                                            </td>
                                            ${MONTHS.map(month => {
                                                const monthData = person.progress?.[month] || [];
                                                return `
                                                    <td class="p-3 text-center border-l border-gray-200 relative group">
                                                        <div class="min-h-[60px] flex items-center justify-center flex-wrap gap-1">
                                                            ${monthData.length > 0 ? monthData.map(code => {
                                                                const ind = INDICATORS.find(i => i.code === code);
                                                                return `<span class="text-xl" title="${ind?.name || code}">${ind?.emoji || code}</span>`;
                                                            }).join('') : '<span class="text-gray-300 text-4xl cursor-pointer">+</span>'}
                                                        </div>
                                                        <div class="absolute top-full left-1/2 transform -translate-x-1/2 mt-2 hidden group-hover:block z-30">
                                                            <div class="bg-white rounded-2xl shadow-2xl p-5 w-72 border-3 border-indigo-200 max-h-96 overflow-y-auto">
                                                                <div class="text-sm font-black text-indigo-900 mb-3 text-center bg-gradient-to-r from-indigo-50 to-purple-50 py-2 rounded-lg">${month}</div>
                                                                <div class="space-y-2">
                                                                    ${INDICATORS.map(ind => `
                                                                        <button onclick="toggleIndicator(${person.id}, '${month}', '${ind.code}')" class="w-full text-left px-4 py-3 rounded-xl text-sm flex items-center gap-3 transition-all font-semibold hover-lift ${monthData.includes(ind.code) ? `bg-gradient-to-r ${ind.color} text-white shadow-lg` : 'bg-gray-50 text-gray-700 hover:bg-gray-100 border-2 border-gray-200'}">
                                                                            ${monthData.includes(ind.code) ? '✓' : ''} <span class="text-2xl">${ind.emoji}</span>
                                                                            <div class="flex-1 min-w-0">
                                                                                <div class="font-black">${ind.code}</div>
                                                                                <div class="text-xs opacity-90 truncate">${ind.name}</div>
                                                                            </div>
                                                                        </button>
                                                                    `).join('')}
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </td>
                                                `;
                                            }).join('')}
                                            <td class="p-4">
                                                <input type="text" value="${person.notes || ''}" onchange="updateNotes(${person.id}, this.value)" placeholder="Add notes..." class="w-full px-4 py-3 border-3 border-gray-200 rounded-xl focus:border-indigo-500 focus:ring-4 focus:ring-indigo-200 focus:outline-none text-sm shadow-sm hover:shadow-md transition-all" />
                                            </td>
                                            <td class="p-4 text-center">
                                                <div class="inline-block bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-4 py-2 rounded-xl shadow-lg">
                                                    <div class="text-2xl font-black">${stats.total}</div>
                                                    <div class="text-xs opacity-90">activities</div>
                                                </div>
                                            </td>
                                            <td class="p-3">
                                                <button onclick="removePerson(${person.id})" class="p-3 text-red-500 hover:bg-red-50 rounded-xl transition-all hover-lift" ${currentList.length === 1 ? 'disabled' : ''}>🗑️</button>
                                            </td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                    <div class="p-6 border-t border-gray-200 bg-gradient-to-r from-gray-50 to-white">
                        <button onclick="addPerson()" class="flex items-center gap-3 px-8 py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-2xl hover:from-indigo-700 hover:to-purple-700 transition-all font-bold text-lg shadow-xl hover-lift">
                            ➕ Add Person
                        </button>
                    </div>
                </div>

                <!-- Instructions -->
                <div class="mt-6 bg-gradient-to-r from-yellow-400 via-orange-400 to-red-400 border-l-8 border-yellow-600 p-8 rounded-2xl shadow-2xl hover-lift">
                    <h4 class="font-black text-2xl text-white mb-4 flex items-center gap-3">⭐ How to Use This Tracker</h4>
                    <ul class="text-lg text-white space-y-2 font-semibold">
                        <li>✓ <strong>Enter names</strong> and assign to organizations</li>
                        <li>✓ <strong>Hover over any month</strong> to see emoji indicators</li>
                        <li>✓ <strong>Mark "B" (Baptized)</strong> to move to Covenant Path</li>
                        <li>✓ <strong>Save regularly</strong> to keep your progress</li>
                    </ul>
                </div>
            `;
        }

        function renderCharts(currentList) {
            const totalActivities = currentList.reduce((sum, p) => sum + Object.values(p.progress || {}).flat().length, 0);
            const avgPerPerson = currentList.length > 0 ? Math.round(totalActivities / currentList.length) : 0;
            
            return `
                <div class="space-y-6">
                    <div class="grid grid-cols-3 gap-6">
                        <div class="bg-gradient-to-br from-blue-500 to-cyan-500 text-white p-8 rounded-3xl shadow-2xl hover-lift">
                            <div class="text-6xl mb-4">👥</div>
                            <div class="text-sm opacity-90 mb-2 font-semibold">Total People</div>
                            <div class="text-6xl font-black">${currentList.length}</div>
                        </div>
                        <div class="bg-gradient-to-br from-green-500 to-emerald-500 text-white p-8 rounded-3xl shadow-2xl hover-lift">
                            <div class="text-6xl mb-4">⭐</div>
                            <div class="text-sm opacity-90 mb-2 font-semibold">Total Activities</div>
                            <div class="text-6xl font-black">${totalActivities}</div>
                        </div>
                        <div class="bg-gradient-to-br from-purple-500 to-pink-500 text-white p-8 rounded-3xl shadow-2xl hover-lift">
                            <div class="text-6xl mb-4">📊</div>
                            <div class="text-sm opacity-90 mb-2 font-semibold">Avg per Person</div>
                            <div class="text-6xl font-black">${avgPerPerson}</div>
                        </div>
                    </div>

                    <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 hover-lift">
                        <h3 class="text-3xl font-black bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent mb-6 flex items-center gap-3">
                            🏆 Individual Progress
                        </h3>
                        <div class="space-y-6">
                            ${currentList.map((person, idx) => {
                                const progress = Object.values(person.progress || {}).flat().length;
                                const maxProgress = 12 * 20; // 12 months * 20 indicators
                                const percentage = maxProgress > 0 ? (progress / maxProgress) * 100 : 0;
                                return `
                                    <div class="hover-lift">
                                        <div class="flex justify-between text-lg font-bold text-gray-800 mb-3">
                                            <span>🎯 ${person.name || `Person ${idx + 1}`}</span>
                                            <span class="text-indigo-600">${progress} / ${maxProgress}</span>
                                        </div>
                                        <div class="bg-gray-200 rounded-full h-10 overflow-hidden shadow-inner">
                                            <div class="${state.activeTab === 'investigators' ? 'bg-gradient-to-r from-blue-500 via-cyan-400 to-blue-600' : 'bg-gradient-to-r from-green-500 via-emerald-400 to-green-600'} h-full rounded-full transition-all duration-1000 flex items-center justify-end px-4 shimmer" style="width:${Math.max(percentage, 0)}%">
                                                ${percentage > 15 ? `<span class="text-white text-lg font-black drop-shadow-lg">${Math.round(percentage)}%</span>` : ''}
                                            </div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCovenantPath() {
            return `
                <div class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 mt-8 hover-lift">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="text-6xl">📖</div>
                        <h2 class="text-5xl font-black bg-gradient-to-r from-purple-600 via-pink-600 to-red-600 bg-clip-text text-transparent">The Covenant Path</h2>
                    </div>
                    <div class="space-y-8">
                        ${state.covenantPath.map(person => {
                            const isMale = person.type === 'Male';
                            const isFemaleOrOAY = person.type === 'Female' || person.type === 'OAY';
                            return `
                                <div class="bg-gradient-to-br from-purple-100 via-pink-100 to-indigo-100 rounded-3xl p-8 border-4 border-purple-300 shadow-2xl hover-lift">
                                    <div class="flex items-start justify-between mb-8">
                                        <div class="flex-1">
                                            <h3 class="text-4xl font-black text-purple-900 mb-3">${person.name}</h3>
                                            <div class="flex gap-3 flex-wrap">
                                                <span class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-5 py-2 rounded-full text-lg font-black shadow-lg">✨ Baptized: ${new Date(person.baptismDate).toLocaleDateString()}</span>
                                                ${person.assignment ? `<span class="bg-gradient-to-r from-blue-600 to-cyan-600 text-white px-5 py-2 rounded-full text-lg font-black shadow-lg">📍 ${person.assignment}</span>` : ''}
                                            </div>
                                        </div>
                                        <button onclick="removeFromCovenantPath(${person.id})" class="text-red-500 hover:bg-red-100 p-4 rounded-2xl transition-all hover-lift">🗑️</button>
                                    </div>

                                    ${!person.type ? `
                                        <div class="mb-8 bg-white rounded-2xl p-6 border-4 border-purple-400 shadow-xl">
                                            <label class="block text-xl font-black mb-4 text-purple-900">Select Type:</label>
                                            <div class="grid grid-cols-3 gap-4">
                                                <button onclick="updateCovenantField(${person.id}, 'type', 'Male')" class="bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white px-8 py-6 rounded-2xl font-black text-2xl transition-all shadow-xl hover-lift">👨 Male</button>
                                                <button onclick="updateCovenantField(${person.id}, 'type', 'Female')" class="bg-gradient-to-r from-pink-500 to-pink-600 hover:from-pink-600 hover:to-pink-700 text-white px-8 py-6 rounded-2xl font-black text-2xl transition-all shadow-xl hover-lift">👩 Female</button>
                                                <button onclick="updateCovenantField(${person.id}, 'type', 'OAY')" class="bg-gradient-to-r from-purple-500 to-purple-600 hover:from-purple-600 hover:to-purple-700 text-white px-8 py-6 rounded-2xl font-black text-2xl transition-all shadow-xl hover-lift">🎓 OAY</button>
                                            </div>
                                        </div>
                                    ` : ''}

                                    ${isMale ? `
                                        <div class="mb-8">
                                            <h4 class="font-black text-2xl text-purple-900 mb-6 flex items-center gap-3">🏆 Ordinance Path (Male)</h4>
                                            <div class="grid md:grid-cols-2 gap-4">
                                                ${[
                                                    { key: 'aaronicPriesthood', label: 'Aaronic Priesthood', emoji: '✋' },
                                                    { key: 'templeBaptisms', label: 'Temple Baptisms', emoji: '🏛️' },
                                                    { key: 'patriarchalBlessing', label: 'Patriarchal Blessing', emoji: '📜' },
                                                    { key: 'melchizedekPriesthood', label: 'Melchizedek Priesthood', emoji: '👔' },
                                                    { key: 'endowment', label: 'Temple Endowment', emoji: '⭐' }
                                                ].map(ord => `
                                                    <label class="flex items-center gap-4 bg-white p-6 rounded-2xl cursor-pointer hover:bg-purple-50 transition-all hover-lift border-3 border-purple-200 shadow-lg">
                                                        <input type="checkbox" ${person.ordinances[ord.key] ? 'checked' : ''} onchange="updateCovenantField(${person.id}, 'ordinance_${ord.key}', this.checked)" class="w-7 h-7 text-purple-600 rounded-lg" />
                                                        <span class="text-3xl">${ord.emoji}</span>
                                                        <span class="font-black text-lg">${ord.label}</span>
                                                    </label>
                                                `).join('')}
                                            </div>
                                        </div>
                                    ` : ''}

                                    ${isFemaleOrOAY ? `
                                        <div class="mb-8">
                                            <h4 class="font-black text-2xl text-purple-900 mb-6 flex items-center gap-3">🏆 Ordinance Path (${person.type})</h4>
                                            <div class="grid md:grid-cols-2 gap-4">
                                                ${[
                                                    { key: 'templeBaptisms', label: 'Temple Baptisms', emoji: '🏛️' },
                                                    { key: 'patriarchalBlessing', label: 'Patriarchal Blessing', emoji: '📜' },
                                                    { key: 'endowment', label: 'Temple Endowment', emoji: '⭐' }
                                                ].map(ord => `
                                                    <label class="flex items-center gap-4 bg-white p-6 rounded-2xl cursor-pointer hover:bg-purple-50 transition-all hover-lift border-3 border-purple-200 shadow-lg">
                                                        <input type="checkbox" ${person.femaleOrdinances[ord.key] ? 'checked' : ''} onchange="updateCovenantField(${person.id}, 'femaleOrd_${ord.key}', this.checked)" class="w-7 h-7 text-purple-600 rounded-lg" />
                                                        <span class="text-3xl">${ord.emoji}</span>
                                                        <span class="font-black text-lg">${ord.label}</span>
                                                    </label>
                                                `).join('')}
                                            </div>
                                        </div>
                                    ` : ''}

                                    ${person.type ? `
                                        <div class="mb-8">
                                            <h4 class="font-black text-2xl text-purple-900 mb-6 flex items-center gap-3">✨ Self-Reliance Classes</h4>
                                            <div class="grid md:grid-cols-2 gap-4">
                                                ${[
                                                    { key: 'emotionalResilience', label: 'Emotional Resilience', emoji: '💙' },
                                                    { key: 'personalFinances', label: 'Personal Finances', emoji: '💰' },
                                                    { key: 'startGrowBusiness', label: 'Start & Grow Business', emoji: '🚀' },
                                                    { key: 'educationBetterWork', label: 'Education for Better Work', emoji: '🎓' },
                                                    { key: 'findBetterJob', label: 'Find a Better Job', emoji: '💼' }
                                                ].map(sr => `
                                                    <label class="flex items-center gap-4 bg-white p-6 rounded-2xl cursor-pointer hover:bg-blue-50 transition-all hover-lift border-3 border-blue-200 shadow-lg">
                                                        <input type="checkbox" ${person.selfRelianceCompleted[sr.key] ? 'checked' : ''} onchange="updateCovenantField(${person.id}, 'selfReliance_${sr.key}', this.checked)" class="w-7 h-7 text-blue-600 rounded-lg" />
                                                        <span class="text-3xl">${sr.emoji}</span>
                                                        <span class="font-black text-lg">${sr.label}</span>
                                                    </label>
                                                `).join('')}
                                            </div>
                                        </div>
                                        <div>
                                            <label class="block text-xl font-black mb-4 text-purple-900">📝 Notes:</label>
                                            <textarea onchange="updateCovenantField(${person.id}, 'notes', this.value)" placeholder="Track church attendance, new member discussions, and progress..." class="w-full px-6 py-4 border-4 border-purple-300 rounded-2xl focus:border-purple-500 focus:ring-4 focus:ring-purple-200 focus:outline-none text-lg font-semibold shadow-lg" rows="4">${person.notes}</textarea>
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        // Make saveToFirebase globally accessible
        window.saveToFirebase = saveToFirebase;

        // Initial render
        render();
    </script>
</body>
</html>
